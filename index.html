      )}

      {/* CTA buttons */}
      <div className="flex flex-col gap-3 max-w-xs mx-auto">
        {hasMore && (
          <button onClick={onContinue}
            className="w-full py-3.5 rounded-2xl font-bold text-base transition-all hover:scale-105"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white', boxShadow: '0 4px 16px rgba(61,139,209,0.35)' }}>
            ▶ Tiếp tục ({remaining} từ còn lại)
          </button>
        )}
        <button onClick={onRestart || onReset}
          className="w-full py-3 rounded-2xl font-semibold transition-all hover:scale-[1.02]"
          style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
          🔁 Học lại bộ này
        </button>
        {onBack && (
          <button onClick={onBack}
            className="w-full py-3 rounded-2xl font-semibold transition-all hover:scale-[1.02]"
            style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
            ← Quay lại danh sách bài học
          </button>
        )}
      </div>
    </div>
  );
};

// ============ FLASHCARD VIEW (SRS — TRUNG TÂM HỌC TỪ VỰNG) ============
const LEECH_THRESHOLD = 8;   // số lần quên để coi là "từ khó"
const MATURE_DAYS = 21;      // ngưỡng "thuộc lâu"
const fcToday = () => new Date().toLocaleDateString('en-CA');

// Trộn ổn định (cùng seed → cùng thứ tự mỗi lần) để chia bộ không theo thứ tự từ điển
const seededShuffle = (arr, seed) => {
  const a = [...arr]; let s = (seed >>> 0) || 1;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

// Bỏ dấu thanh + khoảng trắng để so khớp pinyin khi gõ
function stripPinyin(s) {
  return (s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z]/g, '');
}

// Vòng tiến độ tròn — chữ ký hình ảnh của màn hình "Hôm nay"
const ProgressRing = ({ pct, size = 132, stroke = 12, children, watermark }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const [p, setP] = useState(0);
  useEffect(() => { const t = setTimeout(() => setP(pct), 150); return () => clearTimeout(t); }, [pct]);
  const cx = size / 2;
  return (
    <div className="relative flex items-center justify-center flex-shrink-0" style={{ width: size, height: size }}>
      {watermark && (
        <div className="absolute inset-0 flex items-center justify-center hanzi-text pointer-events-none select-none"
          style={{ fontSize: size * 0.62, color: 'var(--accent)', opacity: 0.08, fontWeight: 600 }}>
          {watermark}
        </div>
      )}
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <defs>
          <linearGradient id="fcRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="var(--accent)" />
            <stop offset="100%" stopColor="var(--accent-2)" />
          </linearGradient>
        </defs>
        <circle cx={cx} cy={cx} r={r} fill="none" stroke="var(--surface-soft)" strokeWidth={stroke} />
        <circle cx={cx} cy={cx} r={r} fill="none" stroke="url(#fcRingGrad)" strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - p / 100)}
          style={{ transition: 'stroke-dashoffset 0.95s cubic-bezier(.2,.7,.2,1)' }} />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">{children}</div>
    </div>
  );
};

const FlashcardView = ({ srsData, updateSRS, settings, setSettings, daily, bumpDaily, fcStats, bumpFcStat }) => {
  const newPerDay = settings?.newPerDay ?? 10;
  const maxReviews = settings?.maxReviews ?? 0;     // 0 = không giới hạn
  const currentLevel = settings?.currentLevel ?? 1;
  const typingMode = !!settings?.typing;
  const deckSize = Math.min(50, Math.max(20, settings?.deckSize ?? 25));

  const today = fcToday();
  const newDoneToday = daily?.date === today ? (daily.newDone || 0) : 0;
  const reviewsDoneToday = daily?.date === today ? (daily.reviewsDone || 0) : 0;

  // ── Session state ──
  const [sessionQueue, setSessionQueue] = useState(null);
  const [sessionIdx, setSessionIdx] = useState(0);
  const [reQueue, setReQueue] = useState([]);
  const [sessionStats, setSessionStats] = useState({ forgot:0, hard:0, good:0, easy:0, total:0 });
  const [flipped, setFlipped] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [sessionDone, setSessionDone] = useState(false);
  const [sessionMode, setSessionMode] = useState('today'); // today | cram | leech | extra | deck...
  const [showSettings, setShowSettings] = useState(false);
  const [selectedDeck, setSelectedDeck] = useState(null); // chỉ số bộ đang mở (null = danh sách bộ)
  // Typing
  const [typed, setTyped] = useState('');
  const [typedResult, setTypedResult] = useState(null); // null | 'correct' | 'wrong'
  const inputRef = useRef(null);

  const touchStartX = useRef(null);
  const touchStartY = useRef(null);
  const isSwiping = useRef(false);

  // ── Từ đến hạn (TẤT CẢ cấp, gộp lại) ──
  const dueList = useMemo(() => {
    const now = Date.now();
    const out = [];
    for (let lv = 1; lv <= 6; lv++) {
      for (const w of (ALL_HSK[lv] || [])) {
        const d = srsData[w.id];
        if (d && d.nextReview <= now) out.push({ w, lv, d });
      }
    }
    out.sort((a, b) => (a.d.nextReview || 0) - (b.d.nextReview || 0));
    return out;
  }, [srsData]);

  // ── Từ mới khả dụng (theo cấp đang học) ──
  const newAvailable = useMemo(
    () => (ALL_HSK[currentLevel] || []).filter(w => !srsData[w.id]),
    [srsData, currentLevel]
  );

  // ── Từ khó (leech) ──
  const leechList = useMemo(() => {
    const out = [];
    for (let lv = 1; lv <= 6; lv++) {
      for (const w of (ALL_HSK[lv] || [])) {
        const d = srsData[w.id];
        if (d && (d.lapses || 0) >= LEECH_THRESHOLD) out.push({ w, lv, d });
      }
    }
    return out;
  }, [srsData]);

  // ── Kế hoạch hôm nay ──
  const newQuota = Math.max(0, newPerDay - newDoneToday);
  const newToStudy = newAvailable.slice(0, newQuota);
  const dueToStudy = maxReviews > 0 ? dueList.slice(0, maxReviews) : dueList;
  const planDue = dueToStudy.length;
  const planNew = newToStudy.length;
  const planTotal = planDue + planNew;
  const doneToday = newDoneToday + reviewsDoneToday;
  const dayGoal = doneToday + planTotal;
  const todayPct = dayGoal > 0 ? Math.round((doneToday / dayGoal) * 100) : 100;

  // ── Thống kê tổng ──
  const stats = useMemo(() => {
    let learning = 0, young = 0, mature = 0;
    const ids = Object.keys(srsData);
    for (const id of ids) {
      const d = srsData[id];
      if (!d) continue;
      if (d.state === 'learning' || d.state === 'relearning') learning++;
      else if ((d.interval || 0) >= MATURE_DAYS) mature++;
      else young++;
    }
    const retention = (fcStats?.totalRated || 0) > 0
      ? Math.round((fcStats.correct / fcStats.totalRated) * 100) : null;
    return { inSrs: ids.length, learning, young, mature, retention, leech: leechList.length };
  }, [srsData, fcStats, leechList]);

  // ── Chia cấp hiện tại thành các BỘ cố định ──
  const levelWords = ALL_HSK[currentLevel] || [];
  const mixDecks = settings?.mixDecks !== false; // mặc định BẬT: trộn từ giữa các bộ
  const levelSeed = useMemo(() => { let h = 7; for (const c of String(currentLevel)) h = (h * 31 + c.charCodeAt(0)) >>> 0; return h; }, [currentLevel]);
  const deckWords = useMemo(() => mixDecks ? seededShuffle(levelWords, levelSeed) : levelWords, [currentLevel, mixDecks, levelSeed]);
  const deckCount = Math.max(1, Math.ceil(levelWords.length / deckSize));
  const RATE_COLOR = { 1: '#dc2f2f', 2: '#e08e0a', 3: 'var(--accent)', 4: '#10b981' };
  const deckInfo = (k) => {
    const now = Date.now();
    const start = k * deckSize;
    const ws = deckWords.slice(start, start + deckSize);
    let studied = 0, due = 0;
    const b = [0, 0, 0, 0, 0]; // đếm theo mức 1..4
    const newW = [], dueW = [], weakW = [], restW = [];
    for (const w of ws) {
      const d = srsData[w.id];
      if (!d) { newW.push(w); continue; }
      studied++;
      const r = d.lastRating || 3;
      b[r] = (b[r] || 0) + 1;
      if (d.nextReview <= now) { due++; dueW.push(w); } else { restW.push(w); }
      if (r === 1 || r === 2) weakW.push(w);
    }
    return { k, start, ws, total: ws.length, studied, due, b, newW, dueW, weakW, restW };
  };
  // tổng quan cả cấp
  const levelOverview = (() => {
    const now = Date.now();
    let studied = 0, due = 0;
    for (const w of levelWords) {
      const d = srsData[w.id]; if (!d) continue;
      studied++; if (d.nextReview <= now) due++;
    }
    return { total: levelWords.length, studied, due };
  })();

  // ── Gộp TẤT CẢ từ chưa thuộc / khó thuộc của CẢ CẤP (không theo bộ) ──
  // Tiêu chí "yếu": đánh giá gần nhất là Quên(1)/Khó(2), HOẶC đang learning/relearning,
  // HOẶC là leech (quên nhiều lần). Dùng để gom các từ lẻ còn sót ở nhiều bộ để học một thể.
  const weakLevel = useMemo(() => {
    const words = [];
    let forgot = 0, hard = 0, learningN = 0, leechN = 0;
    for (const w of levelWords) {
      const d = srsData[w.id];
      if (!d) continue; // từ mới chưa học -> không tính là "chưa thuộc"
      const r = d.lastRating || 3;
      const isLearning = d.state === 'learning' || d.state === 'relearning';
      const isLeech = (d.lapses || 0) >= LEECH_THRESHOLD;
      if (r === 1 || r === 2 || isLearning || isLeech) {
        words.push(w);
        if (r === 1) forgot++;
        else if (r === 2) hard++;
        else if (isLearning) learningN++;
        if (isLeech) leechN++;
      }
    }
    return { words, forgot, hard, learning: learningN, leech: leechN, total: words.length };
  }, [levelWords, srsData]);

  // ── Trộn từ mới xen vào từ ôn (kiểu Anki) ──
  const buildToday = useCallback(() => {
    const due = dueToStudy.map(x => x.w);
    const fresh = newToStudy;
    if (fresh.length === 0) return due;
    if (due.length === 0) return [...fresh];
    const out = [];
    const total = due.length + fresh.length;
    const step = total / fresh.length;
    let di = 0, fi = 0, nextNew = step / 2;
    for (let i = 0; i < total; i++) {
      if (fi < fresh.length && i >= nextNew) { out.push(fresh[fi++]); nextNew += step; }
      else if (di < due.length) { out.push(due[di++]); }
      else if (fi < fresh.length) { out.push(fresh[fi++]); }
    }
    return out;
  }, [dueToStudy, newToStudy]);

  const shuffleArr = (arr) => { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

  const startSession = (modeName) => {
    let q = [];
    if (modeName === 'today') q = buildToday();
    else if (modeName === 'cram') q = [...(ALL_HSK[currentLevel] || [])];
    else if (modeName === 'leech') q = leechList.map(x => x.w);
    else if (modeName === 'extra') q = newAvailable.slice(0, 10);
    if (q.length === 0) return;
    setSessionMode(modeName);
    setSessionQueue(shuffleArr(q));
    setSessionIdx(0);
    setReQueue([]);
    setSessionStats({ forgot:0, hard:0, good:0, easy:0, total:0 });
    setFlipped(false);
    setFeedback(null);
    setSessionDone(false);
    setTyped(''); setTypedResult(null);
  };

  const resetSession = () => {
    setSessionQueue(null);
    setSessionIdx(0);
    setReQueue([]);
    setFlipped(false);
    setFeedback(null);
    setSessionDone(false);
    setTyped(''); setTypedResult(null);
  };

  // Học một danh sách từ cụ thể (dùng cho các BỘ)
  const startWords = (words, modeName = 'deck') => {
    if (!words || words.length === 0) return;
    setSessionMode(modeName);
    setSessionQueue(shuffleArr(words));
    setSessionIdx(0);
    setReQueue([]);
    setSessionStats({ forgot:0, hard:0, good:0, easy:0, total:0 });
    setFlipped(false);
    setFeedback(null);
    setSessionDone(false);
    setTyped(''); setTypedResult(null);
  };

  const currentWord = sessionQueue ? sessionQueue[sessionIdx] : null;
  const currentCardSRS = currentWord ? srsData[currentWord.id] : null;
  const isCram = sessionMode === 'cram';

  // Reset + tự đọc khi sang thẻ mới (theo vị trí, nên thẻ lặp lại cũng reset đúng)
  useEffect(() => {
    if (!currentWord) return;
    setFlipped(false);
    setTyped(''); setTypedResult(null);
    if (!typingMode) {
      const t = setTimeout(() => speak(currentWord.hanzi), 300);
      return () => clearTimeout(t);
    }
  }, [sessionIdx, currentWord?.id]);

  // Đọc lại mỗi khi lật sang mặt nghĩa
  useEffect(() => {
    if (flipped && currentWord) speak(currentWord.hanzi);
  }, [flipped]);

  // ── Đánh giá ──
  const handleRate = useCallback((rating) => {
    if (!currentWord || feedback) return;
    const prev = srsData[currentWord.id] || null;
    const wasNew = !prev;
    const next = fsrsUpdateState(prev, rating);

    if (!isCram) {
      updateSRS(currentWord.id, { ...next, lastRating: rating });
      bumpDaily(wasNew ? 'new' : 'review');
      bumpFcStat(rating >= 3);
      feedPetFood(wasNew ? 2 : 1);
    }

    const ratingKey = ['', 'forgot', 'hard', 'good', 'easy'][rating] || 'good';
    setSessionStats(s => ({ ...s, [ratingKey]: s[ratingKey] + 1, total: s.total + 1 }));

    const rc = RATING_CONFIG[rating - 1];
    setFeedback({ ...rc, interval: formatInterval(next.interval) });

    if (rating === 1) setReQueue(q => [...q, currentWord]);

    setTimeout(() => {
      setFeedback(null);
      setFlipped(false);
      setTyped(''); setTypedResult(null);
      const nextIdx = sessionIdx + 1;
      if (nextIdx >= sessionQueue.length) {
        if (reQueue.length > 0 && rating !== 1) {
          setSessionQueue(q => [...q, ...reQueue]); setReQueue([]); setSessionIdx(nextIdx);
        } else if (rating === 1) {
          setSessionQueue(q => [...q, currentWord]); setSessionIdx(nextIdx);
        } else {
          setSessionDone(true);
        }
      } else {
        setSessionIdx(nextIdx);
      }
    }, 600);
  }, [currentWord, feedback, srsData, updateSRS, sessionIdx, sessionQueue, reQueue, isCram, bumpDaily, bumpFcStat]);

  // ── Gõ pinyin để tự kiểm tra ──
  const checkTyped = () => {
    if (!currentWord) return;
    const ok = stripPinyin(typed) === stripPinyin(currentWord.pinyin);
    setTypedResult(ok ? 'correct' : 'wrong');
    setFlipped(true);
  };

  // ── Phím tắt ──
  useEffect(() => {
    const handleKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        if (e.code === 'Enter' && typingMode && !flipped) { e.preventDefault(); checkTyped(); }
        return;
      }
      if (!sessionQueue || sessionDone || feedback) return;
      if (e.code === 'Space') { e.preventDefault(); setFlipped(f => !f); }
      else if (flipped) {
        if (['1','2','3','4'].includes(e.key)) { e.preventDefault(); handleRate(parseInt(e.key)); }
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [flipped, feedback, currentWord, sessionQueue, sessionDone, handleRate, typingMode, typed]);

  // ── Vuốt ──
  const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; touchStartY.current = e.touches[0].clientY; isSwiping.current = false; };
  const handleTouchMove = (e) => {
    if (touchStartX.current == null) return;
    const dx = e.touches[0].clientX - touchStartX.current;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) isSwiping.current = true;
  };
  const handleTouchEnd = (e) => {
    if (touchStartX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    if (isSwiping.current && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) && flipped && !feedback) {
      if (dx < -60) handleRate(1);
      else if (dx > 60) handleRate(4);
    } else if (!isSwiping.current && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
      if (!(typingMode && !flipped)) setFlipped(f => !f);
    }
    touchStartX.current = null; isSwiping.current = false;
  };

  const srsStatusLabel = !currentCardSRS
    ? { label: 'MỚI', color: '#10b981', bg: '#d1fae5' }
    : (currentCardSRS.lapses || 0) >= LEECH_THRESHOLD
    ? { label: '🔥 TỪ KHÓ', color: '#b45309', bg: '#fef3c7' }
    : (currentCardSRS.state === 'learning' || currentCardSRS.state === 'relearning')
    ? { label: 'ĐANG HỌC', color: '#f59e0b', bg: '#fef3c7' }
    : { label: `${currentCardSRS.reps || 0} LẦN ÔN`, color: 'var(--accent)', bg: 'var(--surface-soft)' };

  // Màu thanh điệu của âm tiết đầu (cho quầng sáng sau chữ Hán)
  const firstToneColor = currentWord
    ? (TONE_COLORS[getToneColor((currentWord.pinyin || '').split(' ')[0] || '')] || 'var(--accent)')
    : 'var(--accent)';

  // ════════════ SETTINGS MODAL ════════════
  const SettingsModal = () => (
    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4"
      style={{ background: 'rgba(15,26,46,0.5)', backdropFilter: 'blur(8px)', animation: 'fadeIn 0.2s ease-out' }}
      onClick={() => setShowSettings(false)}>
      <div className="w-full max-w-md rounded-3xl p-6" onClick={e => e.stopPropagation()}
        style={{ background: 'var(--surface)', border: '1px solid var(--border)', animation: 'slideUp 0.3s ease-out', maxHeight: '90vh', overflowY: 'auto' }}>
        <div className="flex items-center justify-between mb-5">
          <h3 className="text-lg font-bold" style={{ color: 'var(--ink)' }}>⚙️ Cài đặt học tập</h3>
          <button onClick={() => setShowSettings(false)} className="w-8 h-8 rounded-full flex items-center justify-center"
            style={{ background: 'var(--surface-soft)', color: 'var(--muted)' }}>✕</button>
        </div>

        <div className="mb-5">
          <div className="text-sm font-semibold mb-1" style={{ color: 'var(--ink)' }}>Số từ mỗi bộ</div>
          <div className="text-xs mb-2" style={{ color: 'var(--muted)' }}>Mỗi cấp HSK được chia thành các bộ cố định theo số này — giúp xác định giới hạn và dễ ôn lại.</div>
          <div className="flex gap-1.5 flex-wrap">
            {[20,25,30,40,50].map(n => (
              <button key={n} onClick={() => setSettings({ deckSize: n })}
                className="px-3.5 py-2 rounded-xl text-sm font-semibold transition-all"
                style={{ background: deckSize === n ? 'var(--accent)' : 'var(--surface-soft)', color: deckSize === n ? 'white' : 'var(--ink)', border: '1px solid var(--border)' }}>
                {n}
              </button>
            ))}
          </div>
        </div>

        <div className="mb-5 flex items-center justify-between p-3 rounded-2xl" style={{ background: 'var(--surface-soft)', border: '1px solid var(--border)' }}>
          <div className="flex-1 pr-3">
            <div className="text-sm font-semibold" style={{ color: 'var(--ink)' }}>Trộn từ giữa các bộ</div>
            <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>Mỗi bộ là một nhóm cố định nhưng gồm các từ rải khắp cấp (không theo thứ tự từ điển) — đỡ đoán trước.</div>
          </div>
          <button onClick={() => setSettings({ mixDecks: !mixDecks })}
            className="w-12 h-7 rounded-full flex-shrink-0 transition-all relative"
            style={{ background: mixDecks ? 'var(--accent)' : 'var(--border)' }}>
            <span className="absolute top-0.5 w-6 h-6 rounded-full bg-white transition-all" style={{ left: mixDecks ? '22px' : '2px' }} />
          </button>
        </div>

        <div className="mb-2 flex items-center justify-between p-3 rounded-2xl" style={{ background: 'var(--surface-soft)', border: '1px solid var(--border)' }}>
          <div className="flex-1 pr-3">
            <div className="text-sm font-semibold" style={{ color: 'var(--ink)' }}>Gõ pinyin để tự kiểm tra</div>
            <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>Nhớ chủ động hơn nhưng chậm hơn. Bật khi muốn thử thách.</div>
          </div>
          <button onClick={() => setSettings({ typing: !typingMode })}
            className="relative w-12 h-7 rounded-full transition-all flex-shrink-0"
            style={{ background: typingMode ? 'var(--accent)' : 'var(--border)' }}>
            <span className="absolute top-1 w-5 h-5 rounded-full bg-white transition-all" style={{ left: typingMode ? '24px' : '4px' }} />
          </button>
        </div>
      </div>
    </div>
  );

  // ════════════ MÀN HÌNH CHỌN BỘ ════════════
  if (!sessionQueue) {
    // ----- Chi tiết một BỘ -----
    if (selectedDeck != null) {
      const di = deckInfo(selectedDeck);
      const segs = [
        { n: di.b[4], c: RATE_COLOR[4] },
        { n: di.b[3], c: RATE_COLOR[3] },
        { n: di.b[2], c: RATE_COLOR[2] },
        { n: di.b[1], c: RATE_COLOR[1] },
      ];
      const orderedAll = [...di.dueW, ...di.newW, ...di.restW];
      return (
        <div className="max-w-2xl mx-auto px-5 py-7">
          {showSettings && <SettingsModal />}
          <button onClick={() => setSelectedDeck(null)} className="flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-xl mb-4 transition-all hover:scale-105"
            style={{ background:'var(--surface)', color:'var(--muted)', border:'1px solid var(--border)' }}>← Các bộ HSK {currentLevel}</button>

          <div className="rounded-3xl p-6 mb-5 soft-shadow-lg fc-enter" style={{ background:'linear-gradient(150deg, var(--surface), var(--surface-soft))', border:'1px solid var(--accent-soft)' }}>
            <div className="text-xs tracking-[0.25em] mb-1" style={{ color:'var(--accent)' }}>HSK {currentLevel} · BỘ {selectedDeck + 1}</div>
            <h1 className="text-2xl mb-1" style={{ fontFamily:'var(--font-display)', fontWeight:700, color:'var(--ink)' }}>Từ {di.start + 1}–{di.start + di.total}</h1>
            <div className="text-sm mb-4" style={{ color:'var(--muted)' }}>{di.total} từ · đã học {di.studied}/{di.total}</div>

            {/* thanh phân loại */}
            <div className="flex h-3 rounded-full overflow-hidden mb-3" style={{ background:'var(--surface-soft)' }}>
              {segs.map((s, i) => s.n > 0 && <div key={i} style={{ width:`${(s.n / di.total) * 100}%`, background:s.c }} />)}
            </div>
            <div className="flex flex-wrap gap-2 text-xs">
              {di.b[4] > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'var(--surface)', color:RATE_COLOR[4], border:`1px solid ${RATE_COLOR[4]}40` }}>● Dễ {di.b[4]}</span>}
              {di.b[3] > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'var(--surface)', color:'var(--accent)', border:'1px solid var(--accent-soft)' }}>● Ổn {di.b[3]}</span>}
              {di.b[2] > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'var(--surface)', color:RATE_COLOR[2], border:`1px solid ${RATE_COLOR[2]}40` }}>● Khó {di.b[2]}</span>}
              {di.b[1] > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'var(--surface)', color:RATE_COLOR[1], border:`1px solid ${RATE_COLOR[1]}40` }}>● Quên {di.b[1]}</span>}
            </div>
          </div>

          <div className="flex flex-col gap-2.5">
            <button onClick={() => startWords(orderedAll, 'deck')}
              className="w-full py-3.5 rounded-2xl font-bold text-base transition-all hover:scale-[1.02] active:scale-[0.98]"
              style={{ background:'linear-gradient(135deg, var(--accent), var(--accent-2))', color:'white', boxShadow:'0 6px 22px rgba(61,139,209,0.4)' }}>
              ▶ Học cả bộ ({di.total})
            </button>
            {di.due > 0 && (
              <button onClick={() => startWords(di.dueW, 'deck-due')}
                className="w-full py-3 rounded-2xl font-semibold text-sm transition-all hover:scale-[1.01]"
                style={{ background:'var(--surface)', color:'var(--accent)', border:'1.5px solid var(--accent-soft)' }}>
                🔄 Ôn từ đến hạn ({di.due})
              </button>
            )}
            {di.weakW.length > 0 && (
              <button onClick={() => startWords(di.weakW, 'deck-weak')}
                className="w-full py-3 rounded-2xl font-semibold text-sm transition-all hover:scale-[1.01]"
                style={{ background:'#fff7ed', color:'#b45309', border:'1.5px solid #fed7aa' }}>
                🎯 Luyện từ yếu — Quên/Khó ({di.weakW.length})
              </button>
            )}
            {di.newW.length > 0 && (
              <button onClick={() => startWords(di.newW, 'deck-new')}
                className="w-full py-3 rounded-2xl font-semibold text-sm transition-all hover:scale-[1.01]"
                style={{ background:'#ecfdf5', color:'#047857', border:'1.5px solid #a7f3d0' }}>
                ✨ Học từ mới trong bộ ({di.newW.length})
              </button>
            )}
          </div>
        </div>
      );
    }

    // ----- Danh sách các BỘ của cấp -----
    return (
      <div className="max-w-2xl mx-auto px-5 py-7">
        {showSettings && <SettingsModal />}
        <div className="flex items-start justify-between mb-4">
          <div>
            <div className="text-xs tracking-[0.3em] mb-1" style={{ color:'var(--accent)' }}>卡片 · FLASHCARD</div>
            <h1 className="text-3xl" style={{ fontFamily:'var(--font-display)', fontWeight:700, color:'var(--ink)' }}>Chọn bộ từ</h1>
          </div>
          <button onClick={() => setShowSettings(true)}
            className="w-10 h-10 rounded-2xl flex items-center justify-center text-lg transition-all hover:scale-105"
            style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>⚙️</button>
        </div>

        {/* chọn cấp HSK */}
        <div className="flex gap-1.5 mb-3 overflow-x-auto pb-1">
          {[1,2,3,4,5,6].map(l => (
            <button key={l} onClick={() => { setSettings({ currentLevel: l }); setSelectedDeck(null); }}
              className="px-4 py-2 rounded-xl text-sm font-bold transition-all flex-shrink-0"
              style={{ background: currentLevel === l ? 'var(--accent)' : 'var(--surface)', color: currentLevel === l ? 'white' : 'var(--ink)', border:'1px solid var(--border)' }}>
              HSK {l}
            </button>
          ))}
        </div>

        {/* tổng quan cấp */}
        <div className="flex items-center gap-4 mb-5 px-1 text-sm" style={{ color:'var(--muted)' }}>
          <span>{levelOverview.total} từ</span>
          <span>·</span>
          <span>đã học {levelOverview.studied}</span>
          {levelOverview.due > 0 && <><span>·</span><span style={{ color:'var(--accent)', fontWeight:600 }}>cần ôn {levelOverview.due}</span></>}
        </div>

        {/* ⭐ Gộp từ chưa thuộc / khó thuộc của CẢ CẤP — học một thể các từ lẻ còn sót ở nhiều bộ */}
        {weakLevel.total > 0 && (
          <button onClick={() => startWords(weakLevel.words, 'level-weak')}
            className="w-full text-left rounded-2xl p-4 mb-5 transition-all hover:scale-[1.01] active:scale-[0.99] soft-shadow"
            style={{ background:'linear-gradient(135deg, #fff7ed, #fffbeb)', border:'1.5px solid #fed7aa' }}>
            <div className="flex items-center justify-between mb-1.5">
              <div className="flex items-center gap-2">
                <span style={{ fontSize:'20px' }}>🔥</span>
                <span className="font-bold text-base" style={{ color:'#b45309' }}>Từ chưa thuộc — HSK {currentLevel}</span>
              </div>
              <span className="text-sm font-bold px-2.5 py-1 rounded-lg" style={{ background:'#fff', color:'#b45309', border:'1px solid #fed7aa' }}>{weakLevel.total} từ</span>
            </div>
            <div className="text-xs mb-2.5" style={{ color:'#9a6a2c' }}>Gộp toàn bộ từ Quên/Khó/đang học của cả cấp — học một thể các từ lẻ còn sót ở nhiều bộ.</div>
            <div className="flex flex-wrap gap-1.5 text-[11px]">
              {weakLevel.forgot > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'#fff', color:RATE_COLOR[1], border:`1px solid ${RATE_COLOR[1]}40` }}>● Quên {weakLevel.forgot}</span>}
              {weakLevel.hard > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'#fff', color:RATE_COLOR[2], border:`1px solid ${RATE_COLOR[2]}40` }}>● Khó {weakLevel.hard}</span>}
              {weakLevel.learning > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'#fff', color:'#f59e0b', border:'1px solid #fde68a' }}>● Đang học {weakLevel.learning}</span>}
              {weakLevel.leech > 0 && <span className="px-2 py-1 rounded-lg font-semibold" style={{ background:'#fff', color:'#b45309', border:'1px solid #fed7aa' }}>🔥 Leech {weakLevel.leech}</span>}
            </div>
          </button>
        )}

        {/* lưới các bộ */}
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {Array.from({ length: deckCount }, (_, k) => {
            const di = deckInfo(k);
            const segs = [
              { n: di.b[4], c: RATE_COLOR[4] },
              { n: di.b[3], c: 'var(--accent)' },
              { n: di.b[2], c: RATE_COLOR[2] },
              { n: di.b[1], c: RATE_COLOR[1] },
            ];
            return (
              <button key={k} onClick={() => setSelectedDeck(k)}
                className="text-left rounded-2xl p-4 transition-all hover:scale-[1.02] active:scale-[0.98] soft-shadow"
                style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
                <div className="flex items-center justify-between mb-1">
                  <div className="font-bold" style={{ color:'var(--ink)' }}>Bộ {k + 1}</div>
                  {di.due > 0 && <span className="text-[11px] px-2 py-0.5 rounded-md font-bold" style={{ background:'var(--surface-soft)', color:'var(--accent)' }}>ôn {di.due}</span>}
                </div>
                <div className="text-xs mb-3" style={{ color:'var(--muted)' }}>từ {di.start + 1}–{di.start + di.total} · {di.total} từ</div>
                <div className="flex h-2 rounded-full overflow-hidden mb-2" style={{ background:'var(--surface-soft)' }}>
                  {segs.map((s, i) => s.n > 0 && <div key={i} style={{ width:`${(s.n / di.total) * 100}%`, background:s.c }} />)}
                </div>
                {di.studied > 0 ? (
                  <div className="flex flex-wrap gap-1.5 text-[11px]" style={{ color:'var(--muted)' }}>
                    {di.b[1] > 0 && <span style={{ color:RATE_COLOR[1] }}>●{di.b[1]}</span>}
                    {di.b[2] > 0 && <span style={{ color:RATE_COLOR[2] }}>●{di.b[2]}</span>}
                    {di.b[3] > 0 && <span style={{ color:'var(--accent)' }}>●{di.b[3]}</span>}
                    {di.b[4] > 0 && <span style={{ color:RATE_COLOR[4] }}>●{di.b[4]}</span>}
                    <span className="ml-auto">đã học {di.studied}/{di.total}</span>
                  </div>
                ) : (
                  <div className="text-[11px]" style={{ color:'var(--muted)', opacity:0.7 }}>chưa bắt đầu</div>
                )}
              </button>
            );
          })}
        </div>

        <div className="mt-5 flex items-center justify-center gap-3 text-[11px]" style={{ color:'var(--muted)' }}>
          <span><span style={{ color:RATE_COLOR[1] }}>●</span> Quên</span>
          <span><span style={{ color:RATE_COLOR[2] }}>●</span> Khó</span>
          <span><span style={{ color:'var(--accent)' }}>●</span> Ổn</span>
          <span><span style={{ color:RATE_COLOR[4] }}>●</span> Dễ</span>
        </div>
      </div>
    );
  }

  // ════════════ MÀN HÌNH KẾT THÚC ════════════
  if (sessionDone) {
    const di = selectedDeck != null ? deckInfo(selectedDeck) : null;
    const remaining = di ? di.due : 0;
    const doRestart = () => {
      if (selectedDeck != null && di && di.ws.length) startWords(di.ws, 'deck');
      else if (['today', 'cram', 'leech', 'extra'].includes(sessionMode)) startSession(sessionMode);
      else resetSession();
    };
    return (
      <div className="max-w-lg mx-auto px-6 py-8">
        <SessionEndScreen
          stats={sessionStats}
          remaining={remaining}
          onContinue={() => { if (di && di.dueW.length) startWords(di.dueW, 'deck-due'); else resetSession(); }}
          onReset={resetSession}
          onRestart={doRestart}
          onBack={() => { resetSession(); setSelectedDeck(null); }}
        />
      </div>
    );
  }

  if (!currentWord) {
    return (
      <div className="max-w-2xl mx-auto px-6 py-8 text-center">
        <div className="text-5xl mb-4 hanzi-text" style={{ color:'var(--accent-soft)' }}>空</div>
        <div className="font-semibold mb-2" style={{ color:'var(--ink)' }}>Hết từ trong phiên này</div>
        <button onClick={resetSession} className="px-6 py-3 rounded-2xl text-sm font-semibold" style={{ background:'var(--accent)', color:'white' }}>Quay lại</button>
      </div>
    );
  }

  const sessionProgress = sessionIdx / Math.max(sessionQueue.length, 1);
  const modeBadge = isCram ? 'ÔN TỰ DO' : sessionMode === 'level-weak' ? `TỪ CHƯA THUỘC · HSK ${currentLevel}` : sessionMode === 'deck-due' ? 'CẦN ÔN' : sessionMode === 'deck-weak' ? 'TỪ YẾU' : sessionMode === 'deck-new' ? 'TỪ MỚI' : (selectedDeck != null ? `BỘ ${selectedDeck + 1}` : null);

  // ════════════ PHIÊN HỌC ════════════
  return (
    <div className="max-w-2xl mx-auto px-4 py-6 relative select-none">

      {feedback && (
        <div className="fixed top-20 left-1/2 z-[100] flex items-center gap-3 px-5 py-3.5 rounded-2xl soft-shadow-lg"
          style={{ transform:'translateX(-50%)', background:feedback.bg, border:`1.5px solid ${feedback.border}`, animation:'slideUp 0.25s ease-out', minWidth:'220px', maxWidth:'320px' }}>
          <div style={{ fontSize:'24px', lineHeight:1 }}>{feedback.emoji}</div>
          <div className="flex-1">
            <div style={{ color:feedback.color, fontWeight:700, fontSize:'14px' }}>{feedback.label}</div>
            <div style={{ color:feedback.color, fontSize:'12px', opacity:0.75 }}>{isCram ? 'Ôn tự do' : `Ôn lại sau ${feedback.interval}`}</div>
          </div>
          <div className="hanzi-text" style={{ color:feedback.color, fontSize:'20px', fontWeight:500, opacity:0.8 }}>{currentWord.hanzi}</div>
        </div>
      )}

      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <button onClick={resetSession} className="flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-xl transition-all hover:scale-105"
            style={{ background:'var(--surface)', color:'var(--muted)', border:'1px solid var(--border)' }}>← Thoát</button>
          <div className="text-center flex items-center gap-2">
            {modeBadge && <span className="px-2 py-0.5 rounded-md text-[10px] font-bold" style={{ background:'var(--surface-soft)', color:'var(--accent)' }}>{modeBadge}</span>}
            <span style={{ fontSize:'12px', color:'var(--muted)', fontWeight:500 }}>{sessionIdx + 1} / {sessionQueue.length}</span>
          </div>
          <div className="flex items-center gap-2">
            <div className="px-2 py-0.5 rounded-md text-[10px] font-bold" style={{ background:srsStatusLabel.bg, color:srsStatusLabel.color }}>{srsStatusLabel.label}</div>
            <button onClick={() => speak(currentWord.hanzi)} className="w-8 h-8 rounded-full flex items-center justify-center transition-all hover:scale-110" style={{ background:'var(--accent)', color:'white', fontSize:'13px' }}>🔊</button>
          </div>
        </div>
        <div className="h-1.5 rounded-full overflow-hidden" style={{ background:'var(--surface-soft)' }}>
          <div className="h-full rounded-full transition-all duration-500" style={{ width:`${sessionProgress*100}%`, background:'linear-gradient(90deg, var(--accent), var(--accent-2))' }} />
        </div>
      </div>

      {/* Thẻ */}
      <div className="mb-5" style={{ perspective:'1600px' }}>
        <div key={sessionIdx} className="relative cursor-pointer transition-transform duration-500 fc-enter"
          onClick={() => { if (!feedback && !(typingMode && !flipped)) setFlipped(f => !f); }}
          onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
          style={{ transformStyle:'preserve-3d', transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)', height:'clamp(400px, 62vw, 460px)', width:'100%' }}>

          {/* MẶT TRƯỚC */}
          <div className="absolute inset-0 rounded-3xl soft-shadow-lg flex flex-col items-center justify-center p-8 overflow-hidden"
            style={{ background:'linear-gradient(150deg, var(--surface) 0%, var(--surface-soft) 100%)', border:'1px solid var(--border)', backfaceVisibility:'hidden', WebkitBackfaceVisibility:'hidden' }}>
            {/* quầng sáng theo thanh điệu */}
            <div className="absolute pointer-events-none" style={{ width:'60%', height:'60%', borderRadius:'50%', background:firstToneColor, opacity:0.10, filter:'blur(46px)', top:'18%' }} />
            <div className="absolute top-4 right-4 px-2 py-0.5 rounded-md text-[10px]" style={{ background:'var(--surface)', color:'var(--muted)', border:'1px solid var(--border)' }}>{currentWord.type}</div>
            <div className="text-[11px] tracking-[0.25em] mb-5 relative" style={{ color:'var(--muted)', fontWeight:500 }}>{typingMode ? 'GÕ PINYIN CỦA TỪ NÀY' : 'NHẤN ĐỂ XEM NGHĨA'}</div>
            <div className="flex-1 flex items-center justify-center w-full relative">
              <div className="hanzi-text text-center" style={{ color:'var(--ink)', fontWeight:500, lineHeight:1.1,
                fontSize: currentWord.hanzi.length <= 2 ? 'clamp(76px,15vw,116px)' : currentWord.hanzi.length <= 4 ? 'clamp(54px,10vw,86px)' : 'clamp(40px,8vw,64px)' }}>
                {currentWord.hanzi}
              </div>
            </div>
            <div className="flex gap-1.5 mb-3 relative">
              {currentWord.pinyin.split(' ').filter(p => p.trim()).map((syl, i) => (
                <div key={i} className="w-2 h-2 rounded-full" style={{ background: TONE_COLORS[getToneColor(syl)] || 'var(--border)' }} />
              ))}
            </div>
            {typingMode ? (
              <div className="w-full max-w-xs relative" onClick={e => e.stopPropagation()}>
                <input ref={inputRef} value={typed} onChange={e => setTyped(e.target.value)}
                  placeholder="vd: ni hao" autoComplete="off" autoCapitalize="off" spellCheck="false"
                  className="w-full px-4 py-2.5 rounded-xl text-center text-base outline-none"
                  style={{ background:'var(--bg)', border:'1.5px solid var(--border)', color:'var(--ink)' }} />
                <button onClick={checkTyped} className="w-full mt-2 py-2 rounded-xl text-sm font-semibold" style={{ background:'var(--accent)', color:'white' }}>Kiểm tra (Enter)</button>
              </div>
            ) : (
              <div className="text-xs relative" style={{ color:'var(--muted)', opacity:0.6 }}>👆 Chạm để lật</div>
            )}
          </div>

          {/* MẶT SAU */}
          <div className="absolute inset-0 rounded-3xl soft-shadow-lg flex flex-col p-5"
            style={{ background:'var(--surface)', border:'1.5px solid var(--accent-soft)', backfaceVisibility:'hidden', WebkitBackfaceVisibility:'hidden', transform:'rotateY(180deg)' }}>
            {typedResult && (
              <div className="text-center mb-1 text-xs font-bold" style={{ color: typedResult === 'correct' ? '#10b981' : '#dc2f2f' }}>
                {typedResult === 'correct' ? '✓ Bạn gõ đúng!' : `✗ Bạn gõ: ${typed || '(trống)'}`}
              </div>
            )}
            <div className="text-center pb-3 mb-3" style={{ borderBottom:'1px dashed var(--border)' }}>
              <div className="hanzi-text mb-1" style={{ color:'var(--ink)', fontWeight:500, fontSize: currentWord.hanzi.length <= 2 ? '42px' : '32px' }}>{currentWord.hanzi}</div>
              <div className="mb-2"><ColoredPinyin pinyin={currentWord.pinyin} size="xl" /></div>
              <div className="text-xl font-semibold" style={{ color:'var(--ink)' }}>{currentWord.meaning}</div>
            </div>
            <div className="flex-1 flex flex-col justify-center overflow-y-auto">
              <div className="text-[10px] tracking-widest mb-2 text-center" style={{ color:'var(--accent)', fontWeight:600 }}>✨ VÍ DỤ</div>
              {(() => {
                const ex = (currentWord.examples && currentWord.examples[0]) || { hanzi: currentWord.example, pinyin: currentWord.examplePinyin, meaning: currentWord.exampleMeaning };
                if (!ex.hanzi) return null;
                return (
                  <>
                    <button onClick={(e) => { e.stopPropagation(); speak(ex.hanzi); }} className="text-center mb-1.5 hanzi-text hover:opacity-80 transition-opacity"
                      style={{ color:'var(--ink)', fontWeight:500, fontSize:'clamp(15px,3vw,20px)', lineHeight:1.4 }}>
                      {ex.hanzi} <span style={{ fontSize:'12px' }}>🔊</span>
                    </button>
                    <div className="text-center mb-1.5"><ColoredPinyin pinyin={ex.pinyin} size="sm" /></div>
                    <div className="text-center text-sm italic" style={{ color:'var(--muted)' }}>{ex.meaning}</div>
                  </>
                );
              })()}
            </div>
            <div className="text-center mt-2 text-[10px]" style={{ color:'var(--muted)', opacity:0.5 }}>← Vuốt trái: Quên | Vuốt phải: Dễ →</div>
          </div>
        </div>
      </div>

      {/* Nút đánh giá / lật */}
      {flipped ? (
        <div>
          <div className="text-center mb-3"><div className="text-xs tracking-widest" style={{ color:'var(--muted)', fontWeight:600 }}>{isCram ? 'TIẾP TỤC' : 'BẠN NHỚ ĐƯỢC KHÔNG?'}</div></div>
          <div className="grid grid-cols-4 gap-2">
            {RATING_CONFIG.map(({ rating, label, emoji, key, bg, color, border, recommended }) => {
              const previewInterval = (() => { try { return formatInterval(fsrsUpdateState(currentCardSRS, rating).interval); } catch { return '—'; } })();
              return (
                <button key={rating} onClick={() => handleRate(rating)} disabled={!!feedback}
                  className="relative py-3.5 px-2 rounded-2xl transition-all hover:scale-[1.04] hover:-translate-y-0.5 active:scale-[0.97] flex flex-col items-center gap-1.5 soft-shadow"
                  style={{ background:bg, color, border:`1.5px solid ${border}`, boxShadow: recommended ? `0 4px 16px ${color}30` : undefined, opacity: feedback ? 0.4 : 1 }}>
                  <div className="absolute top-1.5 left-1.5 w-5 h-5 rounded-md flex items-center justify-center text-[10px] font-bold" style={{ background:border, color, opacity:0.7 }}>{key}</div>
                  {recommended && <div className="absolute top-1 right-1 text-[9px] font-bold px-1 rounded" style={{ background:color, color:'white' }}>★</div>}
                  <div style={{ fontSize:'24px', lineHeight:1 }}>{emoji}</div>
                  <div style={{ fontWeight:700, fontSize:'13px' }}>{label}</div>
                  {!isCram && <div className="text-[10px] font-semibold px-2 py-0.5 rounded-md" style={{ background:border, opacity:0.9 }}>{previewInterval}</div>}
                </button>
              );
            })}
          </div>
        </div>
      ) : !typingMode ? (
        <div className="text-center">

// ── Question Generators ──
const generateMCQ = (word, pool) => {
  const distractors = pool.filter(w => w.id !== word.id).sort(() => Math.random() - 0.5).slice(0, 3);
  return {
    type: 'mcq', word,
    prompt: word.hanzi,
    promptPinyin: word.pinyin,
    correct: word.meaning,
    options: [...distractors.map(w => w.meaning), word.meaning].sort(() => Math.random() - 0.5),
  };
};

const generateHanziMCQ = (word, pool) => {
  const distractors = pool.filter(w => w.id !== word.id).sort(() => Math.random() - 0.5).slice(0, 3);
  return {
    type: 'hanzi_mcq', word,
    prompt: word.meaning,
    promptSub: word.pinyin,
    correct: word.hanzi,
    options: [...distractors.map(w => w.hanzi), word.hanzi].sort(() => Math.random() - 0.5),
  };
};

const generateCloze = (word, pool) => {
  const ex = (word.examples && word.examples[0]) || { hanzi: word.example, pinyin: word.examplePinyin, meaning: word.exampleMeaning };
  if (!ex?.hanzi || !ex.hanzi.includes(word.hanzi)) {
    // Fallback to MCQ if cloze not possible
    return generateMCQ(word, pool);
  }
  const blanked = ex.hanzi.replace(word.hanzi, '___');
  const distractors = pool.filter(w => w.id !== word.id).sort(() => Math.random() - 0.5).slice(0, 3);
  return {
    type: 'cloze', word,
    prompt: blanked,
    promptSub: ex.meaning,
    correct: word.hanzi,
    options: [...distractors.map(w => w.hanzi), word.hanzi].sort(() => Math.random() - 0.5),
  };
};

const generatePinyinInput = (word) => ({
  type: 'pinyin', word,
  prompt: word.hanzi,
  promptSub: word.meaning,
  correct: word.pinyin,
  inputMode: true,
});

const generateMeaningInput = (word) => ({
  type: 'meaning', word,
  prompt: word.hanzi,
  promptPinyin: word.pinyin,
  correct: word.meaning,
  inputMode: true,
});

const generateSentenceBuilder = (word, pool) => {
  const ex = (word.examples && word.examples[0]) || { hanzi: word.example, meaning: word.exampleMeaning };
  if (!ex?.hanzi || ex.hanzi.length < 4) return generateMCQ(word, pool);

  // Smart word segmentation using ALL_HSK dictionary — prefer multi-char words
  const text = ex.hanzi;
  const segments = [];
  let i = 0;
  while (i < text.length) {
    if (!/[\u4e00-\u9fff，。！？、：；]/.test(text[i])) { i++; continue; }
    let matched = null;
    // Try longest match: 4→3→2→1
    for (let len = 4; len >= 2 && !matched; len--) {
      if (i + len > text.length) continue;
      const slice = text.slice(i, i + len);
      for (let l = 1; l <= 6 && !matched; l++) {
        if ((ALL_HSK[l] || []).some(w => w.hanzi === slice)) matched = slice;
      }
    }
    if (matched) { segments.push(matched); i += matched.length; }
    else { segments.push(text[i]); i++; }
  }

  // Filter out punctuation segments, keep meaningful parts
  const wordParts = segments.filter(s => /[\u4e00-\u9fff]/.test(s));
  if (wordParts.length < 3) return generateMCQ(word, pool);

  // Cap at 7 parts for usability
  const parts = wordParts.slice(0, 7);
  return {
    type: 'sentence', word,
    prompt: ex.meaning,
    promptSub: `(${word.hanzi} — ${word.meaning})`,
    correct: parts.join(''),     // joined correct answer
    correctOrder: [...parts],    // correct sequence
    parts: [...parts].sort(() => Math.random() - 0.5),  // shuffled
  };
};

// ── Sentence Builder Component (rebuilt) ──
const SentenceBuilder = ({ parts, correctOrder, correct, onSubmit }) => {
  const [selected, setSelected] = useState([]);      // { word, originalIdx }[]
  const [remaining, setRemaining] = useState(
    parts.map((word, idx) => ({ word, idx }))
  );
  const [submitted, setSubmitted] = useState(false);
  const [isCorrect, setIsCorrect] = useState(null);
  const [shaking, setShaking] = useState(false);

  const addWord = (item) => {
    if (submitted) return;
    setSelected(s => [...s, item]);
    setRemaining(r => r.filter(x => x.idx !== item.idx));
  };

  const removeWord = (item, selIdx) => {
    if (submitted) return;
    setSelected(s => s.filter((_, i) => i !== selIdx));
    setRemaining(r => {
      // Re-insert at roughly original position
      const newR = [...r, item];
      newR.sort((a, b) => a.idx - b.idx);
      return newR;
    });
  };

  const handleSubmit = () => {
    if (selected.length === 0 || submitted) return;
    const answer = selected.map(x => x.word).join('');
    // Compare against correct (normalize whitespace)
    const correctNorm = (correct || correctOrder.join('')).replace(/\s/g, '');
    const answerNorm = answer.replace(/\s/g, '');
    const ok = answerNorm === correctNorm;
    setIsCorrect(ok);
    setSubmitted(true);
    if (!ok) {
      setShaking(true);
      setTimeout(() => setShaking(false), 600);
    }
    setTimeout(() => onSubmit(answer), ok ? 800 : 1200);
  };

  const handleReset = () => {
    setSelected([]);
    setRemaining(parts.map((word, idx) => ({ word, idx })));
    setSubmitted(false);
    setIsCorrect(null);
    setShaking(false);
  };

  // Keyboard: Enter to submit, Backspace to remove last
  useEffect(() => {
    const handler = (e) => {
      if (submitted) return;
      if (e.key === 'Enter' && selected.length > 0) { e.preventDefault(); handleSubmit(); }
      if (e.key === 'Backspace' && selected.length > 0) {
        e.preventDefault();
        const last = selected[selected.length - 1];
        removeWord(last, selected.length - 1);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [selected, submitted]);

  const answerBg = submitted
    ? (isCorrect ? '#d1fae5' : '#fee2e2')
    : selected.length > 0 ? 'var(--surface-soft)' : 'var(--bg)';
  const answerBorder = submitted
    ? (isCorrect ? '2px solid #6ee7b7' : '2px solid #fca5a5')
    : '2px dashed var(--accent-soft)';

  return (
    <div>
      {/* Answer zone — where selected words appear */}
      <div className="text-[10px] tracking-widest mb-2 font-bold" style={{ color: 'var(--muted)' }}>
        XẾP TỪ VÀO ĐÂY (nhấn từ bên dưới):
      </div>
      <div
        className="min-h-[60px] p-3 rounded-2xl mb-4 flex flex-wrap gap-2 items-center transition-all"
        style={{
          background: answerBg,
          border: answerBorder,
          animation: shaking ? 'shake 0.5s ease' : 'none',
        }}>
        {selected.length === 0 && !submitted && (
          <span className="text-sm" style={{ color: 'var(--muted)', fontStyle: 'italic' }}>
            Nhấn từ bên dưới để đặt vào đây...
          </span>
        )}
        {selected.map((item, i) => (
          <button
            key={`sel-${item.idx}-${i}`}
            onClick={() => !submitted && removeWord(item, i)}
            className="hanzi-text px-3 py-2 rounded-xl font-medium transition-all hover:opacity-75 active:scale-95"
            style={{
              background: submitted
                ? (isCorrect ? '#10b981' : '#ef4444')
                : 'linear-gradient(135deg, var(--accent), var(--accent-2))',
              color: 'white',
              fontSize: '20px',
              cursor: submitted ? 'default' : 'pointer',
              boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
            }}>
            {item.word}
          </button>
        ))}
        {submitted && isCorrect && (
          <span className="ml-1 text-sm font-bold" style={{ color: '#065f46' }}>✓</span>
        )}
        {submitted && !isCorrect && selected.length > 0 && (
          <span className="ml-1 text-sm font-bold" style={{ color: '#991b1b' }}>✗</span>
        )}
      </div>

      {/* Correct answer reveal on wrong */}
      {submitted && !isCorrect && (
        <div className="mb-3 p-3 rounded-xl" style={{ background: '#fef3c7', border: '1px solid #fde68a' }}>
          <div className="text-[10px] tracking-widest mb-1 font-bold" style={{ color: '#92400e' }}>ĐÁP ÁN ĐÚNG:</div>
          <div className="hanzi-text text-xl font-medium" style={{ color: '#78350f' }}>
            {correctOrder.join('')}
          </div>
        </div>
      )}

      {/* Word bank */}
      <div className="text-[10px] tracking-widest mb-2 font-bold" style={{ color: 'var(--muted)' }}>
        TỪ CÓ SẴN:
      </div>
      <div className="flex flex-wrap gap-2 mb-4 min-h-[48px]"
        style={{ padding: '10px', background: 'var(--bg)', borderRadius: '16px', border: '1px solid var(--border)' }}>
        {remaining.length === 0 && !submitted && (
          <span className="text-sm" style={{ color: 'var(--muted)', fontStyle: 'italic', margin: 'auto' }}>
            Đã dùng hết — nhấn Kiểm tra!
          </span>
        )}
        {remaining.map((item) => (
          <button
            key={`rem-${item.idx}`}
            onClick={() => addWord(item)}
            disabled={submitted}
            className="hanzi-text px-3 py-2 rounded-xl font-medium transition-all hover:scale-105 active:scale-95 disabled:opacity-50"
            style={{
              background: 'var(--surface)',
              color: 'var(--ink)',
              border: '1.5px solid var(--border)',
              fontSize: '20px',
              boxShadow: '0 2px 4px rgba(0,0,0,0.08)',
            }}>
            {item.word}
          </button>
        ))}
      </div>

      {/* Controls */}
      {!submitted ? (
        <div className="flex gap-2">
          <button onClick={handleSubmit} disabled={selected.length === 0}
            className="flex-1 py-3 rounded-2xl font-bold text-base transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-40"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white' }}>
            Kiểm tra ✓ <span className="text-xs opacity-70">(Enter)</span>
          </button>
          <button onClick={handleReset}
            className="px-4 py-3 rounded-2xl font-semibold text-sm transition-all hover:scale-[1.02]"
            style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
            🔄 Reset <span className="text-xs opacity-70">(⌫)</span>
          </button>
        </div>
      ) : (
        <div className="text-center text-sm py-2" style={{ color: 'var(--muted)' }}>
          {isCorrect ? '🎉 Đang chuyển câu tiếp...' : '❌ Xem đáp án → câu tiếp...'}

      </div>

const buildQuizSession = (level, quizType, count = 10, srsData = {}) => {
  const pool = ALL_HSK[level] || [];
  if (pool.length < 4) return [];

  // Prioritize due/weak words
  const now = Date.now();
  const sorted = [...pool].sort((a, b) => {
    const da = srsData[a.id], db = srsData[b.id];
    if (!da && !db) return Math.random() - 0.5;
    if (!da) return -1; // never reviewed = higher priority
    if (!db) return 1;
    const overdueA = da.nextReview <= now ? 1 : 0;
    const overdueB = db.nextReview <= now ? 1 : 0;
    return overdueB - overdueA || Math.random() - 0.5;
  });

  const selected = sorted.slice(0, Math.min(count, pool.length));
  return selected.map(w => {
    switch (quizType) {
      case 'mcq':       return generateMCQ(w, pool);
      case 'hanzi_mcq': return generateHanziMCQ(w, pool);
      case 'cloze':     return generateCloze(w, pool);
      case 'pinyin':    return generatePinyinInput(w);
      case 'meaning':   return generateMeaningInput(w);
      case 'sentence':  return generateSentenceBuilder(w, pool);
      default:          return generateMCQ(w, pool);
    }
  }).filter(Boolean);
};

const QuizView = ({ toggleLearned, learned, addQuizScore, srsData }) => {
  const [phase, setPhase] = useState('setup'); // 'setup' | 'quiz' | 'result' | 'error_recall'
  const [hskLevel, setHskLevel] = useState(1);
  const [quizType, setQuizType] = useState('mcq');
  const [questionCount, setQuestionCount] = useState(10);
  const [questions, setQuestions] = useState([]);
  const [currentQ, setCurrentQ] = useState(0);
  const [score, setScore] = useState(0);
  const [selectedAns, setSelectedAns] = useState(null);
  const [userInput, setUserInput] = useState('');
  const [sentenceAnswer, setSentenceAnswer] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [errors, setErrors] = useState([]);
  const [sessionErrors, setSessionErrors] = useState([]);
  const [quizStreak, setQuizStreak] = useState(0);    // consecutive correct answers
  const [bestStreak, setBestStreak] = useState(0);    // best streak this session
  const [hintUsed, setHintUsed] = useState(false);    // hint used for current question
  const [showHint, setShowHint] = useState(false);    // hint visible
  const [errorRecallIdx, setErrorRecallIdx] = useState(0); // for error recall phase
  const [errorRecallResult, setErrorRecallResult] = useState(null);
  const inputRef = useRef(null);

  const currentQuestion = questions[currentQ];

  // Auto-speak on new question
  useEffect(() => {
    if (!currentQuestion || phase !== 'quiz' || showResult) return;
    if (currentQuestion.type !== 'hanzi_mcq' && currentQuestion.type !== 'sentence') {
      const t = setTimeout(() => speak(currentQuestion.word.hanzi), 300);
      return () => clearTimeout(t);
    }
  }, [currentQ, questions, phase]);

  // Auto-focus input
  useEffect(() => {
    if (currentQuestion?.inputMode && !showResult && inputRef.current) {
      setTimeout(() => inputRef.current?.focus(), 150);
    }
  }, [currentQ, showResult, currentQuestion]);

  // Reset hint on question change
  useEffect(() => {
    setHintUsed(false);
    setShowHint(false);
  }, [currentQ]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (phase !== 'quiz') return;
      if (currentQuestion?.type === 'mcq' || currentQuestion?.type === 'hanzi_mcq' || currentQuestion?.type === 'cloze') {
        const n = parseInt(e.key);
        if (n >= 1 && n <= 4 && !showResult && currentQuestion.options?.[n-1]) {
          handleAnswer(currentQuestion.options[n - 1]);
        }
      }
      if (showResult && (e.key === 'Enter' || e.key === 'ArrowRight')) { e.preventDefault(); advance(); }
      if (e.code === 'Space' && !showResult) { e.preventDefault(); speak(currentQuestion?.word?.hanzi || ''); }
      if ((e.key === 'h' || e.key === 'H') && !showResult && !hintUsed) { e.preventDefault(); handleHint(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [phase, currentQuestion, showResult, hintUsed]);

  const startQuiz = () => {
    const qs = buildQuizSession(hskLevel, quizType, questionCount, srsData || {});
    if (qs.length === 0) return;
    setQuestions(qs);
    setCurrentQ(0); setScore(0);
    setSelectedAns(null); setUserInput('');
    setSentenceAnswer(null);
    setShowResult(false);
    setSessionErrors([]);
    setQuizStreak(0); setBestStreak(0);
    setHintUsed(false); setShowHint(false);
    setPhase('quiz');
  };

  const handleHint = () => {
    if (hintUsed || showResult || !currentQuestion) return;
    setHintUsed(true);
    setShowHint(true);
  };

  const handleAnswer = (answer) => {
    if (showResult || !currentQuestion) return;
    setSelectedAns(answer);
    setShowResult(true);

    const correct = currentQuestion.correct;
    let isCorrect = false;

    if (currentQuestion.type === 'pinyin') {
      isCorrect = pinyinMatch(answer, correct) !== 'wrong';
    } else if (currentQuestion.type === 'meaning') {
      const a = answer.toLowerCase().trim(), c = correct.toLowerCase().trim();
      isCorrect = a === c || c.includes(a) || a.includes(c);
    } else if (currentQuestion.type === 'sentence') {
      isCorrect = answer === correct || answer.replace(/\s/g,'') === correct.replace(/\s/g,'');
    } else {
      isCorrect = answer === correct;
    }

    // Streak tracking
    if (isCorrect) {
      setScore(s => s + 1);
      setQuizStreak(s => {
        const next = s + 1;
        setBestStreak(b => Math.max(b, next));
        return next;
      });
    } else {
      setQuizStreak(0);
      const errEntry = { word: currentQuestion.word, userAnswer: answer, correct, type: currentQuestion.type };
      setSessionErrors(prev => [...prev, errEntry]);
    }
  };

  const handleInputSubmit = () => {
    if (!userInput.trim()) return;
    handleAnswer(userInput.trim());
  };

  const advance = () => {
    const nextIdx = currentQ + 1;
    if (nextIdx >= questions.length) {
      addQuizScore({ level: hskLevel, score, total: questions.length, date: Date.now() });
      setErrors(sessionErrors);
      setPhase('result');
    } else {
      setCurrentQ(nextIdx);
      setSelectedAns(null);
      setUserInput('');
      setSentenceAnswer(null);
      setShowResult(false);
    }
  };

  // Hint content generator
  const getHint = () => {
    if (!currentQuestion) return null;
    const w = currentQuestion.word;
    switch (currentQuestion.type) {
      case 'mcq':       return `Pinyin: ${w.pinyin}`;
      case 'hanzi_mcq': return `Bắt đầu bằng: ${w.hanzi[0]}`;

      case 'meaning':   return `Bắt đầu bằng: "${w.meaning[0]}"`;
      default:          return null;
    }
  };

  // ── SETUP SCREEN ──
  if (phase === 'setup') {
    return (
      <div className="max-w-2xl mx-auto px-6 py-8">
        <div className="mb-8">
          <div className="text-xs tracking-[0.3em] mb-2" style={{ color: 'var(--accent)' }}>测验 · KIỂM TRA</div>

          {/* HSK Level */}
          <div className="flex gap-2 flex-wrap mb-6">
            {[1,2,3,4,5,6].map(l => (
              <button key={l} onClick={() => setHskLevel(l)}
                className="relative px-4 py-2 rounded-2xl font-semibold text-sm transition-all"

          {/* Quiz type cards */}
          <div className="space-y-2.5 mb-6">

              </div>
            ))}
          </div>

          {/* Question count */}
          <div className="flex items-center gap-3 mb-6 p-4 rounded-2xl"

            <span className="text-sm font-semibold" style={{ color: 'var(--ink)' }}>Số câu hỏi:</span>
            {[5, 10, 15, 20].map(n => (
              <button key={n} onClick={() => setQuestionCount(n)}

                {n}
              </button>
            ))}
          </div>

          {/* Adaptive mode notice */}
          {srsData && Object.keys(srsData).length > 0 && (
            <div className="flex items-center gap-2 mb-4 p-3 rounded-2xl text-xs"
              style={{ background: 'var(--surface-soft)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
              <span style={{ fontSize: '14px' }}>🎯</span>
              <span>Câu hỏi ưu tiên các từ <strong style={{ color: 'var(--ink)' }}>đến hạn ôn / chưa học</strong> theo lịch SRS của bạn</span>
            </div>
          )}

          <button onClick={startQuiz}
            className="w-full py-4 rounded-2xl font-bold text-lg transition-all hover:scale-[1.02] active:scale-[0.98]"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white', boxShadow: '0 6px 24px rgba(61,139,209,0.4)' }}>

          <div className="mt-4 text-xs text-center" style={{ color: 'var(--muted)' }}>

            <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>H</kbd> xem gợi ý &nbsp;·&nbsp;

// Helper: Load HanziWriter library lazily
const loadHanziWriter = () => {
  return new Promise((resolve, reject) => {
    if (window.HanziWriter) return resolve(window.HanziWriter);
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.7/dist/hanzi-writer.min.js';
    script.onload = () => resolve(window.HanziWriter);
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

// ============ LISTENING & DICTATION SYSTEM ============

// ── Pinyin normalizer: strip tones for comparison ──
const stripTones = (s) => s.toLowerCase()
  .replace(/[āáǎà]/g, 'a').replace(/[ēéěè]/g, 'e').replace(/[īíǐì]/g, 'i')
  .replace(/[ōóǒò]/g, 'o').replace(/[ūúǔù]/g, 'u').replace(/[ǖǘǚǜü]/g, 'v')
  .replace(/\s+/g, ' ').trim();

// Normalize pinyin for search — removes tones AND spaces for compact match
// e.g. "nǐhǎo" → "nihao", "ni hao" → "nihao"
const normalizePinyin = (s) => stripTones(s).replace(/\s/g, '');

// Compare user input to correct pinyin (lenient: ignore tones, spacing)
const pinyinMatch = (input, correct) => {
  const normalIn = stripTones(input);
  const normalCor = stripTones(correct);
  if (normalIn === normalCor) return 'exact';
  if (normalIn.replace(/\s/g,'') === normalCor.replace(/\s/g,'')) return 'close';
  return 'wrong';
};

// ── Speed config ──
const SPEEDS = [
  { id: 'slow',   label: '🐢 Chậm',        rate: SPEAK_RATE.slow,   color: '#10b981', desc: 'Rõ ràng từng âm tiết' },
  { id: 'normal', label: '▶ Bình thường',   rate: SPEAK_RATE.normal, color: 'var(--accent)', desc: 'Tốc độ học tập' },
  { id: 'fast',   label: '⚡ Nhanh',        rate: SPEAK_RATE.fast,   color: '#f59e0b', desc: 'Gần tốc độ native' },
];

// ── Build exercise pool from ALL_HSK ──
const buildExercises = (hskLevel, srsData, mode) => {
  const words = ALL_HSK[hskLevel] || [];
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  if (mode === 'dictation' || mode === 'mcq') return shuffled.slice(0, 20);
  // sentence mode: use example sentences
  return shuffled.filter(w => w.example).slice(0, 15);
};

// ── MCQ Choices generator ──
const buildMCQChoices = (correct, level, field) => {
  const pool = ALL_HSK[level] || [];
  const distractors = pool
    .filter(w => w[field] !== correct[field])
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(w => ({ text: w[field], id: w.id }));
  const choices = [
    { text: correct[field], id: correct.id, isCorrect: true },
    ...distractors,
  ].sort(() => Math.random() - 0.5);
  return choices;
};

// ── Animated Sound Wave ──
const SoundWave = ({ playing, size = 32 }) => {
  const bars = 5;
  return (

        <div key={i}

            width: Math.floor(size / 8),
            background: 'currentColor',

              : `${Math.floor(size * 0.25)}px`,
            animation: playing ? `soundBar 0.6s ease-in-out ${i * 0.1}s infinite alternate` : 'none',
            transition: 'height 0.2s',
          }}
        />
      ))}
    </div>
  );
};
