            {/* HSK badge */}
            <div className="flex items-center justify-between px-6 pt-5 pb-2">
              <span className="px-2 py-0.5 rounded-md text-[10px] font-bold"
                style={{ background: 'var(--surface-soft)', color: 'var(--accent)', border: '1px solid var(--border)' }}>
                HSK {hskLevel}
              </span>
              <span className="text-xs" style={{ color: 'var(--muted)' }}>
                {mode === 'sentence' ? '例句 · Câu ví dụ' : '词语 · Từ vựng'}
              </span>
            </div>

            {/* Play button area */}
            <div className="flex flex-col items-center justify-center px-6 py-6">
              <button
                onClick={playAudio}
                disabled={playing}
                className="relative flex flex-col items-center gap-4 transition-all hover:scale-[1.04] active:scale-95"
                style={{ cursor: playing ? 'default' : 'pointer' }}>

                {/* Big play circle */}
                <div className="w-28 h-28 rounded-full flex items-center justify-center soft-shadow transition-all"
                  style={{
                    background: playing
                      ? `linear-gradient(135deg, ${modeConfig.color}, ${modeConfig.color}cc)`
                      : 'linear-gradient(135deg, var(--accent), var(--accent-2))',
                    boxShadow: playing ? `0 8px 32px ${modeConfig.color}60` : '0 8px 24px rgba(61,139,209,0.35)',
                    color: 'white',
                  }}>
                  <SoundWave playing={playing} size={44} />
                </div>

                <div className="text-sm font-semibold" style={{ color: 'var(--muted)' }}>
                  {playing ? 'Đang phát...' : playCount === 0 ? '▶ Nhấn để nghe' : `🔄 Nghe lại (${playCount} lần)`}
                </div>
              </button>

              {/* Speed indicator for current mode */}
              {mode !== 'speed' && (
                <div className="flex items-center gap-1.5 mt-4">
                  {SPEEDS.map(s => (
                    <button key={s.id}
                      onClick={() => setSpeed(s.id)}
                      className="px-2.5 py-1 rounded-xl text-xs transition-all"
                      style={{
                        background: speed === s.id ? s.color : 'var(--surface)',
                        color: speed === s.id ? 'white' : 'var(--muted)',
                        border: `1px solid ${speed === s.id ? s.color : 'var(--border)'}`,
                        fontWeight: speed === s.id ? 700 : 400,
                      }}>
                      {s.label}
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Result reveal (after answer) */}
            {result && (
              <div className="px-6 pb-5 pt-1" style={{ borderTop: '1px dashed var(--border)' }}>
                <div className="text-center mb-3">
                  <div className="text-xs tracking-widest mb-2 font-bold" style={{ color: 'var(--muted)' }}>ĐÁP ÁN ĐÚNG</div>
                  <button onClick={() => speak(mode === 'sentence' ? word.example : word.hanzi)}
                    className="hanzi-text text-4xl hover:opacity-75 transition-opacity"
                    style={{ color: 'var(--ink)', fontWeight: 500, lineHeight: 1 }}>
                    {mode === 'sentence' ? word.example : word.hanzi} 🔊
                  </button>
                  <div className="mt-2"><ColoredPinyin pinyin={mode === 'sentence' ? word.examplePinyin : word.pinyin} size="lg" /></div>
                  <div className="mt-1 font-semibold" style={{ color: 'var(--ink)' }}>
                    {mode === 'sentence' ? word.exampleMeaning : word.meaning}
                  </div>
                </div>

                {/* Correct/Wrong feedback */}
                <div className={`py-2.5 px-4 rounded-2xl text-sm font-bold text-center mb-3`}
                  style={{
                    background: result === 'correct' ? '#d1fae5' : result === 'close' ? '#fef3c7' : '#fee2e2',
                    color: result === 'correct' ? '#065f46' : result === 'close' ? '#92400e' : '#991b1b',
                  }}>
                  {result === 'correct' ? '🎉 Chính xác!' : result === 'close' ? '👌 Gần đúng (thanh điệu có thể sai)' : '❌ Sai rồi — xem lại đáp án'}
                </div>

                <button onClick={advance}
                  className="w-full py-3 rounded-2xl font-bold text-base transition-all hover:scale-[1.02]"
                  style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white' }}>
                  Câu tiếp → <span className="text-xs opacity-70 ml-1">(Enter / →)</span>
                </button>
              </div>
            )}
          </div>

          {/* ═══════════════════════════════════════════
              MODE-SPECIFIC INPUT AREA
          ═══════════════════════════════════════════ */}

          {/* ── DICTATION mode ── */}
          {mode === 'dictation' && !result && (
            <div>
              <div className="text-xs tracking-widest mb-3 text-center font-bold" style={{ color: 'var(--muted)' }}>
                GÕ PINYIN CỦA TỪ VỪA NGHE
              </div>
              <div className="relative mb-3">
                <input
                  ref={inputRef}
                  type="text"
                  value={userInput}
                  onChange={e => setUserInput(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && userInput.trim()) handleDictationSubmit(); }}
                  placeholder={phase === 'listen' ? 'Nghe xong nhấn Enter để trả lời...' : 'Gõ pinyin vào đây (vd: wǒ ài nǐ hoặc wo ai ni)'}
                  className="w-full px-5 py-4 rounded-2xl text-center text-lg font-semibold outline-none transition-all"
                  style={{ background: 'var(--surface)', color: 'var(--ink)', border: '2px solid var(--accent-soft)', letterSpacing: '0.05em' }}
                />
              </div>
              <div className="text-xs text-center mb-4" style={{ color: 'var(--muted)' }}>
                Gõ có hoặc không có dấu thanh đều được (wǒ = wo)
              </div>
              <div className="flex gap-2">
                <button onClick={handleDictationSubmit}
                  disabled={!userInput.trim()}
                  className="flex-1 py-3 rounded-2xl font-bold text-base transition-all hover:scale-[1.02] disabled:opacity-40"
                  style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white' }}>
                  Kiểm tra ✓
                </button>
                <button onClick={handleSkip}
                  className="px-5 py-3 rounded-2xl font-semibold text-sm transition-all hover:scale-[1.02]"
                  style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
                  Bỏ qua
                </button>
              </div>
            </div>
          )}

          {/* ── MCQ mode ── */}
          {(mode === 'mcq' || mode === 'sentence') && !result && (
            <div>
              <div className="text-xs tracking-widest mb-3 text-center font-bold" style={{ color: 'var(--muted)' }}>
                {mode === 'mcq' ? 'NGHĨA CỦA TỪ VỪA NGHE LÀ GÌ?' : 'CÂU VỪA NGHE CÓ NGHĨA GÌ?'}
              </div>
              <div className="grid grid-cols-1 gap-2.5 mb-3">
                {(mode === 'mcq' ? mcqChoices : buildMCQChoices(word, hskLevel, 'exampleMeaning')).map((choice, i) => (
                  <button key={i}
                    onClick={() => handleMCQSelect(choice)}
                    className="w-full text-left px-4 py-3.5 rounded-2xl transition-all font-medium flex items-center gap-3"
                    style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1.5px solid var(--border)', fontSize: '14px' }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--accent)'; e.currentTarget.style.background = 'var(--surface-soft)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.background = 'var(--surface)'; }}>
                    <span className="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold flex-shrink-0"
                      style={{ background: 'var(--surface-soft)', color: 'var(--accent)' }}>
                      {['A','B','C','D'][i]}
                    </span>
                    <span>{mode === 'mcq' ? choice.text : choice.text}</span>
                  </button>
                ))}
              </div>
              <button onClick={handleSkip}
                className="w-full py-2.5 rounded-2xl font-semibold text-sm transition-all"
                style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
                Bỏ qua ⏭
              </button>
            </div>
          )}

          {/* ── SPEED TRAINING mode ── */}
          {mode === 'speed' && !result && (
            <div>
              <div className="text-xs tracking-widest mb-4 text-center font-bold" style={{ color: 'var(--muted)' }}>
                NGHE TỪ Ở 3 TỐC ĐỘ KHÁC NHAU
              </div>
              <div className="space-y-2.5 mb-5">
                {SPEEDS.map(s => (
                  <button key={s.id}
                    onClick={() => handleSpeedPlay(s.id, s.rate)}
                    disabled={playing}
                    className="w-full p-4 rounded-2xl flex items-center gap-4 transition-all hover:scale-[1.01]"
                    style={{
                      background: speedResults[s.id] ? s.color + '15' : 'var(--surface)',
                      border: `1.5px solid ${speedResults[s.id] ? s.color : 'var(--border)'}`,
                      opacity: playing ? 0.7 : 1,
                    }}>
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0"
                      style={{ background: s.color + '20', color: s.color }}>
                      {speedResults[s.id] ? '✓' : '▶'}
                    </div>
                    <div className="flex-1 text-left">
                      <div className="font-bold text-sm" style={{ color: 'var(--ink)' }}>{s.label}</div>
                      <div className="text-xs" style={{ color: 'var(--muted)' }}>
                        {s.id === 'slow' ? 'Phát âm rõ ràng từng âm tiết' : s.id === 'normal' ? 'Tốc độ học tiêu chuẩn' : 'Gần với tốc độ người bản ngữ'}
                      </div>
                    </div>
                    {speedResults[s.id] && (
                      <div className="text-xs font-bold px-2 py-1 rounded-full"
                        style={{ background: s.color + '20', color: s.color }}>Đã nghe ✓</div>
                    )}
                  </button>
                ))}
              </div>

              {allSpeedsDone ? (
                <div>
                  <div className="p-4 rounded-2xl text-center mb-3" style={{ background: '#d1fae5', border: '1px solid #6ee7b7' }}>
                    <div className="font-bold" style={{ color: '#065f46' }}>✅ Đã nghe đủ 3 tốc độ!</div>
                  </div>
                  <button onClick={() => {
                    setResult('correct');
                    setSessionStats(s => ({ ...s, correct: s.correct + 1, total: s.total + 1 }));
                  }}
                    className="w-full py-3 rounded-2xl font-bold transition-all hover:scale-[1.02]"
                    style={{ background: 'linear-gradient(135deg, #10b981, #34d399)', color: 'white' }}>
                    Xem đáp án và tiếp tục →
                  </button>
                </div>
              ) : (
                <div className="text-xs text-center" style={{ color: 'var(--muted)' }}>
                  Nghe cả 3 tốc độ để tiếp tục
                </div>
              )}
            </div>
          )}
        </>
      )}

      {/* Keyboard hint */}
      <div className="mt-5 text-xs text-center" style={{ color: 'var(--muted)' }}>
        <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'4px',padding:'1px 6px',fontFamily:'monospace' }}>Space</kbd> phát âm
        &nbsp;·&nbsp;
        <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'4px',padding:'1px 6px',fontFamily:'monospace' }}>Enter</kbd> xác nhận
        &nbsp;·&nbsp;
        <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'4px',padding:'1px 6px',fontFamily:'monospace' }}>→</kbd> tiếp theo
        &nbsp;·&nbsp;
        <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'4px',padding:'1px 6px',fontFamily:'monospace' }}>Esc</kbd> thoát
      </div>
    </div>
  );
};

  '大':['太','犬'],'太':['大','犬'],'己':['已','巳'],'已':['己','巳'],
  '在':['再','存'],'再':['在','两'],'土':['士','土'],'士':['土'],
  '木':['本','末','朴'],'本':['末','木'],'末':['本','木'],
  '日':['目','白','曰'],'目':['日','曰'],'白':['日','百'],
  '人':['入','八'],'入':['人','八'],'八':['人','入'],
  '马':['鸟','乌'],'鸟':['马','乌'],'乌':['鸟','马'],
};

// ── Radical Decomposition Panel ──
const RadicalPanel = ({ char }) => {
  const radicals = useMemo(() => {
    const found = [];
    for (const [r, meaning] of Object.entries(RADICAL_MEANINGS)) {
      if (char.includes(r) && r !== char) found.push({ r, meaning });
    }
    return found.slice(0, 4);
  }, [char]);

  const confusion = CONFUSION_PAIRS[char] || [];

  if (radicals.length === 0 && confusion.length === 0) return null;

  return (
    <div className="space-y-3">
      {radicals.length > 0 && (
        <div className="p-3.5 rounded-2xl" style={{ background: 'var(--bg)', border: '1px solid var(--border)' }}>
          <div className="text-[10px] tracking-widest mb-2 font-bold" style={{ color: 'var(--accent)' }}>🧩 BỘ THỦ (RADICAL)</div>
          <div className="flex flex-wrap gap-2">
            {radicals.map(({ r, meaning }) => (
              <div key={r} className="flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl"
                style={{ background: 'var(--surface)', border: '1px solid var(--accent-soft)' }}>
                <span className="hanzi-text font-medium" style={{ fontSize: '20px', color: 'var(--accent-2)' }}>{r}</span>
                <span className="text-xs" style={{ color: 'var(--muted)' }}>{meaning}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {confusion.length > 0 && (
        <div className="p-3.5 rounded-2xl" style={{ background: '#fef3c7', border: '1px solid #fde68a' }}>
          <div className="text-[10px] tracking-widest mb-2 font-bold" style={{ color: '#92400e' }}>⚠️ DỄ NHẦM VỚI</div>
          <div className="flex gap-2 flex-wrap">
            {confusion.map(c => (
              <button key={c} onClick={() => speak(c)}
                className="hanzi-text font-medium px-3 py-1.5 rounded-xl hover:scale-110 transition-all"
                style={{ fontSize: '22px', background: 'white', color: '#92400e', border: '1px solid #fde68a' }}>
                {c}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

// ── Stroke Progress Bar ──
const StrokeProgressBar = ({ current, total, mode }) => {
  if (total === 0 || mode !== 'quiz') return null;
  const pct = total > 0 ? Math.min(100, Math.round((current / total) * 100)) : 0;
  return (
    <div className="mb-3">
      <div className="flex justify-between text-xs mb-1" style={{ color: 'var(--muted)' }}>
        <span>Nét {current} / {total}</span>
        <span style={{ color: pct === 100 ? '#10b981' : 'var(--accent)', fontWeight: 600 }}>
          {pct === 100 ? '✓ Hoàn thành!' : `${pct}%`}
        </span>
      </div>
      <div className="h-2 rounded-full overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
        <div className="h-full rounded-full transition-all duration-300"
          style={{ width: `${pct}%`, background: pct === 100 ? 'linear-gradient(90deg, #10b981, #34d399)' : 'linear-gradient(90deg, var(--accent), var(--accent-2))' }} />
      </div>
    </div>
  );
};

// ── WritingView (Rebuilt) ──
const WritingView = ({ onActivity }) => {
  const [hskLevel, setHskLevel] = useState(1);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [mode, setMode] = useState('animate'); // 'animate' | 'quiz' | 'recall' | 'practice'
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [strokeCount, setStrokeCount] = useState(0);
  const [currentStroke, setCurrentStroke] = useState(0);
  const [showSelector, setShowSelector] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [sessionCount, setSessionCount] = useState(0); // words practiced this session
  const [quizCompleted, setQuizCompleted] = useState(false);
  const [showRecallAnswer, setShowRecallAnswer] = useState(false);
  const [recallRating, setRecallRating] = useState(null); // 'easy'|'hard'|'forgot'

  const writerContainerRef = useRef(null);
  const writerRef = useRef(null);
  const practiceCanvasRef = useRef(null);
  const isDrawing = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });

  const words = ALL_HSK[hskLevel] || [];
  const currentWord = words[currentIdx];
  const currentChar = currentWord ? currentWord.hanzi[charIdx] : '';

  const filteredWords = useMemo(() => {
    if (!searchQuery.trim()) return words;
    const q = searchQuery.toLowerCase();
    return words.filter(w => w.hanzi.includes(q) || w.pinyin.toLowerCase().includes(q) || w.meaning.toLowerCase().includes(q));
  }, [words, searchQuery]);

  // Reset char index + auto-speak on word change
  useEffect(() => {
    setCharIdx(0);
    setQuizCompleted(false);
    setShowRecallAnswer(false);
    setRecallRating(null);
    if (!currentWord) return;
    const t = setTimeout(() => speak(currentWord.hanzi), 300);
    return () => clearTimeout(t);
  }, [currentIdx, hskLevel]);

  // Reset quiz state on char change
  useEffect(() => {
    setQuizCompleted(false);
  }, [charIdx]);

  // Initialize HanziWriter
  useEffect(() => {
    if (!currentChar || mode === 'practice' || mode === 'recall') return;
    let cancelled = false;
    setLoading(true);
    setError(null);
    setCurrentStroke(0);
    setQuizCompleted(false);

    (async () => {
      try {
        const HanziWriter = await loadHanziWriter();
        if (cancelled || !writerContainerRef.current) return;

        // Fully clear old writer
        writerContainerRef.current.innerHTML = '';

        // Resolve CSS vars to real colors (HanziWriter doesn't parse CSS vars)
        const style = getComputedStyle(document.documentElement);
        const resolve = (v) => {
          const val = style.getPropertyValue(v).trim();
          return val || (v === '--ink' ? '#0f2945' : v === '--accent' ? '#3d8bd1' : '#cce0f3');
        };
        const inkColor     = resolve('--ink');
        const accentColor  = resolve('--accent');
        const outlineColor = resolve('--border');

        // Give container a stable unique id
        const containerId = `hw-writer-${currentChar.codePointAt(0)}-${mode}`;
        writerContainerRef.current.id = containerId;

        const writer = HanziWriter.create(containerId, currentChar, {
          width: 260,
          height: 260,
          padding: 12,
          showOutline: true,
          showCharacter: mode === 'animate',
          strokeColor: inkColor,
          outlineColor: outlineColor || '#cce0f3',
          radicalColor: accentColor,
          highlightColor: accentColor,
          drawingColor: accentColor,
          // Learner-friendly speeds
          strokeAnimationSpeed: 1,
          delayBetweenStrokes: 400,
          drawingFadeDuration: 200,
          showHintAfterMisses: 3,
          // Render method — svg works best cross-browser
          renderer: 'svg',
        });

        writerRef.current = writer;

        // Load stroke count
        HanziWriter.loadCharacterData(currentChar).then(data => {
          if (!cancelled && data?.strokes) setStrokeCount(data.strokes.length);
        }).catch(() => {});

        setLoading(false);

        if (mode === 'animate') {
          // Wait one frame to ensure DOM is ready, then animate
          requestAnimationFrame(() => {
            setTimeout(() => {
              if (!cancelled && writerRef.current) {
                writerRef.current.animateCharacter({
                  onComplete: () => { if (!cancelled) setCurrentStroke(0); }
                });
              }
            }, 150);
          });
        } else if (mode === 'quiz') {
          requestAnimationFrame(() => {
            setTimeout(() => {
              if (!cancelled && writerRef.current) {
                writerRef.current.quiz({
                  onCorrectStroke: ({ strokeNum }) => {
                    if (!cancelled) setCurrentStroke(strokeNum + 1);
                  },
                  onComplete: () => {
                    if (!cancelled) {
                      setQuizCompleted(true);
                      setSessionCount(c => c + 1);
                      if (onActivity) onActivity();
                    }
                  },
                  onMistake: () => {},
                });
              }
            }, 150);
          });
        }
      } catch (e) {
        if (!cancelled) {
          console.warn('HanziWriter error:', e);
          setError('Không thể tải dữ liệu nét bút. Hãy kiểm tra kết nối mạng và thử lại.');
          setLoading(false);
        }
      }
    })();

    return () => { cancelled = true; };
  }, [currentChar, mode]);

  // Practice canvas setup
  useEffect(() => {
    if (mode !== 'practice') return;
    const c = practiceCanvasRef.current;
    if (!c) return;
    const ratio = window.devicePixelRatio || 1;
    const rect = c.getBoundingClientRect();
    c.width = rect.width * ratio;
    c.height = rect.height * ratio;
    const ctx = c.getContext('2d');
    ctx.scale(ratio, ratio);
    drawPracticeGrid();
  }, [mode, currentIdx, charIdx, hskLevel]);

  const drawPracticeGrid = () => {
    const c = practiceCanvasRef.current;
    if (!c) return;
    const ctx = c.getContext('2d');
    const ratio = window.devicePixelRatio || 1;
    const w = c.width / ratio, h = c.height / ratio;
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    ctx.strokeStyle = 'rgba(61,139,209,0.18)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(w/2,0); ctx.lineTo(w/2,h);
    ctx.moveTo(0,h/2); ctx.lineTo(w,h/2);
    ctx.moveTo(0,0); ctx.lineTo(w,h);
    ctx.moveTo(w,0); ctx.lineTo(0,h);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(61,139,209,0.45)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1,1,w-2,h-2);
    ctx.fillStyle = 'rgba(148,195,236,0.18)';
    ctx.font = `${Math.min(w,h)*0.78}px "Noto Sans SC",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentChar, w/2, h/2+4);
    ctx.restore();
  };

  const getPos = (e) => {
    const c = practiceCanvasRef.current;
    const rect = c.getBoundingClientRect();
    return {
      x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
      y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top,
    };
  };
  const startDraw = (e) => { e.preventDefault(); isDrawing.current = true; lastPos.current = getPos(e); };
  const draw = (e) => {
    if (!isDrawing.current) return;
    e.preventDefault();
    const c = practiceCanvasRef.current;
    const ctx = c.getContext('2d');
    const pos = getPos(e);
    ctx.strokeStyle = 'var(--ink)';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastPos.current = pos;
  };
  const stopDraw = () => { isDrawing.current = false; };

  const nextWord = () => {
    setCurrentIdx(i => Math.min(words.length-1, i+1));
    setMode('animate');
  };
  const prevWord = () => { setCurrentIdx(i => Math.max(0, i-1)); };

  // Keyboard navigation
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') nextWord();
      if (e.key === 'ArrowLeft') prevWord();
      if (e.code === 'Space' && currentWord) { e.preventDefault(); speak(currentWord.hanzi); }
      if (e.key === 'a' || e.key === 'A') setMode('animate');
      if (e.key === 'q' || e.key === 'Q') setMode('quiz');
      if (e.key === 'r' || e.key === 'R') { setMode('recall'); setShowRecallAnswer(false); setRecallRating(null); }
      if (e.key === 'p' || e.key === 'P') setMode('practice');
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [currentWord]);

  if (!currentWord) return null;

  const MODES = [
    { id:'animate', label:'▶ Xem mẫu', key:'A', color:'var(--accent)' },
    { id:'quiz',    label:'✍️ Kiểm tra nét', key:'Q', color:'#8b5cf6' },
    { id:'recall',  label:'🧠 Nhớ lại', key:'R', color:'#f59e0b' },
    { id:'practice',label:'🖊 Viết tự do', key:'P', color:'#10b981' },
  ];

  return (
    <div className="max-w-5xl mx-auto px-6 py-8">
      {/* Header */}
      <div className="mb-6">
        <div className="text-xs tracking-[0.3em] mb-2" style={{ color:'var(--accent)' }}>书写 · LUYỆN VIẾT</div>
        <div className="flex items-end justify-between flex-wrap gap-3 mb-4">
          <h1 className="text-3xl" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>
            Tập viết chữ Hán
          </h1>
          {sessionCount > 0 && (
            <div className="flex items-center gap-2 px-3 py-1.5 rounded-2xl"
              style={{ background: 'linear-gradient(135deg, #10b981, #34d399)', color: 'white' }}>
              <span className="text-sm font-bold">✓ {sessionCount} chữ hôm nay</span>
            </div>
          )}
        </div>

        {/* Level tabs + selector toggle */}
        <div className="flex gap-2 flex-wrap items-center mb-4">
          {[1,2,3,4,5,6].map(l => (
            <button key={l} onClick={() => { setHskLevel(l); setCurrentIdx(0); setSearchQuery(''); }}
              className="px-3 py-1.5 rounded-2xl text-sm transition-all font-semibold"
              style={{ background: hskLevel===l ? 'var(--accent)' : 'var(--surface)', color: hskLevel===l ? 'white' : 'var(--ink)', border:'1px solid var(--border)' }}>
              HSK {l}
            </button>
          ))}
          <button onClick={() => setShowSelector(!showSelector)}
            className="ml-auto px-3 py-1.5 rounded-2xl text-sm transition-all flex items-center gap-1.5"
            style={{ background: showSelector ? 'var(--accent-2)' : 'var(--surface)', color: showSelector ? 'white' : 'var(--ink)', border:'1px solid var(--border)', fontWeight:500 }}>
            📚 {showSelector ? 'Đóng' : 'Chọn từ'}
          </button>
        </div>

        {/* Word selector panel */}
        {showSelector && (
          <div className="p-4 rounded-3xl mb-4 soft-shadow" style={{ background:'var(--surface)', border:'1px solid var(--accent-soft)' }}>
            <div className="relative mb-3">
              <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                placeholder="Tìm từ để luyện viết..."
                className="w-full px-4 py-2.5 pl-10 rounded-2xl text-sm outline-none"
                style={{ background:'var(--bg)', color:'var(--ink)', border:'1px solid var(--border)' }} />
              <span className="absolute left-3.5 top-1/2 -translate-y-1/2" style={{ color:'var(--muted)' }}>🔍</span>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-2 max-h-64 overflow-y-auto">
              {filteredWords.map(w => {
                const realIdx = words.findIndex(x => x.id === w.id);
                const isCurrent = realIdx === currentIdx;
                return (
                  <button key={w.id} onClick={() => { setCurrentIdx(realIdx); setCharIdx(0); setShowSelector(false); setMode('animate'); }}
                    className="text-left p-2.5 rounded-xl transition-all hover:scale-[1.03]"
                    style={{ background: isCurrent ? 'var(--accent)' : 'var(--bg)', border:`1px solid ${isCurrent ? 'var(--accent)' : 'var(--border)'}`, color: isCurrent ? 'white' : 'var(--ink)' }}>
                    <div className="text-xl hanzi-text mb-0.5" style={{ fontWeight:500 }}>{w.hanzi}</div>
                    <div className="text-xs opacity-80">{w.pinyin}</div>
                    <div className="text-xs line-clamp-1 opacity-70">{w.meaning}</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Word info bar */}
      <div className="p-5 rounded-3xl mb-5 soft-shadow" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="text-xs tracking-widest mb-1" style={{ color:'var(--muted)' }}>
              TỪ {currentIdx+1}/{words.length}
            </div>
            <div className="flex items-baseline gap-3 flex-wrap">
              <button onClick={() => speak(currentWord.hanzi)} className="hanzi-text text-3xl hover:opacity-70 transition-opacity"
                style={{ color:'var(--ink)', fontWeight:500 }}>{currentWord.hanzi} <span style={{ fontSize:'16px' }}>🔊</span></button>
              <ColoredPinyin pinyin={currentWord.pinyin} size="lg" />
              <span style={{ color:'var(--muted)' }}>—</span>
              <span style={{ color:'var(--ink)' }}>{currentWord.meaning}</span>
              <span className="text-xs px-2 py-0.5 rounded-md" style={{ background:'var(--surface-soft)', color:'var(--muted)' }}>{currentWord.type}</span>
            </div>
          </div>
          {/* Char selector for multi-char words */}
          {currentWord.hanzi.length > 1 && (
            <div className="flex gap-2 items-center">
              <span className="text-xs" style={{ color:'var(--muted)' }}>Chữ:</span>
              {currentWord.hanzi.split('').map((ch, i) => (
                <button key={i} onClick={() => setCharIdx(i)}
                  className="w-10 h-10 rounded-2xl hanzi-text transition-all hover:scale-110"
                  style={{ background: charIdx===i ? 'var(--accent)' : 'var(--bg)', color: charIdx===i ? 'white' : 'var(--ink)', border:'1px solid var(--border)', fontSize:'20px', fontWeight:500 }}>
                  {ch}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Main 2-column layout */}
      <div className="grid md:grid-cols-2 gap-5 mb-6">

        {/* LEFT: HanziWriter / Recall / Practice */}
        <div className="p-5 rounded-3xl soft-shadow" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
          {/* Mode selector */}
          <div className="grid grid-cols-4 gap-1.5 mb-4">
            {MODES.map(m => (
              <button key={m.id}
                onClick={() => { setMode(m.id); if (m.id === 'recall') { setShowRecallAnswer(false); setRecallRating(null); } }}
                className="py-2 rounded-xl text-xs font-semibold transition-all relative"
                style={{ background: mode===m.id ? m.color : 'var(--bg)', color: mode===m.id ? 'white' : 'var(--ink)', border:`1px solid ${mode===m.id ? m.color : 'var(--border)'}` }}
                title={`Phím ${m.key}`}>
                {m.label}
              </button>
            ))}
          </div>

          {/* Stroke count + progress (for quiz mode) */}
          <div className="flex items-center justify-between mb-2">
            <div className="text-[10px] tracking-widest font-bold" style={{ color:'var(--muted)' }}>
              {mode==='animate' && '▶ ANIMATION THỨ TỰ NÉT'}
              {mode==='quiz'    && '✍️ VIẾT THEO THỨ TỰ NÉT BÚT'}
              {mode==='recall'  && '🧠 NHÌN NGHĨA → VIẾT KHÔNG CÓ HƯỚNG DẪN'}
              {mode==='practice'&& '🖊 VIẾT TỰ DO TRÊN CANVAS'}
            </div>
            {strokeCount > 0 && (
              <div className="text-xs px-2.5 py-1 rounded-full font-bold"
                style={{ background:'var(--surface-soft)', color:'var(--accent)', border:'1px solid var(--border)' }}>
                {strokeCount} nét
              </div>
            )}
          </div>

          <StrokeProgressBar current={currentStroke} total={strokeCount} mode={mode} />

          {/* Canvas area */}
          <div className="relative flex items-center justify-center mb-3"
            style={{ minHeight:'270px', background:'var(--bg)', borderRadius:'16px', overflow:'hidden' }}>

            {/* HanziWriter container */}
            {(mode === 'animate' || mode === 'quiz') && (
              <>
                {loading && (
                  <div className="absolute inset-0 flex flex-col items-center justify-center gap-3">
                    <div className="hanzi-text text-5xl" style={{ color:'var(--accent)', animation:'pulse 1.5s infinite' }}>笔</div>
                    <div className="text-sm" style={{ color:'var(--muted)' }}>Đang tải dữ liệu nét bút...</div>
                  </div>
                )}
                {error && (
                  <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 p-4 text-center">
                    <div className="text-3xl">⚠️</div>
                    <div className="text-sm" style={{ color:'var(--muted)' }}>{error}</div>
                    <button onClick={() => setError(null)} className="text-xs px-3 py-1.5 rounded-xl" style={{ background:'var(--accent)', color:'white' }}>Thử lại</button>
                  </div>
                )}
                <div ref={writerContainerRef} style={{ display: loading||error ? 'none' : 'flex', alignItems:'center', justifyContent:'center' }} />
              </>
            )}

            {/* Practice canvas (free draw) */}
            {mode === 'practice' && (
              <canvas ref={practiceCanvasRef}
                onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
                style={{ width:'100%', height:'270px', cursor:'crosshair', borderRadius:'16px', display:'block', touchAction:'none' }} />
            )}

            {/* Recall mode: show meaning, hide character */}
            {mode === 'recall' && (
              <div className="w-full h-full flex flex-col items-center justify-center p-6">
                {!showRecallAnswer ? (
                  <>
                    <div className="text-center mb-6">
                      <div className="text-xs tracking-widest mb-3 font-bold" style={{ color:'var(--accent)' }}>VIẾT CHỮ HÁN CÓ NGHĨA:</div>
                      <div className="text-2xl font-bold mb-2" style={{ color:'var(--ink)' }}>{currentWord.meaning}</div>
                      <ColoredPinyin pinyin={currentWord.pinyin} size="lg" />
                    </div>
                    <div className="text-center p-6 rounded-2xl w-full"
                      style={{ background:'var(--surface-soft)', border:'2px dashed var(--border)', minHeight:'80px' }}>
                      <div className="text-sm" style={{ color:'var(--muted)' }}>Viết chữ Hán vào giấy/bảng, rồi nhấn "Xem đáp án"</div>
                    </div>
                    <button onClick={() => setShowRecallAnswer(true)}
                      className="mt-4 px-6 py-2.5 rounded-2xl font-bold transition-all hover:scale-105"
                      style={{ background:'linear-gradient(135deg, #f59e0b, #fbbf24)', color:'white' }}>
                      👁 Xem đáp án
                    </button>
                  </>
                ) : (
                  <>
                    <div className="text-center mb-4">
                      <div className="text-xs tracking-widest mb-2 font-bold" style={{ color:'var(--muted)' }}>ĐÁP ÁN</div>
                      <button onClick={() => speak(currentChar)} className="hanzi-text hover:opacity-75 transition-opacity"
                        style={{ fontSize:'88px', color:'var(--ink)', fontWeight:500, lineHeight:1 }}>
                        {currentChar} <span style={{ fontSize:'16px' }}>🔊</span>
                      </button>
                    </div>

// Lookup từ vựng theo hanzi - tìm nghĩa nhanh
const buildVocabIndex = () => {
  const index = {};
  for (const level of [1,2,3,4,5,6]) {
    for (const word of (ALL_HSK[level] || [])) {
      // chỉ lưu từ đơn (1 ký tự) để hover từng chữ tra
      if (word.hanzi && word.hanzi.length <= 4) {
        if (!index[word.hanzi]) index[word.hanzi] = { ...word, level };
      }
    }
  }
  return index;
};

let _vocabIndexCache = null;
const getVocabIndex = () => {
  if (!_vocabIndexCache) _vocabIndexCache = buildVocabIndex();
  return _vocabIndexCache;
};

// Tìm nghĩa của 1 ký tự hoặc cụm
const lookupWord = (text) => {
  const idx = getVocabIndex();
  // Thử tìm trực tiếp
  if (idx[text]) return idx[text];
  return null;
};

// Popup hiển thị khi hover từng chữ
const HoverPopup = ({ char, x, y, onClose }) => {
  const containerRef = useRef(null);
  const [strokeData, setStrokeData] = useState(null);
  const word = lookupWord(char);

  useEffect(() => {
    let cancelled = false;
    let writer = null;
    const init = async () => {
      try {
        const HanziWriter = await loadHanziWriter();
        if (cancelled || !containerRef.current) return;

        // Lấy thông tin số nét
        HanziWriter.loadCharacterData(char).then(data => {
          if (data && data.strokes && !cancelled) {
            setStrokeData({ strokeCount: data.strokes.length });
          }
        }).catch(() => {});

        containerRef.current.innerHTML = '';
        writer = HanziWriter.create(containerRef.current, char, {
          width: 90,
          height: 90,
          padding: 4,
          strokeColor: '#5b9bd5',
          radicalColor: '#7eb4dc',
          strokeAnimationSpeed: 0.5,
          delayBetweenStrokes: 500,
          showOutline: true,
          showCharacter: false
        });
        setTimeout(() => {
          if (!cancelled && writer) writer.animateCharacter();
        }, 200);
      } catch (e) { /* ignore */ }
    };
    init();
    return () => { cancelled = true; };
  }, [char]);

  // Tính vị trí popup để không tràn màn hình
  const popupWidth = 320;
  const popupHeight = 220;
  const padding = 16;
  let left = x + 16;
  let top = y + 16;
  if (typeof window !== 'undefined') {
    if (left + popupWidth > window.innerWidth - padding) left = x - popupWidth - 16;
    if (top + popupHeight > window.innerHeight - padding) top = y - popupHeight - 16;
    if (left < padding) left = padding;
    if (top < padding) top = padding;
  }

  return (
    <div
      onMouseLeave={onClose}
      className="fixed rounded-2xl soft-shadow-lg overflow-hidden"
      style={{
        left, top,
        width: popupWidth,
        background: 'var(--surface)',
        border: '1px solid var(--accent-soft)',
        zIndex: 1000,
        animation: 'fadeIn 0.15s ease-out',
        pointerEvents: 'auto'
      }}
    >
      <div className="p-3 flex gap-3" style={{ background: 'linear-gradient(135deg, var(--surface), var(--surface-soft))' }}>
        {/* Stroke order container */}
        <div className="flex-shrink-0 rounded-xl" style={{ background: 'var(--bg)', padding: 4, border: '1px solid var(--border)' }}>
          <div ref={containerRef} style={{ width: 90, height: 90 }} />
        </div>
        {/* Word info */}
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <div className="text-3xl hanzi-text" style={{ color: 'var(--ink)', fontWeight: 500, lineHeight: 1 }}>{char}</div>
            <button
              onClick={(e) => { e.stopPropagation(); speak(char); }}
              className="text-xs px-2 py-0.5 rounded-md"
              style={{ background: 'var(--accent)', color: 'white', fontWeight: 500 }}
            >🔊</button>
          </div>
          {word ? (
            <>
              <div className="mb-1"><ColoredPinyin pinyin={word.pinyin} size="sm" /></div>
              <div className="text-sm line-clamp-2" style={{ color: 'var(--ink)' }}>{word.meaning}</div>
              <div className="text-xs mt-1 inline-block px-1.5 py-0.5 rounded-md" style={{ background: 'var(--bg)', color: 'var(--accent)', fontWeight: 500 }}>HSK {word.level}</div>
            </>
          ) : (
            <div className="text-xs italic" style={{ color: 'var(--muted)' }}>Chưa có trong từ điển HSK 1-6</div>
          )}
          {strokeData && (
            <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{strokeData.strokeCount} nét</div>
          )}
        </div>
      </div>
    </div>
  );
};

// Component để render câu/đoạn văn với mỗi chữ có thể hover
const HoverableText = ({ text, fontSize = '20px', lineHeight = 2 }) => {
  const [hovered, setHovered] = useState(null); // { char, x, y }
  const hideTimerRef = useRef(null);

  const handleEnter = (e, char) => {
    if (hideTimerRef.current) {
      clearTimeout(hideTimerRef.current);
      hideTimerRef.current = null;
    }
    // Bỏ qua dấu câu / khoảng trắng
    if (/[\s,。!?,.!?;:、""''""''()()「」【】《》—\-…]/.test(char)) return;
    const rect = e.currentTarget.getBoundingClientRect();
    setHovered({ char, x: rect.left, y: rect.bottom });
  };

  const handleLeave = () => {
    // Delay nhỏ để di chuột vào popup không bị mất
    hideTimerRef.current = setTimeout(() => setHovered(null), 150);
  };

  // Tách text thành các ký tự
  const chars = Array.from(text);

  return (
    <>
      <span
        className="hanzi-text"
        style={{ fontSize, lineHeight, color: 'var(--ink)', fontWeight: 500 }}
      >
        {chars.map((ch, i) => {
          const isHanzi = /[\u4e00-\u9fff]/.test(ch);
          if (!isHanzi) return <span key={i}>{ch}</span>;
          return (
            <span
              key={i}
              onMouseEnter={(e) => handleEnter(e, ch)}
              onMouseLeave={handleLeave}
              className="cursor-pointer transition-colors"
              style={{
                display: 'inline-block',
                padding: '0 1px',
                borderBottom: '1px dashed transparent',
                color: hovered && hovered.char === ch ? 'var(--accent)' : 'inherit'
              }}
              onMouseOver={(e) => { e.currentTarget.style.borderBottomColor = 'var(--accent-soft)'; }}
              onMouseOut={(e) => { e.currentTarget.style.borderBottomColor = 'transparent'; }}
            >
              {ch}
            </span>
          );
        })}
      </span>
      {hovered && (
        <HoverPopup
          char={hovered.char}
          x={hovered.x}
          y={hovered.y}
          onClose={() => setHovered(null)}
        />
      )}
    </>
  );
};

// ── Word Status Engine ──
// Returns color/status of each word relative to learner's SRS state
function getWordStatus(wordId, srsData, learned) {
  if (learned && learned.includes(wordId)) return 'known';
  const d = srsData && srsData[wordId];
  if (!d) return 'unknown';       // in SRS but "new" state not reached
  if (d.state === 'review' && d.nextReview > Date.now()) return 'known';
  if (d.nextReview <= Date.now()) return 'due';
  return 'learning';
}

const WORD_STATUS_STYLES = {
  unknown:  { borderBottom: '2px solid #3d8bd1', color: 'inherit',       title: 'Chưa học' },
  learning: { borderBottom: '2px solid #f59e0b', color: 'inherit',       title: 'Đang học' },
  due:      { background: 'rgba(245,158,11,0.12)', color: 'inherit',     title: 'Cần ôn' },
  known:    { opacity: 0.65,                       color: 'var(--muted)', title: 'Đã thuộc' },
};

// ── Smart Word Popup (replaces old InlineWordPopup) ──
const SmartWordPopup = ({ char, position, srsData, updateSRS, learned, toggleLearned, onClose, onSaveWord }) => {
  const [data, setData] = useState(null);
  const [justSaved, setJustSaved] = useState(false);
  const [justLearned, setJustLearned] = useState(false);
  const popupRef = useRef(null);

  // Lookup: prefer exact match, then partial
  useEffect(() => {
    let found = null;
    for (let level = 1; level <= 6 && !found; level++) {
      found = (ALL_HSK[level] || []).find(w => w.hanzi === char);
    }
    if (!found) {
      for (let level = 1; level <= 6 && !found; level++) {
        found = (ALL_HSK[level] || []).find(w => w.hanzi.includes(char));
      }
    }
    if (found) setData({ ...found, level: found.id.split('-')[0] });
  }, [char]);

  // Close on outside click
  useEffect(() => {
    const handler = (e) => { if (popupRef.current && !popupRef.current.contains(e.target)) onClose(); };
    const t = setTimeout(() => document.addEventListener('mousedown', handler), 80);
    return () => { clearTimeout(t); document.removeEventListener('mousedown', handler); };
  }, [onClose]);

  const srs = data ? srsData?.[data.id] : null;
  const isLearned = data ? (learned?.includes(data.id) || false) : false;
  const isInSRS = !!srs;
  const isDue = srs && srs.nextReview <= Date.now();

  const srsStatusInfo = !data ? null :
    isLearned ? { label: 'Đã thuộc', color: '#10b981', bg: '#d1fae5' } :
    isDue     ? { label: 'Đến hạn ôn', color: 'var(--accent)', bg: 'var(--surface-soft)' } :
    isInSRS   ? { label: `Ôn sau ${Math.ceil(((srs.nextReview||0) - Date.now()) / 86400000)} ngày`, color: '#8b5cf6', bg: '#ede9fe' } :
                { label: 'Chưa học', color: 'var(--muted)', bg: 'var(--bg)' };

  const handleAddToSRS = () => {
    if (!data || isInSRS) return;
    const initState = fsrsUpdateState(null, 3);
    updateSRS(data.id, initState);
    onSaveWord && onSaveWord(data);
    setJustSaved(true);
    setTimeout(onClose, 1200);
  };

  const handleToggleLearned = () => {
    if (!data) return;
    toggleLearned(data.id);
    setJustLearned(true);
    setTimeout(onClose, 900);
  };

  // Smart position: don't go off screen bottom
  const topPos = Math.min(
    position.y + 10,
    window.innerHeight - 320 + window.scrollY
  );

  return (
    <div ref={popupRef}
      className="fixed z-[200] soft-shadow-lg"
      style={{
        left: Math.min(Math.max(8, position.x - 130), window.innerWidth - 288),
        top: topPos,
        width: '280px',
        background: 'var(--surface)',
        border: '1.5px solid var(--accent-soft)',
        borderRadius: '20px',
        overflow: 'hidden',
        animation: 'fadeIn 0.15s ease-out',
      }}>

      {/* Header with gradient */}
      <div className="px-4 pt-4 pb-3"
        style={{ background: 'linear-gradient(135deg, var(--surface-soft) 0%, var(--surface) 100%)' }}>
        <div className="flex items-start justify-between gap-2">
          <button onClick={() => speak(data ? data.hanzi : char)}
            className="hanzi-text hover:opacity-75 transition-opacity text-left"
            style={{ fontSize: data?.hanzi?.length > 2 ? '28px' : '36px', fontWeight: 500, color: 'var(--ink)', lineHeight: 1.1 }}>
            {data ? data.hanzi : char}
            <span style={{ fontSize: '13px', marginLeft: '4px' }}>🔊</span>
          </button>
          <button onClick={onClose}
            className="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mt-1 text-xs transition-all hover:scale-110"
            style={{ background: 'var(--bg)', color: 'var(--muted)', border: '1px solid var(--border)' }}>✕</button>
        </div>

        {data ? (
          <>
            <div className="mt-1.5 mb-1"><ColoredPinyin pinyin={data.pinyin} size="base" /></div>
            <div className="font-semibold text-sm mb-2" style={{ color: 'var(--ink)' }}>{data.meaning}</div>

                {data.type}
              </span>
              <span className="text-[10px] px-2 py-0.5 rounded-full font-bold"

                HSK {data.level || data.id?.split('-')[0]}

              {srsStatusInfo && (
                <span className="text-[10px] px-2 py-0.5 rounded-full font-semibold"
                  style={{ background: srsStatusInfo.bg, color: srsStatusInfo.color, border: `1px solid ${srsStatusInfo.color}30` }}>

        <div className="px-3 pb-3 pt-2.5 flex gap-2" style={{ borderTop: '1px solid var(--border)' }}>

            <button onClick={handleAddToSRS}

          </button>

      )}

  );

// ── Smart Clickable Text with SRS word highlighting ──
const SmartText = ({ text, fontSize = '22px', lineHeight = 2.2, srsData, learned, onWordClick }) => {
  // Segment text into words (CJK chunks) and punctuation
  const segments = useMemo(() => {
    const result = [];
    let i = 0;
    while (i < text.length) {
      const ch = text[i];
      if (/[\u4e00-\u9fff]/.test(ch)) {
        // Try to find longest matching word in dictionary
        let longestMatch = null;
        let longestLen = 0;
        for (let len = 4; len >= 1; len--) {
          if (i + len > text.length) continue;
          const slice = text.slice(i, i + len);
          let found = null;
          for (let level = 1; level <= 6 && !found; level++) {
            found = (ALL_HSK[level] || []).find(w => w.hanzi === slice);
          }
          if (found && len > longestLen) {
            longestMatch = found;
            longestLen = len;
          }
        }
        if (longestMatch && longestLen > 1) {
          result.push({ type: 'word', text: longestMatch.hanzi, word: longestMatch, len: longestLen });
          i += longestLen;
        } else {
          // Single char
          let singleWord = null;
          for (let level = 1; level <= 6 && !singleWord; level++) {
            singleWord = (ALL_HSK[level] || []).find(w => w.hanzi === ch);
          }
          result.push({ type: 'char', text: ch, word: singleWord, len: 1 });
          i++;
        }
      } else {
        result.push({ type: 'punct', text: ch });
        i++;
      }
    }
    return result;
  }, [text]);

  return (
    <span style={{ lineHeight }}>
      {segments.map((seg, i) => {
        if (seg.type === 'punct') {
          return <span key={i} style={{ fontSize, color: 'var(--muted)' }}>{seg.text}</span>;
        }

        const wordId = seg.word?.id;
        const status = wordId ? getWordStatus(wordId, srsData, learned) : 'unknown';
        const style = WORD_STATUS_STYLES[status] || {};

        return (
          <span
            key={i}
            onClick={(e) => {
              e.stopPropagation();
              // Use the matched word hanzi, not single char
              const clickChar = seg.word ? seg.word.hanzi : seg.text;
              onWordClick(clickChar, { x: e.clientX, y: e.clientY + window.scrollY });
            }}
            title={seg.word ? `${seg.word.hanzi} — ${seg.word.meaning} (${style.title || ''})` : seg.text}
            style={{
              fontSize,
              cursor: 'pointer',
              borderRadius: '3px',
              padding: '1px 1px',
              transition: 'background 0.15s, opacity 0.15s',
              ...style,
            }}
            onMouseEnter={e => {
              e.currentTarget.style.background = 'var(--accent-soft)';
              e.currentTarget.style.color = 'white';
              e.currentTarget.style.opacity = '1';
            }}
            onMouseLeave={e => {
              e.currentTarget.style.background = style.background || 'transparent';
              e.currentTarget.style.color = style.color || 'var(--ink)';
              e.currentTarget.style.opacity = style.opacity || '1';
            }}>
            {seg.text}
          </span>
        );
      })}
    </span>
  );
};

// ── Comprehension Score Badge ──
const ComprehensionBadge = ({ reading, srsData, learned }) => {
  const score = useMemo(() => {
    const text = reading.sentences.map(s => s.hanzi).join('');
    // Collect unique words matched in ALL_HSK
    const matchedIds = new Set();
    const totalIds = new Set();
    let i = 0;
    while (i < text.length) {
      if (!/[\u4e00-\u9fff]/.test(text[i])) { i++; continue; }
      let found = null;
      for (let len = 4; len >= 1 && !found; len--) {
        const slice = text.slice(i, i + len);
        for (let l = 1; l <= 6 && !found; l++) {
          found = (ALL_HSK[l] || []).find(w => w.hanzi === slice);
        }
        if (found) i += len;
      }
      if (!found) { i++; continue; }
      totalIds.add(found.id);
      const status = getWordStatus(found.id, srsData, learned);
      if (status === 'known') matchedIds.add(found.id);
    }
    if (totalIds.size === 0) return null;
    return { known: matchedIds.size, total: totalIds.size, pct: Math.round((matchedIds.size / totalIds.size) * 100) };
  }, [reading, srsData, learned]);

  if (!score) return null;
  const color = score.pct >= 80 ? '#10b981' : score.pct >= 60 ? '#f59e0b' : 'var(--accent)';
  return (
    <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-2xl"
      style={{ background: 'var(--surface)', border: `1px solid ${color}40` }}>
      <span style={{ fontSize: '14px' }}>📊</span>
      <div>
        <span style={{ fontWeight: 700, color, fontSize: '14px' }}>{score.pct}%</span>
        <span className="text-xs ml-1" style={{ color: 'var(--muted)' }}>hiểu được</span>
      </div>
      <div className="w-16 h-1.5 rounded-full overflow-hidden ml-1" style={{ background: 'var(--border)' }}>
        <div className="h-full rounded-full" style={{ width: `${score.pct}%`, background: color }} />
      </div>
    </div>
  );
};

      for (let len = 4; len >= 2 && !match; len--) {

const READING_PROGRESS_KEY = 'hsk:reading_progress';

// ── Post-Reading Comprehension Check ──
const PostReadingCheck = ({ reading, onDone }) => {
  const questions = useMemo(() => {
    const sentences = reading.sentences;
    if (sentences.length < 2) return [];
    const qs = [];
    const mid = sentences[Math.floor(sentences.length / 2)];
    const hanziWords = mid.hanzi.match(/[\u4e00-\u9fff]{2,4}/g) || [];
    if (hanziWords.length > 0) {
      const wordData = (() => { for (let l=1;l<=6;l++) { const f=(ALL_HSK[l]||[]).find(w=>w.hanzi===hanziWords[0]); if(f) return f; } return null; })();
      if (wordData) {
        const dist = [];
        for (let l=1;l<=3;l++) { const pool=ALL_HSK[l]||[]; const r=pool.filter(w=>w.id!==wordData.id).sort(()=>Math.random()-0.5).slice(0,2); dist.push(...r.map(w=>w.meaning)); }
        qs.push({ q: `"${wordData.hanzi}" có nghĩa là gì?`, correct: wordData.meaning, choices: [...dist.slice(0,3), wordData.meaning].sort(()=>Math.random()-0.5) });
      }
    }
    qs.push({ q: 'Câu đầu tiên của bài là:', correct: sentences[0].meaning, choices: [sentences[0].meaning, sentences[sentences.length-1].meaning].sort(()=>Math.random()-0.5) });
    return qs.slice(0,2);
  }, [reading]);

  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState({});
  const [done, setDone] = useState(false);

  if (questions.length === 0 || done) {
    const correct = Object.values(answers).filter(Boolean).length;
    return (
      <div className="p-6 rounded-3xl text-center" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
        <div className="text-4xl mb-2">✅</div>
        <div className="font-bold text-lg mb-1" style={{ color:'var(--ink)' }}>Đã đọc xong bài này!</div>
        <div className="text-sm mb-4" style={{ color:'var(--muted)' }}>{correct}/{questions.length} câu đúng</div>
        <button onClick={onDone} className="px-6 py-2.5 rounded-2xl font-semibold" style={{ background:'var(--accent)', color:'white' }}>Bài đọc khác →</button>
      </div>
    );
  }

  const q = questions[qIdx];
  const answered = answers[qIdx] !== undefined;
  const handleAnswer = (c) => {
    if (answered) return;
    setAnswers(p => ({...p, [qIdx]: c === q.correct}));
    setTimeout(() => { if (qIdx+1 < questions.length) setQIdx(i=>i+1); else setDone(true); }, 1000);
  };

  return (
    <div className="p-6 rounded-3xl" style={{ background:'var(--surface)', border:'1.5px solid var(--accent-soft)' }}>
      <div className="text-[10px] tracking-widest mb-3 font-bold" style={{ color:'var(--accent)' }}>KIỂM TRA NHANH · CÂU {qIdx+1}/{questions.length}</div>
      <div className="font-semibold mb-4" style={{ color:'var(--ink)', fontSize:'15px' }}>{q.q}</div>
      <div className="space-y-2">
        {q.choices.map((c,i) => {
          const isCorrect = c === q.correct;
          return (
            <button key={i} onClick={() => handleAnswer(c)} disabled={answered}
              className="w-full text-left px-4 py-3 rounded-xl text-sm transition-all"
              style={{ background: answered && isCorrect ? '#d1fae5' : 'var(--bg)', color: answered && isCorrect ? '#065f46' : 'var(--ink)', border: `1px solid ${answered && isCorrect ? '#6ee7b7' : 'var(--border)'}`, fontWeight: 500, opacity: answered && !isCorrect ? 0.5 : 1 }}>
              {c} {answered && isCorrect && <span className="float-right">✓</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
};

// ============ PROGRESS VIEW ============
// ============ PROGRESS & ANALYTICS ============
const ProgressView = ({ learned, starred, srsData, quizScores, habit }) => {
  const [activeTab, setActiveTab] = useState('overview'); // 'overview'|'srs'|'quiz'|'starred'
  const [showShareCard, setShowShareCard] = useState(false);

  // ── Core computed stats ──
  const hskColors = { 1:'#10b981', 2:'#3d8bd1', 3:'#8b5cf6', 4:'#f59e0b', 5:'#ef4444', 6:'#374151' };
  const now = Date.now();

  const levelStats = useMemo(() => {
    const r = {};
    [1,2,3,4,5,6].forEach(l => {
      const words = ALL_HSK[l] || [];
      const learnedCount = words.filter(w => learned.includes(w.id)).length;
      const inSRS = words.filter(w => srsData[w.id]).length;
      const dueCount = words.filter(w => srsData[w.id]?.nextReview <= now).length;
      r[l] = { total: words.length, learned: learnedCount, inSRS, due: dueCount, pct: words.length > 0 ? Math.round((learnedCount/words.length)*100) : 0 };
    });
    return r;
  }, [learned, srsData]);

  const totalLearned = Object.values(levelStats).reduce((a, b) => a + b.learned, 0);
  const totalAll = Object.values(levelStats).reduce((a, b) => a + b.total, 0);
  const totalSRS = Object.keys(srsData).length;
  const totalDue = Object.values(srsData).filter(d => d.nextReview <= now).length;
  const overallPct = totalAll > 0 ? Math.round((totalLearned / totalAll) * 100) : 0;

  const streak = habit?.streak || 0;
  const bestStreak = habit?.bestStreak || 0;
  const xp = habit?.xp || 0;
  const levelName = LEVEL_NAMES[habit?.level || 0];
  const studyHistory = habit?.studyHistory || {};

  // Active days (days with studyHistory entries)
  const activeDays = Object.values(studyHistory).filter(d => d && !d.freeze).length;

  // Total study estimate: sum words across all days
  const totalWordsStudied = Object.values(studyHistory).reduce((sum, d) => sum + (d?.words || 0), 0);

  // Average words per active day
  const avgWordsPerDay = activeDays > 0 ? Math.round(totalWordsStudied / activeDays) : 0;

  // ── 365-day Heatmap ──
  const heatmapData = useMemo(() => {
    const days = [];
    const d = new Date();
    d.setDate(d.getDate() - 364); // start 365 days ago
    for (let i = 0; i < 365; i++) {
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const entry = studyHistory[dateStr];
      const words = entry?.words || 0;
      const intensity = words === 0 ? 0 : words < 5 ? 1 : words < 15 ? 2 : words < 30 ? 3 : 4;
      days.push({ date: dateStr, day: d.getDate(), month: d.getMonth(), words, intensity, frozen: entry?.freeze });
      d.setDate(d.getDate() + 1);
    }
    return days;
  }, [studyHistory]);

  const heatmapColors = [
    'var(--surface-soft)',           // 0: no activity
    'rgba(255,107,43,0.25)',         // 1: < 5 words
    'rgba(255,107,43,0.5)',          // 2: 5-15 words
    'rgba(255,107,43,0.75)',         // 3: 15-30 words
    'linear-gradient(135deg,#ff6b2b,#ff9500)', // 4: 30+ words
  ];

  // ── SRS Health ──
  const srsHealth = useMemo(() => {
    const cards = Object.values(srsData);
    const states = { new: 0, learning: 0, review: 0, relearning: 0 };
    let totalReps = 0, totalLapses = 0;
    const intervalBuckets = { '1d': 0, '1w': 0, '1m': 0, '3m+': 0 };

    cards.forEach(c => {
      if (c.state) states[c.state] = (states[c.state] || 0) + 1;
      totalReps += c.reps || 0;
      totalLapses += c.lapses || 0;
      const days = c.interval || 0;
      if (days <= 1) intervalBuckets['1d']++;
      else if (days <= 7) intervalBuckets['1w']++;
      else if (days <= 30) intervalBuckets['1m']++;
      else intervalBuckets['3m+']++;
    });

    const retentionRate = totalReps > 0 ? Math.round(((totalReps - totalLapses) / totalReps) * 100) : 0;
    return { states, totalReps, totalLapses, retentionRate, intervalBuckets };
  }, [srsData]);

  // ── Quiz performance history ──
  const quizStats = useMemo(() => {
    if (!quizScores || quizScores.length === 0) return null;
    const recent = quizScores.slice(-20);
    const avgScore = Math.round(recent.reduce((s, q) => s + (q.score / q.total) * 100, 0) / recent.length);
    const best = Math.max(...recent.map(q => Math.round((q.score / q.total) * 100)));
    const total = quizScores.length;
    // Per-level breakdown
    const byLevel = {};
    quizScores.forEach(q => {
      if (!byLevel[q.level]) byLevel[q.level] = { total: 0, correct: 0, count: 0 };
      byLevel[q.level].total += q.total;
      byLevel[q.level].correct += q.score;
      byLevel[q.level].count++;
    });
    return { avgScore, best, total, byLevel, recent };
  }, [quizScores]);

  // ── ETA to complete next level ──
  const nextLevelETA = useMemo(() => {
    for (let l = 1; l <= 6; l++) {
      const s = levelStats[l];
      if (s.pct < 100) {
        const remaining = s.total - s.learned;
        if (avgWordsPerDay > 0) {
          const days = Math.ceil(remaining / avgWordsPerDay);
          return { level: l, remaining, days };
        }
        return { level: l, remaining, days: null };
      }
    }
    return null;
  }, [levelStats, avgWordsPerDay]);

  // ── Milestones ──
  const milestones = useMemo(() => {
    const list = [
      { key: 'start',    label: '🌱 Bắt đầu học',      done: activeDays >= 1 },
      { key: 'w100',     label: '📚 100 từ đã học',     done: totalLearned >= 100 },

                    background: m.done ? '#f0fdf4' : 'var(--surface-soft)',

                    {m.label}
                  </span>
                </div>

            </div>
          </div>

                    { key: 'learning',    label: 'Lặp lại',   color: '#f59e0b', icon: '📖' },
                    { key: 'review',      label: 'Ôn dài hạn',color: 'var(--accent)', icon: '🎯' },

                    </div>

                    { key: 'learning', color: '#f59e0b' },
                    { key: 'review', color: 'var(--accent)' },
                    { key: 'relearning', color: '#ef4444' },
                  ].map(s => {

                      <div key={s.key} style={{ width: `${pct}%`, background: s.color }} title={`${s.key}: ${pct.toFixed(1)}%`} />

// Nếu chưa cấu hình -> supa = null -> toàn bộ phần này "ngủ", app chạy như cũ.
const cloudEnabled = !!(
  window.SUPABASE_URL && window.SUPABASE_ANON_KEY &&
  !String(window.SUPABASE_URL).includes('YOUR_') &&
  !String(window.SUPABASE_ANON_KEY).includes('YOUR_') &&
  window.supabase
);
const supa = cloudEnabled
  ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
  : null;

// So sánh ổn định (sắp key) để tránh reload lặp do thứ tự key khác nhau
const stableStr = (o) => JSON.stringify(o, (k, v) =>
  (v && typeof v === 'object' && !Array.isArray(v))
    ? Object.keys(v).sort().reduce((a, key) => (a[key] = v[key], a), {})
    : v);

// Gom mọi tiến độ ('hsk:*') từ localStorage thành 1 object
function gatherLocal() {
  const blob = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('hsk:')) {
      try { blob[k] = JSON.parse(localStorage.getItem(k)); }
      catch { blob[k] = localStorage.getItem(k); }
    }
  }
  return blob;
}
// Ghi object tiến độ vào localStorage
function applyLocal(blob) {
  if (!blob) return;
  Object.entries(blob).forEach(([k, v]) => {
    if (k && k.startsWith('hsk:')) {
      try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
    }
  });
}
// Gộp cloud + local an toàn: KHÔNG bao giờ mất "từ đã học"
function mergeBlobs(localB, cloudB) {
  const out = { ...cloudB, ...localB }; // mặc định local thắng
  const uni = (a, b) => Array.from(new Set([
    ...(Array.isArray(a) ? a : []), ...(Array.isArray(b) ? b : [])
  ]));
  out['hsk:learned'] = uni(localB['hsk:learned'], cloudB['hsk:learned']);
  out['hsk:starred'] = uni(localB['hsk:starred'], cloudB['hsk:starred']);
  // SRS: gộp theo từng từ, giữ bản ôn gần đây hơn
  const ls = localB['hsk:srs'] || {}, cs = cloudB['hsk:srs'] || {};
  const srs = { ...cs };
  for (const id in ls) {
    if (!srs[id]) srs[id] = ls[id];
    else srs[id] = (ls[id]?.lastReview || 0) >= (cs[id]?.lastReview || 0) ? ls[id] : cs[id];
  }
  if (Object.keys(srs).length) out['hsk:srs'] = srs;
  // Thói quen/streak: giữ bản có xp cao hơn
  const lh = localB['hsk:habit'], ch = cloudB['hsk:habit'];
  if (lh || ch) out['hsk:habit'] = ((lh?.xp || 0) >= (ch?.xp || 0)) ? (lh || ch) : (ch || lh);
  return out;
}

function App() {
  const [view, setView] = useState('home');
  const [selectedHSK, setSelectedHSK] = useState(1);
  const [darkMode, setDarkMode] = useState(false);
  const [learned, setLearned] = useState([]);
  const [starred, setStarred] = useState([]);
  const [srsData, setSrsData] = useState({});
  const [quizScores, setQuizScores] = useState([]);
  const [showStreakModal, setShowStreakModal] = useState(false);
  const [showMilestone, setShowMilestone] = useState(null); // milestone object
  const [session, setSession] = useState(null);
  const [syncState, setSyncState] = useState('idle'); // idle | syncing | synced | error

  // === CLOUD: theo dõi phiên đăng nhập ===
  useEffect(() => {
    if (!supa) return;
    supa.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = supa.auth.onAuthStateChange((_e, s) => setSession(s || null));
    return () => sub.subscription.unsubscribe();
  }, []);

  // === CLOUD: khi đăng nhập -> kéo cloud, gộp, lưu, đẩy lại; reload nếu có dữ liệu mới ===
  useEffect(() => {
    if (!supa || !session) return;
    let cancelled = false;
    (async () => {
      setSyncState('syncing');
      try {
        const uid = session.user.id;
        const { data, error } = await supa.from('progress').select('data').eq('user_id', uid).maybeSingle();
        if (error) throw error;
        const cloudB = (data && data.data) || {};
        const localB = gatherLocal();
        const merged = mergeBlobs(localB, cloudB);
        const changed = stableStr(merged) !== stableStr(localB);
        applyLocal(merged);
        await supa.from('progress').upsert({ user_id: uid, data: merged, updated_at: new Date().toISOString() });
        if (cancelled) return;
        setSyncState('synced');
        if (changed) setTimeout(() => window.location.reload(), 400);
      } catch (e) {
        if (!cancelled) setSyncState('error');
        console.warn('Cloud sync (login):', (e && e.message) || e);
      }
    })();
    return () => { cancelled = true; };
  }, [session]);

  // === CLOUD: đẩy thay đổi lên cloud (mỗi 8s nếu có đổi + khi rời trang) ===
  useEffect(() => {
    if (!supa || !session) return;
    let last = stableStr(gatherLocal());
    const push = async () => {
      const cur = gatherLocal();
      const curStr = stableStr(cur);
      if (curStr === last) return;
      last = curStr;
      try {
        setSyncState('syncing');
        await supa.from('progress').upsert({ user_id: session.user.id, data: cur, updated_at: new Date().toISOString() });
        setSyncState('synced');
      } catch (e) { setSyncState('error'); }
    };
    const iv = setInterval(push, 8000);
    const onHide = () => { if (document.visibilityState === 'hidden') push(); };
    document.addEventListener('visibilitychange', onHide);
    window.addEventListener('beforeunload', push);
    return () => {
      clearInterval(iv);
      document.removeEventListener('visibilitychange', onHide);
      window.removeEventListener('beforeunload', push);
    };
  }, [session]);

  // === HABIT ENGINE ===
  const {
    habit,
    goalProgress,
    pendingMilestone,
    trackActivity,
    useFreeze,
    setGoal,
    markMilestoneSeen,
  } = useHabit();

  // Hiển thị milestone toast khi có milestone mới
  useEffect(() => {
    if (pendingMilestone && !showMilestone) {
      setShowMilestone(pendingMilestone);
    }
  }, [pendingMilestone]);

  // Load from localStorage
  useEffect(() => {
    try {
      const l = localStorage.getItem('hsk:learned');
      if (l) setLearned(JSON.parse(l));
      const s = localStorage.getItem('hsk:starred');
      if (s) setStarred(JSON.parse(s));
      const sr = localStorage.getItem('hsk:srs');
      if (sr) setSrsData(JSON.parse(sr));
      const q = localStorage.getItem('hsk:quiz');
      if (q) setQuizScores(JSON.parse(q));
      const d = localStorage.getItem('hsk:dark');
      if (d) setDarkMode(JSON.parse(d));
    } catch (e) {}
  }, []);

  // Save to localStorage
  const persist = (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  };

  const toggleLearned = (id) => {
    setLearned(prev => {

      persist('hsk:learned', next);

    '--accent-2': '#5fa8de',                    /* xanh trung gian phân biệt rõ */
    '--tone-1': '#1e62d8',
    '--tone-2': '#0d9b6e',
    '--tone-3': '#e08e0a',
    '--tone-4': '#dc2f2f',
  };

  return (
    <div style={{
      ...themeStyles,
      fontFamily: 'var(--font-body)',
      background: 'var(--bg)',
      color: 'var(--ink)',
      minHeight: '100vh',
      backgroundImage: 'radial-gradient(circle at 15% 15%, rgba(148, 195, 236, 0.22) 0%, transparent 55%), radial-gradient(circle at 85% 85%, rgba(95, 168, 222, 0.15) 0%, transparent 55%), radial-gradient(circle at 50% 50%, rgba(219, 236, 253, 0.1) 0%, transparent 70%)',
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Quicksand:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap');
        :root {
          --font-display: 'Quicksand', 'Noto Sans SC', sans-serif;
          --font-body: 'Nunito', 'Noto Sans SC', sans-serif;
          --font-pinyin: 'Quicksand', sans-serif;
          --font-hanzi: 'Noto Sans SC', sans-serif;
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        html { overflow-y: scroll; scrollbar-gutter: stable; }
        body { margin: 0; letter-spacing: 0.01em; overflow-x: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        button { cursor: pointer; border: none; font-family: inherit; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        button:hover { filter: brightness(1.03); }
        input, textarea { font-family: inherit; }

        /* Always-visible, custom-styled scrollbar */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        html::-webkit-scrollbar-track,
        body::-webkit-scrollbar-track,
        ::-webkit-scrollbar-track { background: var(--surface-soft, rgba(168, 200, 232, 0.15)); border-radius: 8px; }
        html::-webkit-scrollbar-thumb,
        body::-webkit-scrollbar-thumb,
        ::-webkit-scrollbar-thumb {
          background: var(--accent-soft, #a8c8e8);
          border-radius: 8px;
          border: 2px solid var(--surface-soft, rgba(168, 200, 232, 0.15));
        }
        html::-webkit-scrollbar-thumb:hover,
        body::-webkit-scrollbar-thumb:hover,
        ::-webkit-scrollbar-thumb:hover {
          background: var(--accent, #5b9bd5);
        }
        /* Firefox */
        html { scrollbar-width: thin; scrollbar-color: var(--accent-soft, #a8c8e8) var(--surface-soft, rgba(168, 200, 232, 0.15)); }

        .hanzi-text { font-family: var(--font-hanzi); font-weight: 500; }
        .soft-shadow { box-shadow: 0 4px 20px rgba(61, 139, 209, 0.10), 0 1px 3px rgba(61, 139, 209, 0.05); }
        .soft-shadow-lg { box-shadow: 0 10px 40px rgba(61, 139, 209, 0.14), 0 2px 6px rgba(61, 139, 209, 0.08); }
        .line-clamp-1 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
        .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        @keyframes soundBar { from { opacity: 0.6; transform: scaleY(0.4); } to { opacity: 1; transform: scaleY(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        @keyframes shake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-6px)} 30%{transform:translateX(6px)} 45%{transform:translateX(-4px)} 60%{transform:translateX(4px)} 75%{transform:translateX(-2px)} }
      `}</style>

      <Header
        view={view}
        setView={setView}
        darkMode={darkMode}
        toggleDark={toggleDark}
        habit={habit}
        goalProgress={goalProgress}
        onOpenStreak={() => setShowStreakModal(true)}
        accountSlot={cloudEnabled ? <AccountWidget supa={supa} session={session} syncState={syncState} /> : null}
      />

      <main>
        {view === 'home' && <HomeView
          setView={setView}
          setSelectedHSK={setSelectedHSK}
          learnedCount={learnedCount}
          totalCount={totalCount}
          habit={habit}
          goalProgress={goalProgress}
          onOpenStreak={() => setShowStreakModal(true)}
          srsData={srsData}
          learned={learned}
        />}
        {view === 'vocab' && <VocabView selectedHSK={selectedHSK} setSelectedHSK={setSelectedHSK} learned={learned} toggleLearned={toggleLearned} starred={starred} toggleStar={toggleStar} srsData={srsData} updateSRS={updateSRS} />}
        {view === 'grammar' && <GrammarView />}
        {view === 'reading' && <ReadingView onActivity={trackReading} srsData={srsData} updateSRS={updateSRS} learned={learned} toggleLearned={toggleLearned} />}
        {view === 'flashcard' && <FlashcardView srsData={srsData} updateSRS={updateSRS} />}
        {view === 'quiz' && <QuizView toggleLearned={toggleLearned} learned={learned} addQuizScore={addQuizScore} srsData={srsData} />}
        {view === 'listening' && <ListeningView srsData={srsData} trackActivity={trackActivity} />}
        {view === 'writing' && <WritingView onActivity={trackWriting} />}
        {view === 'progress' && <ProgressView learned={learned} starred={starred} srsData={srsData} quizScores={quizScores} habit={habit} />}
      </main>

      <footer className="mt-20 py-8 px-6 text-center" style={{ borderTop:'1px solid var(--border)', color:'var(--muted)' }}>
        <div className="text-xs tracking-[0.3em] mb-2">加油 · CỐ LÊN</div>
        <div className="text-sm">Học một chút mỗi ngày — 学一点,每天进步</div>
      </footer>

      {/* Streak Calendar Modal */}
      {showStreakModal && (
        <StreakCalendarModal
          habit={habit}
          goalProgress={goalProgress}
          onClose={() => setShowStreakModal(false)}
          onUseFreeze={() => { useFreeze(); setShowStreakModal(false); }}
          onSetGoal={(min) => setGoal(min)}
        />
      )}

      {/* Milestone Toast */}
      {showMilestone && (
        <MilestoneToast
          milestone={showMilestone}
          onClose={() => {
            markMilestoneSeen(showMilestone.key);
            setShowMilestone(null);
          }}
        />
      )}
    </div>
  );
}

function __hideLoading(){
  const l=document.getElementById("loading");
  if(l){l.style.transition="opacity .5s";l.style.opacity="0";setTimeout(()=>l.style.display="none",500);}
}
function __showFatal(message){
  const l=document.getElementById("loading");
  if(l) l.style.display="none";
  let box=document.getElementById("__fatal");
  if(!box){
    box=document.createElement("div");
    box.id="__fatal";
    box.style.cssText="position:fixed;inset:0;z-index:99999;background:#fff;color:#b91c1c;font-family:system-ui,sans-serif;padding:24px;overflow:auto;line-height:1.6";
    document.body.appendChild(box);
  }
  box.innerHTML='<div style="max-width:760px;margin:40px auto">'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:8px">⚠️ Không tải được ứng dụng</div>'
    +'<div style="color:#374151;margin-bottom:16px">Chi tiết lỗi (gửi đoạn này nếu cần hỗ trợ):</div>'
    +'<pre style="white-space:pre-wrap;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;font-size:13px">'
    +String(message).replace(/</g,"&lt;")+'</pre></div>';
}
// Bắt lỗi tải file (vd: data/hsk1.js bị 404) — dùng capture để bắt cả lỗi tải script
window.addEventListener("error", function(e){
  const t=e.target;
  if(t && (t.tagName==="SCRIPT"||t.tagName==="LINK") && (t.src||t.href)){
    __showFatal("Không tải được file:\n  "+(t.src||t.href)
      +"\n\n→ Kiểm tra file này có tồn tại đúng đường dẫn không (thường là thiếu file trong thư mục data/, hoặc sai tên/đường dẫn).");
  } else if(e.error){
    __showFatal(e.error.stack || e.error.message || String(e.error));
  }
}, true);

try{
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
  setTimeout(__hideLoading,100);
}catch(err){
  __showFatal((err && (err.stack||err.message)) || String(err));
}
</script>
</body>
</html>
