const getToneColor = (pinyin) => {
  const toneMarks = {
    1: ['ā','ē','ī','ō','ū','ǖ','Ā','Ē','Ī','Ō','Ū'],
    2: ['á','é','í','ó','ú','ǘ','Á','É','Í','Ó','Ú'],
    3: ['ǎ','ě','ǐ','ǒ','ǔ','ǚ','Ǎ','Ě','Ǐ','Ǒ','Ǔ'],
    4: ['à','è','ì','ò','ù','ǜ','À','È','Ì','Ò','Ù'],
  };
  for (let tone in toneMarks)
    for (let mark of toneMarks[tone])
      if (pinyin.includes(mark)) return parseInt(tone);
  return 0;
};

// ============ AUDIO ENGINE ============
// Centralized speak() với queue guard — chống overlap, hỗ trợ delay, rate chuẩn
let _speakTimer = null;

const speak = (text, rate = 0.82, onEnd = null) => {
  if (!text || !('speechSynthesis' in window)) { onEnd && onEnd(); return; }
  // Clear any pending delayed speak
  if (_speakTimer) { clearTimeout(_speakTimer); _speakTimer = null; }
  // Cancel current utterance gracefully
  window.speechSynthesis.cancel();
  // Short pause after cancel to avoid Chrome bug where cancel+speak overlaps
  _speakTimer = setTimeout(() => {
    _speakTimer = null;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = Math.max(0.1, Math.min(2.0, rate));
    u.pitch = 1.0;
    u.volume = 1.0;
    // Chrome keepalive: re-trigger if stalls (known Chrome bug)
    const keepalive = setInterval(() => {
      if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    }, 5000);
    u.onend = () => { clearInterval(keepalive); onEnd && onEnd(); };
    u.onerror = () => { clearInterval(keepalive); onEnd && onEnd(); };
    window.speechSynthesis.speak(u);
  }, 80);
};

const speakPromise = (text, rate = 0.82) =>
  new Promise(resolve => speak(text, rate, resolve));

// Standard rates — clearly different from each other
const SPEAK_RATE = {
  slow:   0.55,   // 慢: very clear, learner-friendly
  normal: 0.85,   // 正常: comfortable study speed
  fast:   1.25,   // 快: near-native challenge
};

// ============ HABIT ENGINE ============
// Toàn bộ logic Streak, Daily Goal, Freeze, Milestone

const HABIT_KEY = 'hsk:habit';
const GOAL_MINUTES_DEFAULT = 15;

// Lấy chuỗi ngày dạng "YYYY-MM-DD" (theo local time)
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const yesterdayStr = () => {
  const d = new Date(); d.setDate(d.getDate()-1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

const defaultHabit = () => ({
  streak: 0,
  bestStreak: 0,
  lastStudyDate: null,
  studyHistory: {},      // { "2026-05-08": { minutes: 12, words: 23, actions: 5 } }
  freezesLeft: 1,
  freezesUsedDates: [],  // ngày đã dùng freeze
  goalMinutes: GOAL_MINUTES_DEFAULT,
  todayActivity: { minutes: 0, words: 0, actions: 0, startTime: null },
  milestonesSeen: [],    // ["7d","30d","100d",...] đã hiển thị
  xp: 0,
  level: 0,
});

const XP_TABLE = {
  reviewWord: 3, learnWord: 5, readingFinish: 15,
  quizComplete: 20, writePractice: 8, streakDay: 10,
  streak7: 100, streak30: 500, streak100: 2000,
};
const XP_LEVELS = [0,500,2000,5000,15000,Infinity];
const LEVEL_NAMES = ['初学者','学习者','进步者','熟练者','高手','大师'];

function calcLevel(xp) {
  for (let i=XP_LEVELS.length-1; i>=0; i--) {
    if (xp >= XP_LEVELS[i]) return i;
  }
  return 0;
}

function useHabit() {
  const [habit, setHabitState] = useState(() => {
    try {
      const raw = localStorage.getItem(HABIT_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        return { ...defaultHabit(), ...saved };
      }
    } catch(e) {}
    return defaultHabit();
  });

  // Ref để tránh stale closure trong tracking
  const habitRef = useRef(habit);
  habitRef.current = habit;

  const saveHabit = (next) => {
    setHabitState(next);
    try { localStorage.setItem(HABIT_KEY, JSON.stringify(next)); } catch(e) {}
  };

  // Tính toán trạng thái streak khi app mở
  const computeStreakOnLoad = useCallback(() => {
    const h = habitRef.current;
    const today = todayStr();
    const yesterday = yesterdayStr();
    if (h.lastStudyDate === today) return; // đã tính hôm nay

    let next = { ...h };

    // Reset todayActivity nếu ngày mới
    if (h.lastStudyDate !== today) {
      next.todayActivity = { minutes: 0, words: 0, actions: 0, startTime: null };
    }

    // Kiểm tra streak bị gãy
    if (h.lastStudyDate && h.lastStudyDate !== yesterday && h.lastStudyDate !== today) {
      // Khoảng trống > 1 ngày → có thể dùng freeze
      const lastDate = new Date(h.lastStudyDate);
      const todayDate = new Date(today);
      const gapDays = Math.floor((todayDate - lastDate) / 86400000);

      if (gapDays === 2 && h.freezesLeft > 0) {
        // Ngày hôm qua chưa học, dùng freeze tự động
        next.freezesLeft = h.freezesLeft - 1;
        next.freezesUsedDates = [...(h.freezesUsedDates||[]), yesterday];
        next.studyHistory = { ...next.studyHistory, [yesterday]: { freeze: true } };
        // Streak vẫn giữ
      } else if (gapDays > 1) {
        // Streak gãy
        next.streak = 0;
      }
    }

    saveHabit(next);
  }, []);

  useEffect(() => {
    computeStreakOnLoad();
  }, []);

  // Hàm track activity (gọi từ mọi module)
  const trackActivity = useCallback((type, amount = 1) => {
    const h = habitRef.current;
    const today = todayStr();
    let next = { ...h };

    // Update todayActivity
    const activity = { ...next.todayActivity };
    if (type === 'words') activity.words = (activity.words||0) + amount;
    if (type === 'minutes') activity.minutes = (activity.minutes||0) + amount;
    activity.actions = (activity.actions||0) + 1;
    next.todayActivity = activity;

    // Cộng XP
    const xpGain = XP_TABLE[type] || 0;
    next.xp = (next.xp||0) + xpGain * amount;
    next.level = calcLevel(next.xp);

    // Đánh dấu học ngày hôm nay + cập nhật streak
    const alreadyStudiedToday = next.lastStudyDate === today;
    if (!alreadyStudiedToday) {
      const wasYesterday = next.lastStudyDate === yesterdayStr();
      const wasFrozen = (next.freezesUsedDates||[]).includes(yesterdayStr());
      if (wasYesterday || wasFrozen || !next.lastStudyDate) {
        next.streak = (next.streak||0) + 1;
      } else if (!next.lastStudyDate) {
        next.streak = 1;
      } else {
        next.streak = 1; // reset
      }
      if (next.streak > (next.bestStreak||0)) next.bestStreak = next.streak;
      next.lastStudyDate = today;
      // Cộng XP streak day
      next.xp += XP_TABLE.streakDay;
      // Bonus streak milestones
      if (next.streak === 7) next.xp += XP_TABLE.streak7;
      if (next.streak === 30) next.xp += XP_TABLE.streak30;
      if (next.streak === 100) next.xp += XP_TABLE.streak100;
      next.level = calcLevel(next.xp);
    }

    // Lưu vào studyHistory
    next.studyHistory = {
      ...next.studyHistory,
      [today]: {
        minutes: activity.minutes,
        words: activity.words,
        actions: activity.actions,
      }
    };

    saveHabit(next);
    return next;
  }, []);

  // Dùng freeze thủ công
  const useFreeze = useCallback(() => {
    const h = habitRef.current;
    if (h.freezesLeft <= 0) return false;
    const today = todayStr();
    const next = {
      ...h,
      freezesLeft: h.freezesLeft - 1,
      freezesUsedDates: [...(h.freezesUsedDates||[]), today],
    };
    saveHabit(next);
    return true;
  }, []);

  // Cập nhật goal
  const setGoal = useCallback((minutes) => {
    saveHabit({ ...habitRef.current, goalMinutes: minutes });
  }, []);

  // Tính daily goal progress (0-100)
  const goalProgress = useMemo(() => {
    const h = habit;
    const target = h.goalMinutes || GOAL_MINUTES_DEFAULT;
    const today = todayStr();
    if (h.lastStudyDate !== today) return 0;
    // Ước tính phút từ actions (mỗi action ≈ 0.25 phút, mỗi từ ≈ 0.2 phút)
    const estimatedMinutes = (h.todayActivity.actions||0) * 0.25 + (h.todayActivity.words||0) * 0.2;
    return Math.min(100, Math.round((estimatedMinutes / target) * 100));
  }, [habit]);

  // Milestone mới cần show
  const pendingMilestone = useMemo(() => {
    const h = habit;
    const milestones = [
      { key:'1d', streak:1, msg:'Ngày đầu tiên! 🌱', sub:'Hành trình ngàn dặm bắt đầu từ một bước.' },
      { key:'3d', streak:3, msg:'3 ngày liên tiếp! 🔥', sub:'Bạn đang tạo thói quen học tập.' },
      { key:'7d', streak:7, msg:'1 tuần liên tiếp! 🏅', sub:'Streak 7 ngày — bạn đang nghiêm túc rồi đấy!' },
      { key:'14d', streak:14, msg:'2 tuần kiên trì! 🌟', sub:'Não bạn đang tái cấu trúc để học tiếng Trung.' },
      { key:'30d', streak:30, msg:'1 tháng không nghỉ! 🏆', sub:'Thói quen đã hình thành. Không thể dừng lại được nữa!' },
      { key:'50d', streak:50, msg:'50 ngày huyền thoại! 💎', sub:'Ở cấp độ này, bạn đã vượt qua 95% người học.' },
      { key:'100d', streak:100, msg:'100 ngày — TRUYỀN THUYẾT! 🐉', sub:'你真的很厉害！Bạn thật sự xuất sắc!' },
    ];
    const seen = h.milestonesSeen || [];
    return milestones.find(m => h.streak >= m.streak && !seen.includes(m.key)) || null;
  }, [habit]);

  const markMilestoneSeen = useCallback((key) => {
    const h = habitRef.current;
    const next = { ...h, milestonesSeen: [...(h.milestonesSeen||[]), key] };
    saveHabit(next);
  }, []);

  // Số từ cần ôn hôm nay (để hiển thị trên dashboard — tính từ srsData riêng)
  // Trả về habit state và các hàm
  return {
    habit,
    goalProgress,
    pendingMilestone,
    trackActivity,
    useFreeze,
    setGoal,
    markMilestoneSeen,
  };
}

// ============ DAILY DASHBOARD HELPERS ============

// Tính số từ due toàn bộ tất cả HSK levels từ srsData
function computeAllDueWords(srsData) {
  const now = Date.now();
  const result = { byLevel: {}, total: 0, overdue: 0, dueToday: 0, items: [] };
  for (let level = 1; level <= 6; level++) {
    const words = ALL_HSK[level] || [];
    let levelDue = 0;
    for (const w of words) {
      const d = srsData[w.id];
      if (!d) continue; // chưa vào SRS → chưa học lần nào, không tính due
      if (d.nextReview <= now) {
        result.total++;
        levelDue++;
        result.items.push({ ...w, level, srs: d });
        const overdueDays = (now - d.nextReview) / 86400000;
        if (overdueDays > 1) result.overdue++;
        else result.dueToday++;
      }
    }
    if (levelDue > 0) result.byLevel[level] = levelDue;
  }
  return result;
}

// Tính số từ new (chưa vào SRS) theo từng level
function computeNewWords(srsData, learnedWords) {
  const result = { byLevel: {}, total: 0 };
  for (let level = 1; level <= 6; level++) {
    const words = ALL_HSK[level] || [];
    const newCount = words.filter(w => !srsData[w.id] && !learnedWords.includes(w.id)).length;
    if (newCount > 0) result.byLevel[level] = newCount;
    result.total += newCount;
  }
  return result;
}

// Tính forecast 7 ngày tiếp theo
function computeWeekForecast(srsData) {
  const now = Date.now();
  const forecast = [];
  for (let day = 0; day < 7; day++) {
    const dayStart = now + day * 86400000;
    const dayEnd = dayStart + 86400000;
    let count = 0;
    for (const d of Object.values(srsData)) {
      if (d.nextReview >= dayStart && d.nextReview < dayEnd) count++;
    }
    forecast.push({ day, count });
  }
  return forecast;
}

// Ước tính thời gian ôn (giây mỗi từ ≈ 15 giây)
function estimateMinutes(count) {
  const secs = count * 15;
  if (secs < 60) return `< 1 phút`;
  return `~${Math.ceil(secs / 60)} phút`;
}

// Helper: đếm từ due theo level (dùng trong HSK level cards)
function due_byLevel_safe(srsData, level) {
  const now = Date.now();
  const words = ALL_HSK[level] || [];
  return words.filter(w => {
    const d = srsData[w.id];
    return d && d.nextReview <= now;
  }).length;
}

            <div className="text-xl mb-2">{icon}</div>

              background: isGoalDone
                ? 'linear-gradient(90deg, #10b981, #34d399)'

      {/* ── SECONDARY ACTION TILES ── */}

                Không có gì để ôn hôm nay
              </div>

                className="w-full py-2 rounded-xl text-sm font-semibold transition-all hover:scale-[1.02]"

                Xem tất cả →
              </button>
            </>

              ✨
            </div>
            <div>
              <div style={{ fontWeight: 600, fontSize: '13px', color: 'var(--ink)' }}>Từ mới chưa học</div>
              <div style={{ fontSize: '11px', color: 'var(--muted)' }}>Mở rộng vốn từ</div>
            </div>
          </div>

            {newWords.total.toLocaleString()}

          <div style={{ fontSize: '12px', color: 'var(--muted)', margin: '4px 0 12px' }}>
            {Object.entries(newWords.byLevel).slice(0,3).map(([l,c]) => `HSK${l}: ${c}`).join(' · ') || 'Đã học hết!'}

          <button onClick={() => setView('vocab')}

            style={{ background: 'linear-gradient(135deg, #10b981, #34d399)', color: 'white' }}>
            Học ngay →
          </button>
        </div>

        {/* Reading tile */}
        <div className="p-5 rounded-3xl soft-shadow"
          style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
          <div className="flex items-center gap-2 mb-3">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center"
              style={{ background: 'linear-gradient(135deg, #8b5cf6, #a78bfa)', color: 'white', fontSize: '16px' }}>
              📖
            </div>
            <div>
              <div style={{ fontWeight: 600, fontSize: '13px', color: 'var(--ink)' }}>Luyện đọc</div>
              <div style={{ fontSize: '11px', color: 'var(--muted)' }}>36 bài HSK 1-6</div>
            </div>
          </div>
          <div style={{ fontWeight: 800, fontSize: '28px', color: '#8b5cf6', lineHeight: 1 }}>
            36
          </div>
          <div style={{ fontSize: '12px', color: 'var(--muted)', margin: '4px 0 12px' }}>
            bài đọc theo cấp HSK
          </div>
          <button onClick={() => setView('reading')}
            className="w-full py-2 rounded-xl text-sm font-semibold transition-all hover:scale-[1.02]"
            style={{ background: 'linear-gradient(135deg, #8b5cf6, #a78bfa)', color: 'white' }}>
            Đọc ngay →
          </button>
        </div>
      </div>

      {/* ── 7-DAY FORECAST ── */}
      <div className="p-5 rounded-3xl soft-shadow"
        style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
        <button
          className="w-full flex items-center justify-between mb-4"
          onClick={() => setShowForecast(!showForecast)}>
          <div className="flex items-center gap-2">
            <span style={{ fontSize: '18px' }}>📆</span>
            <div>
              <div style={{ fontWeight: 600, fontSize: '15px', color: 'var(--ink)' }}>
                Lịch ôn tập 7 ngày tới
              </div>
              <div style={{ fontSize: '12px', color: 'var(--muted)' }}>
                Forecast dựa trên SRS hiện tại
              </div>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {forecast.some(f => f.count > 0) && (
              <div className="px-2.5 py-1 rounded-full text-xs font-semibold"
                style={{ background: 'var(--accent-soft)', color: 'var(--accent)' }}>
                Max {Math.max(...forecast.map(f => f.count))} từ/ngày
              </div>
            )}
            <span style={{ color: 'var(--muted)', fontSize: '14px', transition: 'transform 0.2s', transform: showForecast ? 'rotate(180deg)' : 'none', display: 'inline-block' }}>▾</span>
          </div>
        </button>

        {/* Mini bar chart — always visible */}
        <div className="flex items-end gap-2 mb-3" style={{ height: '72px' }}>
          {forecast.map(({ day, count }) => {
            const heightPct = forecastMax > 0 ? (count / forecastMax) * 100 : 0;
            const isToday = day === 0;
            const isHeavy = count > 20;
            return (
              <div key={day} className="flex-1 flex flex-col items-center gap-1">
                {/* Bar */}
                <div className="w-full rounded-t-lg relative flex items-end justify-center transition-all"
                  style={{ height: '56px' }}>
                  <div
                    className="w-full rounded-t-lg transition-all duration-500"
                    style={{
                      height: count > 0 ? `${Math.max(heightPct, 6)}%` : '4px',
                      background: isToday
                        ? 'linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%)'
                        : isHeavy
                          ? 'linear-gradient(180deg, #f59e0b 0%, #fbbf24 100%)'
                          : 'var(--surface-soft)',
                      border: isToday ? 'none' : '1px solid var(--border)',
                      minHeight: '4px'
                    }} />
                  {count > 0 && (
                    <div className="absolute -top-5 left-1/2 -translate-x-1/2 text-[10px] font-bold"
                      style={{ color: isToday ? 'var(--accent)' : isHeavy ? '#e08e0a' : 'var(--muted)', whiteSpace: 'nowrap' }}>
                      {count}
                    </div>
                  )}
                </div>
                {/* Day label */}
                <div style={{
                  fontSize: '9px',
                  fontWeight: isToday ? 700 : 500,
                  color: isToday ? 'var(--accent)' : 'var(--muted)',
                  whiteSpace: 'nowrap'
                }}>
                  {dayLabels[day]}
                </div>
              </div>
            );
          })}
        </div>

        {/* Expandable detail */}
        {showForecast && (
          <div className="mt-3 pt-3 space-y-2" style={{ borderTop: '1px dashed var(--border)' }}>
            {forecast.map(({ day, count }) => (
              <div key={day} className="flex items-center justify-between py-1">
                <div className="flex items-center gap-3">
                  <div className="w-2 h-2 rounded-full"
                    style={{ background: day === 0 ? 'var(--accent)' : count > 20 ? '#f59e0b' : 'var(--border)' }} />
                  <span style={{ fontSize: '13px', color: 'var(--ink)', fontWeight: day === 0 ? 600 : 400 }}>
                    {day === 0 ? 'Hôm nay' : day === 1 ? 'Ngày mai' : `${day} ngày nữa`}
                  </span>
                </div>
                <div className="flex items-center gap-2">
                  <span style={{ fontSize: '13px', fontWeight: 600, color: count > 20 ? '#e08e0a' : 'var(--ink)' }}>
                    {count} từ
                  </span>
                  <span style={{ fontSize: '11px', color: 'var(--muted)' }}>
                    {count > 0 ? estimateMinutes(count) : '—'}
                  </span>
                </div>
              </div>
            ))}
            {forecast.every(f => f.count === 0) && (
              <div className="py-4 text-center">
                <div className="hanzi-text text-4xl mb-2" style={{ color: 'var(--accent-soft)' }}>空</div>
                <div style={{ fontSize: '13px', color: 'var(--muted)' }}>
                  Chưa có từ nào trong SRS — bắt đầu dùng Flashcard để tạo lịch ôn!
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* ── LEVEL BREAKDOWN (compact) ── */}
      {Object.keys(due.byLevel).length > 1 && (
        <div className="p-5 rounded-3xl soft-shadow"
          style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
          <div className="text-xs tracking-widest mb-3" style={{ color: 'var(--muted)', fontWeight: 600 }}>
            PHÂN BỔ TỪ CẦN ÔN THEO CẤP
          </div>
          <div className="space-y-2">
            {Object.entries(due.byLevel).map(([level, count]) => {
              const total = (ALL_HSK[parseInt(level)] || []).length;
              const pct = Math.round((count / total) * 100);
              const hskColors = { 1:'#10b981', 2:'#3d8bd1', 3:'#8b5cf6', 4:'#f59e0b', 5:'#ef4444', 6:'#374151' };
              return (
                <div key={level} className="flex items-center gap-3">
                  <div className="w-12 text-xs font-bold" style={{ color: hskColors[level] }}>
                    HSK {level}
                  </div>
                  <div className="flex-1 h-2 rounded-full overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
                    <div className="h-full rounded-full"
                      style={{ width: `${pct}%`, background: hskColors[level], minWidth: '8px' }} />
                  </div>
                  <div className="text-xs font-semibold" style={{ color: 'var(--ink)', minWidth: '40px', textAlign: 'right' }}>
                    {count} từ
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

            const lc = learnedCount[level] || 0;
            const total = totalCount[level] || 0;
            const pct = total > 0 ? Math.round((lc / total) * 100) : 0;
            const hskColors = { 1:'#10b981', 2:'#3d8bd1', 3:'#8b5cf6', 4:'#f59e0b', 5:'#ef4444', 6:'#374151' };
            const dueInLevel = due_byLevel_safe(srsData, level);
            return (
              <button key={level} onClick={() => { setSelectedHSK(level); setView('vocab'); }}
                className="group relative p-5 rounded-3xl transition-all hover:scale-105 hover:-translate-y-1 text-left soft-shadow"
                style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
                {dueInLevel > 0 && (
                  <div className="absolute -top-1.5 -right-1.5 px-2 py-0.5 rounded-full text-[10px] font-bold"
                    style={{ background: 'var(--accent)', color: 'white', boxShadow: '0 2px 8px rgba(61,139,209,0.4)' }}>
                    {dueInLevel}
                  </div>
                )}
                <div className="text-xs tracking-widest mb-2" style={{ color:'var(--muted)' }}>CẤP {level}</div>
                <div className="text-4xl mb-3" style={{ fontFamily:'var(--font-display)', fontWeight:600, color: hskColors[level] }}>HSK{level}</div>
                <div className="text-sm mb-3" style={{ color:'var(--muted)' }}>{total} từ</div>
                <div className="h-1 rounded-full overflow-hidden" style={{ background:'var(--bg)' }}>
                  <div className="h-full transition-all" style={{ width:`${pct}%`, background: hskColors[level] }} />
                </div>
                <div className="text-xs mt-2" style={{ color:'var(--muted)' }}>{lc}/{total}</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Features grid */}
      <div>
        <div className="flex items-center gap-3 mb-6">
          <div className="w-1 h-8" style={{ background:'var(--accent)' }} />
          <h2 className="text-2xl" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Tính năng học tập</h2>
        </div>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {features.map((f, i) => (
            <button key={i} onClick={() => setView(f.view)}
              className="group p-6 rounded-3xl transition-all hover:translate-y-[-4px] text-left soft-shadow"
              style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
              <div className="w-12 h-12 mb-4 flex items-center justify-center rounded-2xl transition-all group-hover:scale-110 hanzi-text"
                style={{ background:'linear-gradient(135deg, var(--accent), var(--accent-2))', color:'white', fontSize:'22px', fontWeight: 500 }}>{f.icon}</div>
              <div className="text-lg mb-2" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>{f.title}</div>
              <div className="text-sm leading-relaxed" style={{ color:'var(--muted)' }}>{f.desc}</div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

// ============ VOCAB VIEW ============
// ============ VOCAB DETAIL MODAL ============
const VocabDetailModal = ({ word, onClose, isLearned, isStarred, toggleLearned, toggleStar, wordList, setSelectedWord }) => {
  const [charIdx, setCharIdx] = useState(0);
  const [strokeCount, setStrokeCount] = useState(0);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [keyboardHint, setKeyboardHint] = useState(null); // hiệu ứng nhấn phím
  const writerContainerRef = useRef(null);
  const lastIndexRef = useRef(-1); // theo dõi vị trí trước đó để xử lý auto-advance
  const justToggledRef = useRef(false); // flag để xử lý auto-advance sau khi toggle

  const currentChar = word ? word.hanzi[charIdx] : '';

  // Tìm vị trí từ hiện tại trong list để navigate
  const currentIndexInList = useMemo(() => {
    if (!wordList || !word) return -1;
    return wordList.findIndex(w => w.id === word.id);
  }, [wordList, word]);

  // Cập nhật lastIndexRef mỗi khi từ thay đổi (để biết vị trí cũ)
  useEffect(() => {
    if (currentIndexInList >= 0) {
      lastIndexRef.current = currentIndexInList;
    }
  }, [currentIndexInList]);

  // Auto-advance: khi từ hiện tại bị filter ra khỏi list (currentIndexInList === -1)
  // sau khi vừa nhấn Z, tự động chuyển đến từ tiếp theo cùng vị trí (hoặc đóng nếu hết)
  useEffect(() => {
    if (!word || !wordList || !setSelectedWord) return;
    if (justToggledRef.current && currentIndexInList === -1) {
      justToggledRef.current = false;
      // Từ hiện tại đã bị lọc khỏi danh sách → chuyển đến từ tiếp theo
      const targetIdx = lastIndexRef.current;
      if (wordList.length === 0) {
        // Hết từ trong list → đóng modal
        onClose();
      } else if (targetIdx < wordList.length) {
        // Còn từ ở vị trí cũ (đã shift lên) → mở từ đó
        setSelectedWord(wordList[targetIdx]);
      } else {
        // Đã ở cuối → mở từ cuối cùng còn lại
        setSelectedWord(wordList[wordList.length - 1]);
      }
    }
  }, [wordList, currentIndexInList, word, setSelectedWord, onClose]);

  const goToPrev = () => {
    if (!wordList || !setSelectedWord || currentIndexInList <= 0) return;
    setSelectedWord(wordList[currentIndexInList - 1]);
    setKeyboardHint('prev');
    setTimeout(() => setKeyboardHint(null), 200);
  };

  const goToNext = () => {
    if (!wordList || !setSelectedWord || currentIndexInList === -1 || currentIndexInList >= wordList.length - 1) return;
    setSelectedWord(wordList[currentIndexInList + 1]);
    setKeyboardHint('next');
    setTimeout(() => setKeyboardHint(null), 200);
  };

  // Phím tắt: ESC đóng, ←→ chuyển từ, Z đánh dấu thuộc, S đánh dấu sao
  useEffect(() => {
    const handleKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'Escape') {
        onClose();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        goToPrev();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        goToNext();
      } else if (e.key === 'z' || e.key === 'Z') {
        e.preventDefault();
        // Đánh dấu flag để effect tự động chuyển từ tiếp theo nếu cần
        justToggledRef.current = true;
        toggleLearned(word.id);
        setKeyboardHint('learned');
        setTimeout(() => setKeyboardHint(null), 400);
      } else if (e.key === 's' || e.key === 'S') {
        e.preventDefault();
        // Tương tự Z, vì filter "yêu thích" cũng có thể loại bỏ từ
        justToggledRef.current = true;
        toggleStar(word.id);
        setKeyboardHint('star');
        setTimeout(() => setKeyboardHint(null), 400);
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [word, currentIndexInList, wordList]);

  useEffect(() => {
    if (!word) return;
    setCharIdx(0);
    // Tự động phát âm khi mở từ mới (click-to-pronounce, chỉ phát 1 lần)
    const t = setTimeout(() => speak(word.hanzi), 250);
    return () => clearTimeout(t);
  }, [word]);

  useEffect(() => {
    if (!currentChar) return;
    let cancelled = false;
    setLoading(true);
    setError(null);

    (async () => {
      try {
        const HanziWriter = await loadHanziWriter();
        if (cancelled) return;

        if (writerContainerRef.current) {
          writerContainerRef.current.innerHTML = '';
        }

        const containerId = `hw-detail-${Date.now()}`;
        if (writerContainerRef.current) {
          writerContainerRef.current.id = containerId;
        }

        const isDark = document.documentElement.style.getPropertyValue('--bg') === '#0f1a2e';
        const inkColor = isDark ? '#e8f1fc' : '#1e3a5f';

        const writer = HanziWriter.create(containerId, currentChar, {
          width: 200,
          height: 200,
          padding: 8,
          showOutline: true,
          showCharacter: false,
          strokeColor: inkColor,
          outlineColor: '#d6e4f0',
          highlightColor: '#5b9bd5',
          drawingColor: '#5b9bd5',
          strokeAnimationSpeed: 0.5,
          delayBetweenStrokes: 600,
        });

        HanziWriter.loadCharacterData(currentChar).then(charData => {
          if (cancelled) return;
          setStrokeCount(charData.strokes.length);
        }).catch(() => {});

        // Auto-animate on open
        setTimeout(() => {
          if (!cancelled && writer) {
            writer.animateCharacter();
          }
        }, 300);

        // Save writer ref for replay button
        writerContainerRef.current._writer = writer;
        setLoading(false);
      } catch (e) {
        if (!cancelled) {
          setError('Không thể tải dữ liệu nét bút');
          setLoading(false);
        }
      }
    })();

    return () => { cancelled = true; };
  }, [currentChar]);

  const handleReplay = () => {
    const w = writerContainerRef.current?._writer;
    if (w) w.animateCharacter();
  };

  // Khóa scroll body khi modal mở
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  if (!word) return null;

  return (
    <div
      onClick={onClose}
      className="fixed inset-0 z-[100] flex items-center justify-center p-4"
      style={{ background: 'rgba(15, 26, 46, 0.5)', backdropFilter: 'blur(8px)', animation: 'fadeIn 0.2s ease-out' }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        className="relative w-full max-w-3xl rounded-3xl overflow-hidden soft-shadow-lg"
        style={{
          background: 'var(--surface)',
          maxHeight: '90vh',
          overflowY: 'auto',
          animation: 'slideUp 0.3s ease-out',
        }}
      >
        {/* Navigation prev/next buttons */}
        {wordList && wordList.length > 1 && currentIndexInList > 0 && (
          <button
            onClick={(e) => { e.stopPropagation(); goToPrev(); }}
            className="hidden md:flex absolute left-4 top-1/2 -translate-y-1/2 z-10 w-12 h-12 rounded-full items-center justify-center transition-all hover:scale-110 soft-shadow-lg"
            style={{
              background: keyboardHint === 'prev' ? 'var(--accent)' : 'var(--surface)',
              color: keyboardHint === 'prev' ? 'white' : 'var(--ink)',
              border: '1px solid var(--border)',
              fontSize: '20px'
            }}
            title="Từ trước (←)"
          >←</button>
        )}
        {wordList && wordList.length > 1 && currentIndexInList < wordList.length - 1 && (
          <button
            onClick={(e) => { e.stopPropagation(); goToNext(); }}
            className="hidden md:flex absolute right-4 top-1/2 -translate-y-1/2 z-10 w-12 h-12 rounded-full items-center justify-center transition-all hover:scale-110 soft-shadow-lg"
            style={{
              background: keyboardHint === 'next' ? 'var(--accent)' : 'var(--surface)',
              color: keyboardHint === 'next' ? 'white' : 'var(--ink)',
              border: '1px solid var(--border)',
              fontSize: '20px'
            }}
            title="Từ sau (→)"
          >→</button>
        )}

        {/* Close button */}
        <button onClick={onClose} className="absolute top-4 right-4 z-10 w-10 h-10 rounded-full flex items-center justify-center transition-all hover:scale-110"
          style={{ background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
          ✕
        </button>

        {/* Position indicator */}
        {wordList && wordList.length > 1 && currentIndexInList >= 0 && (
          <div className="absolute top-4 left-4 z-10 px-3 py-1.5 rounded-full text-xs"
            style={{ background: 'var(--bg)', color: 'var(--muted)', border: '1px solid var(--border)', fontWeight: 500 }}>
            {currentIndexInList + 1} / {wordList.length}
          </div>
        )}

        {/* Keyboard hint feedback */}
        {keyboardHint === 'learned' && (
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none px-6 py-3 rounded-2xl soft-shadow-lg flex items-center gap-2"
            style={{
              background: isLearned ? 'var(--accent-2)' : 'var(--surface)',
              color: isLearned ? 'white' : 'var(--ink)',
              border: `1px solid ${isLearned ? 'var(--accent-2)' : 'var(--border)'}`,
              animation: 'fadeIn 0.2s ease-out'
            }}>
            <span style={{ fontSize: '20px' }}>{isLearned ? '✓' : '✗'}</span>
            <span style={{ fontWeight: 600 }}>{isLearned ? 'Đã đánh dấu thuộc' : 'Bỏ đánh dấu thuộc'}</span>
          </div>
        )}
        {keyboardHint === 'star' && (
          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 pointer-events-none px-6 py-3 rounded-2xl soft-shadow-lg flex items-center gap-2"
            style={{
              background: isStarred ? '#fef3c7' : 'var(--surface)',
              color: isStarred ? '#d97706' : 'var(--ink)',
              border: `1px solid ${isStarred ? '#fcd34d' : 'var(--border)'}`,
              animation: 'fadeIn 0.2s ease-out'
            }}>
            <span style={{ fontSize: '20px' }}>{isStarred ? '★' : '☆'}</span>
            <span style={{ fontWeight: 600 }}>{isStarred ? 'Đã ghim yêu thích' : 'Bỏ ghim yêu thích'}</span>
          </div>
        )}

        {/* Header section */}
        <div className="p-6 pb-4" style={{ background: 'linear-gradient(135deg, var(--surface-soft), var(--surface))' }}>
          <div className="flex items-start gap-4 flex-wrap">
            <div className="flex-1 min-w-0">
              <span className="text-xs px-3 py-1 rounded-full inline-block mb-3" style={{ background:'var(--bg)', color:'var(--muted)' }}>{word.type}</span>
              <button onClick={() => speak(word.hanzi)}
                className="block text-6xl mb-3 hanzi-text hover:scale-105 transition-transform"
                style={{ color:'var(--ink)', fontWeight:500 }}>{word.hanzi}</button>
              <div className="mb-2"><ColoredPinyin pinyin={word.pinyin} size="2xl" /></div>
              <div className="text-xl mb-3" style={{ color:'var(--ink)' }}>{word.meaning}</div>
              <button onClick={() => speak(word.hanzi)} className="px-4 py-2 rounded-2xl text-sm"
                style={{ background:'var(--accent)', color:'white', fontWeight:500 }}>
                🔊 Phát âm
              </button>
            </div>
            {/* Action buttons */}
            <div className="flex flex-col gap-2">
              <button onClick={() => toggleStar(word.id)}
                className="px-4 py-2.5 rounded-2xl text-sm transition-all flex items-center gap-2"
                style={{ background: isStarred ? '#fef3c7' : 'var(--bg)', color: isStarred ? '#d97706' : 'var(--ink)', border:'1px solid var(--border)', fontWeight:500 }}>
                <span style={{ fontSize:'18px' }}>{isStarred ? '★' : '☆'}</span>
                {isStarred ? 'Đã đánh dấu' : 'Đánh dấu'}
              </button>
              <button onClick={() => { justToggledRef.current = true; toggleLearned(word.id); }}
                className="px-4 py-2.5 rounded-2xl text-sm transition-all flex items-center gap-2"
                style={{ background: isLearned ? '#10b981' : 'var(--bg)', color: isLearned ? 'white' : 'var(--ink)', border:'1px solid var(--border)', fontWeight:500 }}>
                <span style={{ fontSize:'18px' }}>{isLearned ? '✓' : '○'}</span>
                {isLearned ? 'Đã thuộc' : 'Chưa thuộc'}
              </button>
            </div>
          </div>
        </div>

        {/* Content section */}
        <div className="p-6 pt-2 space-y-5">
          {/* Stroke order section */}
          <div className="p-5 rounded-3xl" style={{ background:'var(--bg)', border:'1px solid var(--border)' }}>
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <div className="text-xs tracking-widest" style={{ color:'var(--accent)', fontWeight:600 }}>
                ✍️ THỨ TỰ NÉT BÚT
                {strokeCount > 0 && <span className="ml-2 px-2 py-0.5 rounded-full" style={{ background:'var(--surface)', color:'var(--muted)', fontWeight:500 }}>{strokeCount} nét</span>}
              </div>
              {/* Char selector for multi-char words */}
              {word.hanzi.length > 1 && (
                <div className="flex gap-1.5">
                  {word.hanzi.split('').map((ch, i) => (
                    <button key={i} onClick={() => setCharIdx(i)}
                      className="w-9 h-9 rounded-xl hanzi-text transition-all"
                      style={{
                        background: charIdx === i ? 'var(--accent)' : 'var(--surface)',
                        color: charIdx === i ? 'white' : 'var(--ink)',
                        border: '1px solid var(--border)',
                        fontSize: '17px', fontWeight: 500
                      }}>{ch}</button>
                  ))}
                </div>
              )}
            </div>
            <div className="flex flex-col md:flex-row items-center gap-4">
              <div className="relative flex items-center justify-center" style={{ width:'220px', height:'220px', flexShrink: 0 }}>
                {loading && (
                  <div className="text-center">
                    <div className="hanzi-text mb-1" style={{ color:'var(--accent)', fontSize:'40px', animation:'pulse 1.5s infinite' }}>笔</div>
                    <div className="text-xs" style={{ color:'var(--muted)' }}>Đang tải...</div>
                  </div>
                )}
                {error && (
                  <div className="text-center">
                    <div className="text-3xl mb-1">⚠️</div>
                    <div className="text-xs" style={{ color:'var(--muted)' }}>{error}</div>
                  </div>
                )}
                <div ref={writerContainerRef} style={{ display: loading || error ? 'none' : 'block' }} />
              </div>
              <div className="flex-1 space-y-2 w-full">
                <button onClick={handleReplay} disabled={loading || error}
                  className="w-full py-2.5 rounded-2xl text-sm transition-all"
                  style={{ background:'var(--accent)', color:'white', fontWeight:500, opacity: loading || error ? 0.5 : 1 }}>
                  🔄 Xem lại animation
                </button>
                <div className="text-xs leading-relaxed p-3 rounded-2xl" style={{ background:'var(--surface)', color:'var(--muted)' }}>
                  💡 <strong style={{color:'var(--ink)'}}>Mẹo:</strong> Quan sát thứ tự các nét được vẽ. Nguyên tắc cơ bản: trên trước dưới, trái trước phải, ngang trước dọc.
                </div>
              </div>
            </div>
          </div>

          {/* Pinyin & pronunciation guide */}
          <div className="p-5 rounded-3xl" style={{ background:'var(--bg)', border:'1px solid var(--border)' }}>
            <div className="text-xs tracking-widest mb-3" style={{ color:'var(--accent)', fontWeight:600 }}>🗣 PHÁT ÂM (PINYIN)</div>
            <div className="flex items-center gap-3 flex-wrap">
              <ColoredPinyin pinyin={word.pinyin} size="2xl" />
              <button onClick={() => speak(word.hanzi)} className="px-3 py-1.5 rounded-xl text-sm" style={{ background:'var(--accent-soft)', color:'var(--ink)' }}>🔊 Nghe</button>
            </div>
            <div className="mt-3 text-xs leading-relaxed" style={{ color:'var(--muted)' }}>
              Màu sắc thanh điệu: <span style={{color:'var(--tone-1)', fontWeight:600}}>thanh 1 (¯)</span> · <span style={{color:'var(--tone-2)', fontWeight:600}}>thanh 2 (ˊ)</span> · <span style={{color:'var(--tone-3)', fontWeight:600}}>thanh 3 (ˇ)</span> · <span style={{color:'var(--tone-4)', fontWeight:600}}>thanh 4 (ˋ)</span>
            </div>
          </div>

          {/* Example sentences - multiple */}
          <div className="p-5 rounded-3xl" style={{ background:'var(--bg)', border:'1px solid var(--border)' }}>
            <div className="text-xs tracking-widest mb-3 flex items-center justify-between" style={{ color:'var(--accent)', fontWeight:600 }}>
              <span>📖 CÂU VÍ DỤ</span>
              {word.examples && word.examples.length > 1 && (
                <span style={{ color: 'var(--muted)', fontWeight: 500 }}>{word.examples.length} câu</span>
              )}
            </div>
            <div className="space-y-3">
              {(() => {
                // Ưu tiên dùng mảng examples mới, fallback sang trường cũ
                const list = (word.examples && word.examples.length > 0)
                  ? word.examples
                  : (word.example ? [{ hanzi: word.example, pinyin: word.examplePinyin, meaning: word.exampleMeaning }] : []);
                return list.map((ex, idx) => (
                  <div key={idx} className={idx > 0 ? "pt-3" : ""} style={{ borderTop: idx > 0 ? '1px dashed var(--border)' : 'none' }}>
                    <div className="flex items-start gap-2 mb-1.5">
                      <span className="text-xs mt-1 px-1.5 py-0.5 rounded-md flex-shrink-0" style={{ background: 'var(--accent-soft)', color: 'white', fontWeight: 600, minWidth: '20px', textAlign: 'center' }}>{idx + 1}</span>
                      <button onClick={() => speak(ex.hanzi)}
                        className="text-xl hanzi-text hover:underline text-left flex-1"
                        style={{ color:'var(--ink)', fontWeight:500, lineHeight: 1.5 }}>{ex.hanzi} <span style={{ fontSize: '14px' }}>🔊</span></button>
                    </div>
                    <div className="mb-1 ml-7"><ColoredPinyin pinyin={ex.pinyin} size="base" /></div>
                    <div className="italic ml-7" style={{ color:'var(--muted)', fontSize: '14px' }}>{ex.meaning}</div>
                  </div>
                ));
              })()}
            </div>
          </div>
        </div>

        {/* Keyboard shortcuts footer */}
        <div className="px-6 py-3 flex flex-wrap items-center justify-center gap-3 text-xs"
          style={{ background: 'var(--bg)', borderTop: '1px solid var(--border)', color: 'var(--muted)' }}>
          <span style={{ fontWeight: 600 }}>⌨ Phím tắt:</span>
          <span className="flex items-center gap-1">
            <kbd style={{ background: 'var(--surface)', padding: '2px 8px', borderRadius: '4px', border: '1px solid var(--border)', fontFamily: 'monospace', color: 'var(--ink)', fontWeight: 600 }}>←</kbd>
            <kbd style={{ background: 'var(--surface)', padding: '2px 8px', borderRadius: '4px', border: '1px solid var(--border)', fontFamily: 'monospace', color: 'var(--ink)', fontWeight: 600 }}>→</kbd>
            chuyển từ
          </span>
          <span className="flex items-center gap-1">
            <kbd style={{ background: 'var(--surface)', padding: '2px 8px', borderRadius: '4px', border: '1px solid var(--border)', fontFamily: 'monospace', color: 'var(--ink)', fontWeight: 600 }}>Z</kbd>
            đánh dấu thuộc
          </span>
          <span className="flex items-center gap-1">
            <kbd style={{ background: 'var(--surface)', padding: '2px 8px', borderRadius: '4px', border: '1px solid var(--border)', fontFamily: 'monospace', color: 'var(--ink)', fontWeight: 600 }}>S</kbd>
            ghim yêu thích
          </span>
          <span className="flex items-center gap-1">
            <kbd style={{ background: 'var(--surface)', padding: '2px 8px', borderRadius: '4px', border: '1px solid var(--border)', fontFamily: 'monospace', color: 'var(--ink)', fontWeight: 600 }}>Esc</kbd>
            đóng
          </span>
        </div>
      </div>
    </div>
  );
};

// ============ VOCAB LEARN MODE ============
// Step-by-step learning scaffold: Expose → Understand → Quick-Test
const VocabLearnMode = ({ words, srsData, learned, starred, toggleLearned, toggleStar, updateSRS, onExit }) => {
  const [learnIdx, setLearnIdx] = useState(0);
  const [step, setStep] = useState('expose');   // 'expose' | 'understand' | 'test'
  const [testAnswer, setTestAnswer] = useState(null);  // null | 'correct' | 'wrong'
  const [testChoices, setTestChoices] = useState([]);
  const [sessionLearned, setSessionLearned] = useState(0);
  const [showDone, setShowDone] = useState(false);

  // Only words not yet in SRS (truly new)
  const newWords = useMemo(() =>
    words.filter(w => !srsData[w.id]).slice(0, 10),
  [words, srsData]);

  const word = newWords[learnIdx];

  // Auto-speak on expose
  useEffect(() => {
    if (!word || step !== 'expose') return;
    const t = setTimeout(() => speak(word.hanzi), 300);
    return () => clearTimeout(t);
  }, [word?.id, step]);

  // Build test choices
  useEffect(() => {
    if (!word || step !== 'test') return;
    const allWords = words;
    const distractors = allWords
      .filter(w => w.id !== word.id)
      .sort(() => Math.random() - 0.5)
      .slice(0, 3)
      .map(w => w.meaning);
    const choices = [...distractors, word.meaning].sort(() => Math.random() - 0.5);
    setTestChoices(choices);
    setTestAnswer(null);
  }, [word?.id, step]);

  const handleTestAnswer = (choice) => {
    if (testAnswer) return;
    const correct = choice === word.meaning;
    setTestAnswer(correct ? 'correct' : 'wrong');

    // Add to SRS with initial state
    if (!srsData[word.id]) {
      const initState = fsrsUpdateState(null, correct ? 3 : 1);
      updateSRS(word.id, initState);
    }

    setTimeout(() => {
      const nextIdx = learnIdx + 1;
      if (nextIdx >= newWords.length) {
        setShowDone(true);
      } else {
        setLearnIdx(nextIdx);
        setStep('expose');
        setSessionLearned(s => s + 1);
      }
    }, 1200);
  };

  const advance = () => {
    if (step === 'expose') setStep('understand');
    else if (step === 'understand') setStep('test');
  };

  // Keyboard: Space to advance, 1-4 for test choices
  useEffect(() => {
    const handleKey = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); if (step !== 'test') advance(); }
      if (step === 'test' && !testAnswer) {
        const n = parseInt(e.key);
        if (n >= 1 && n <= testChoices.length) handleTestAnswer(testChoices[n - 1]);
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [step, testAnswer, testChoices, word]);

  if (newWords.length === 0) {
    return (
      <div className="max-w-lg mx-auto text-center py-16 px-6">
        <div className="text-6xl mb-4 hanzi-text" style={{ color: 'var(--accent-soft)' }}>完</div>
        <div className="text-xl font-bold mb-2" style={{ color: 'var(--ink)' }}>Không có từ mới!</div>
        <div className="text-sm mb-6" style={{ color: 'var(--muted)' }}>Tất cả từ cấp này đã vào SRS. Thử cấp HSK khác.</div>
        <button onClick={onExit} className="px-6 py-3 rounded-2xl font-semibold"
          style={{ background: 'var(--accent)', color: 'white' }}>← Quay lại</button>
      </div>
    );
  }

  if (showDone) {
    return (
      <div className="max-w-lg mx-auto text-center py-16 px-6">
        <div className="text-6xl mb-4">🎉</div>
        <div className="text-2xl font-bold mb-2" style={{ color: 'var(--ink)' }}>Học xong {newWords.length} từ mới!</div>
        <div className="text-sm mb-8" style={{ color: 'var(--muted)' }}>Các từ này đã được thêm vào SRS. Nhớ ôn lại theo lịch nhé!</div>
        <div className="flex gap-3 justify-center flex-wrap">
          <button onClick={onExit} className="px-6 py-3 rounded-2xl font-semibold"
            style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)' }}>← Về từ vựng</button>
        </div>
      </div>
    );
  }

  if (!word) return null;

  const progress = learnIdx / newWords.length;
  const ex = (word.examples && word.examples[0]) || { hanzi: word.example, pinyin: word.examplePinyin, meaning: word.exampleMeaning };

  return (
    <div className="max-w-xl mx-auto px-4 py-6">
      {/* Header */}
      <div className="flex items-center justify-between mb-4">
        <button onClick={onExit} className="flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-xl"
          style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
          ← Thoát
        </button>
        <div className="text-sm font-semibold" style={{ color: 'var(--muted)' }}>
          {learnIdx + 1} / {newWords.length}
        </div>
        <div className="text-xs px-2 py-1 rounded-full font-semibold"
          style={{ background: step === 'expose' ? 'var(--surface-soft)' : step === 'understand' ? 'var(--accent-soft)' : 'var(--accent)', color: step === 'test' ? 'white' : 'var(--accent)', border: '1px solid var(--border)' }}>
          {step === 'expose' ? '👁 Nhìn' : step === 'understand' ? '📖 Hiểu' : '✍️ Kiểm tra'}
        </div>
      </div>

      {/* Progress bar */}
      <div className="h-1.5 rounded-full mb-6 overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
        <div className="h-full rounded-full transition-all duration-500"
          style={{ width: `${progress * 100}%`, background: 'linear-gradient(90deg, var(--accent), var(--accent-2))' }} />
      </div>

      {/* ── STEP: EXPOSE ── */}
      {step === 'expose' && (
        <div className="rounded-3xl soft-shadow overflow-hidden" style={{ background: 'linear-gradient(145deg, var(--surface), var(--surface-soft))', border: '1px solid var(--border)' }}>
          <div className="p-8 text-center">
            <div className="text-xs tracking-[0.3em] mb-6" style={{ color: 'var(--muted)', fontWeight: 500 }}>
              TỪ MỚI · HSK {selectedHSK || ''}
            </div>
            <button onClick={() => speak(word.hanzi)}
              className="hanzi-text mb-4 hover:scale-105 transition-transform block mx-auto"
              style={{ fontSize: 'clamp(72px, 15vw, 108px)', color: 'var(--ink)', fontWeight: 500, lineHeight: 1 }}>
              {word.hanzi}
            </button>
            {/* Tone dots */}
            <div className="flex justify-center gap-2 mb-6">
              {word.pinyin.split(' ').filter(Boolean).map((syl, i) => (
                <div key={i} className="w-2.5 h-2.5 rounded-full" style={{ background: TONE_COLORS[getToneColor(syl)] || 'var(--border)' }} />
              ))}
            </div>
            <button onClick={() => speak(word.hanzi)} className="px-4 py-2 rounded-2xl text-sm mb-2"
              style={{ background: 'var(--accent)', color: 'white', fontWeight: 500 }}>
              🔊 Phát âm
            </button>
            <div className="text-xs mt-6" style={{ color: 'var(--muted)' }}>
              Nhìn và lắng nghe, rồi nhấn <kbd className="px-1.5 py-0.5 rounded" style={{ background:'var(--surface)',border:'1px solid var(--border)',fontFamily:'monospace' }}>Space</kbd> để tiếp tục
            </div>
          </div>
          <button onClick={advance}
            className="w-full py-4 font-bold text-base transition-all hover:opacity-90 active:opacity-75"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white' }}>
            Xem nghĩa →
          </button>
        </div>
      )}

      {/* ── STEP: UNDERSTAND ── */}
      {step === 'understand' && (
        <div className="rounded-3xl soft-shadow overflow-hidden" style={{ background: 'var(--surface)', border: '1.5px solid var(--accent-soft)' }}>
          <div className="p-6">
            {/* Word header */}
            <div className="text-center pb-4 mb-4" style={{ borderBottom: '1px dashed var(--border)' }}>
              <button onClick={() => speak(word.hanzi)} className="hanzi-text hover:opacity-80 transition-opacity"
                style={{ fontSize: 'clamp(44px, 10vw, 64px)', color: 'var(--ink)', fontWeight: 500, lineHeight: 1 }}>
                {word.hanzi} <span style={{ fontSize: '18px' }}>🔊</span>
              </button>
              <div className="mt-3 mb-2"><ColoredPinyin pinyin={word.pinyin} size="xl" /></div>
              <div style={{ fontSize: '22px', fontWeight: 700, color: 'var(--ink)' }}>{word.meaning}</div>
              <div className="mt-2 inline-block px-2 py-0.5 rounded-md text-xs"
                style={{ background: 'var(--bg)', color: 'var(--muted)' }}>{word.type}</div>
            </div>

            {/* Example */}
            {ex && ex.hanzi && (
              <div className="mb-4 p-4 rounded-2xl" style={{ background: 'var(--bg)', border: '1px solid var(--border)' }}>
                <div className="text-[10px] tracking-widest mb-2" style={{ color: 'var(--accent)', fontWeight: 600 }}>✨ VÍ DỤ</div>
                <button onClick={() => speak(ex.hanzi)} className="hanzi-text hover:opacity-80 transition-opacity block w-full text-left"
                  style={{ fontSize: '18px', color: 'var(--ink)', fontWeight: 500, lineHeight: 1.5 }}>
                  {ex.hanzi} <span style={{ fontSize: '13px' }}>🔊</span>
                </button>
                <div className="mt-1.5"><ColoredPinyin pinyin={ex.pinyin} size="sm" /></div>
                <div className="text-sm italic mt-1" style={{ color: 'var(--muted)' }}>{ex.meaning}</div>
              </div>
            )}

            {/* Quick tip */}
            <div className="text-xs p-3 rounded-xl" style={{ background: 'var(--surface-soft)', color: 'var(--muted)' }}>
              💡 <strong style={{ color: 'var(--ink)' }}>Mẹo ghi nhớ:</strong> Đọc to câu ví dụ 2 lần, rồi nhắm mắt và thử nhớ lại nghĩa của từ.
            </div>
          </div>
          <button onClick={advance}
            className="w-full py-4 font-bold text-base transition-all hover:opacity-90"
            style={{ background: 'linear-gradient(135deg, #10b981, #34d399)', color: 'white' }}>
            Thử kiểm tra →
          </button>
        </div>
      )}

      {/* ── STEP: QUICK TEST ── */}
      {step === 'test' && (
        <div className="rounded-3xl soft-shadow overflow-hidden" style={{ background: 'var(--surface)', border: '1.5px solid var(--border)' }}>
          <div className="p-6">
            <div className="text-xs tracking-widest mb-4 text-center" style={{ color: 'var(--muted)', fontWeight: 600 }}>
              NGHĨA CỦA TỪ NÀY LÀ GÌ?
            </div>
            <div className="text-center mb-6">
              <div className="hanzi-text" style={{ fontSize: 'clamp(52px, 12vw, 80px)', color: 'var(--ink)', fontWeight: 500 }}>{word.hanzi}</div>
              <div className="mt-2"><ColoredPinyin pinyin={word.pinyin} size="lg" /></div>
            </div>

            <div className="grid grid-cols-1 gap-2.5">
              {testChoices.map((choice, i) => {
                const isCorrect = choice === word.meaning;
                const isSelected = testAnswer !== null && (isCorrect || (testAnswer === 'wrong' && choice !== word.meaning));
                let bg = 'var(--surface)', color = 'var(--ink)', border = '1px solid var(--border)';
                if (testAnswer) {
                  if (isCorrect) { bg = '#d1fae5'; color = '#065f46'; border = '2px solid #6ee7b7'; }
                  else if (testAnswer === 'wrong' && !isCorrect && choice !== word.meaning) { /* dim */ }
                }

                return (
                  <button key={i}
                    onClick={() => handleTestAnswer(choice)}
                    disabled={!!testAnswer}
                    className="w-full text-left px-4 py-3.5 rounded-2xl transition-all font-medium flex items-center gap-3"
                    style={{ background: bg, color, border, fontSize: '15px', opacity: testAnswer && !isCorrect ? 0.5 : 1 }}>
                    <span className="text-xs font-bold px-1.5 py-0.5 rounded-md flex-shrink-0"
                      style={{ background: 'var(--surface-soft)', color: 'var(--muted)' }}>{i + 1}</span>
                    {choice}
                    {testAnswer && isCorrect && <span className="ml-auto text-lg">✓</span>}
                  </button>
                );
              })}
            </div>

            {testAnswer && (
              <div className="mt-4 text-center text-sm font-semibold"
                style={{ color: testAnswer === 'correct' ? '#10b981' : '#ef4444' }}>
                {testAnswer === 'correct' ? '🎉 Chính xác!' : '❌ Sai rồi — từ tiếp theo nhé!'}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Step indicators */}
      <div className="flex justify-center gap-2 mt-5">
        {['expose','understand','test'].map((s, i) => (
          <div key={s} className="w-2 h-2 rounded-full transition-all"
            style={{ background: s === step ? 'var(--accent)' : 'var(--border)', transform: s === step ? 'scale(1.4)' : 'scale(1)' }} />
        ))}
      </div>
    </div>
  );
};

// selectedHSK shared ref for LearnMode (workaround for closure)
let _selectedHSK_ref = 1;

// ============ VOCAB VIEW ============
const VocabView = ({ selectedHSK, setSelectedHSK, learned, toggleLearned, starred, toggleStar, srsData, updateSRS }) => {
  _selectedHSK_ref = selectedHSK;
  const [viewMode, setViewMode] = useState('browse'); // 'browse' | 'learn'
  const [gridDensity, setGridDensity] = useState('comfortable'); // 'comfortable' | 'compact'
  const [search, setSearch] = useState('');
  const [globalSearch, setGlobalSearch] = useState('');
  const [filter, setFilter] = useState('all'); // 'all' | 'notLearned' | 'learned' | 'starred' | 'due' | 'new'
  const [selectedWord, setSelectedWord] = useState(null);
  const searchRef = useRef(null);

  const words = ALL_HSK[selectedHSK] || [];

  // SRS stats per level
  const srsStats = useMemo(() => {
    const now = Date.now();
    const stats = { due: 0, inSRS: 0, new: 0 };
    for (const w of words) {
      const d = srsData[w.id];
      if (!d) stats.new++;
      else {
        stats.inSRS++;
        if (d.nextReview <= now) stats.due++;
      }
    }
    return stats;
  }, [words, srsData]);

  // Global search
  const isGlobalMode = globalSearch.trim().length > 0;
  const globalResults = useMemo(() => {
    if (!isGlobalMode) return [];
    const q = globalSearch.trim();
    const qLow = q.toLowerCase();
    const qNorm = normalizePinyin(q); // no-tone version: "nihao"
    const all = [];
    for (let level = 1; level <= 6; level++) {
      for (const w of (ALL_HSK[level] || [])) {
        const pinyinNorm = normalizePinyin(w.pinyin);
        if (
          w.hanzi.includes(qLow) ||
          w.pinyin.toLowerCase().includes(qLow) ||
          pinyinNorm.includes(qNorm) ||           // no-tone match
          w.meaning.toLowerCase().includes(qLow)
        ) {
          all.push({ ...w, hskLevel: level });
        }
      }
    }
    return all.slice(0, 200);
  }, [globalSearch, isGlobalMode]);

  // Level filter counts
  const filterCounts = useMemo(() => {
    const now = Date.now();
    const learnedSet = new Set(learned);
    const starredSet = new Set(starred);
    let learnedN = 0, starredN = 0, dueN = 0, newN = 0;
    for (const w of words) {
      if (learnedSet.has(w.id)) learnedN++;
      if (starredSet.has(w.id)) starredN++;
      const d = srsData[w.id];
      if (!d) newN++;
      else if (d.nextReview <= now) dueN++;
    }
    return {
      all: words.length,
      notLearned: words.length - learnedN,
      learned: learnedN,
      starred: starredN,
      due: dueN,
      new: newN,
    };
  }, [words, learned, starred, srsData]);

  const filtered = useMemo(() => {
    const now = Date.now();
    const learnedSet = new Set(learned);
    const starredSet = new Set(starred);
    const hasSearch = !!search;
    const qLow = hasSearch ? search.toLowerCase() : '';
    const qNorm = hasSearch ? normalizePinyin(search) : '';
    return words.filter(w => {
      let matchSearch = true;
      if (hasSearch) {
        const pinyinNorm = normalizePinyin(w.pinyin);
        matchSearch = w.hanzi.includes(qLow)
          || w.pinyin.toLowerCase().includes(qLow)
          || pinyinNorm.includes(qNorm)            // no-tone pinyin match
          || w.meaning.toLowerCase().includes(qLow);
      }
      const il = learnedSet.has(w.id);
      const is = starredSet.has(w.id);
      const d = srsData[w.id];
      const matchFilter =
        filter === 'all' ? true :
        filter === 'notLearned' ? !il :
        filter === 'learned' ? il :
        filter === 'starred' ? is :
        filter === 'due' ? (d && d.nextReview <= now) :
        filter === 'new' ? !d :
        true;
      return matchSearch && matchFilter;
    });
  }, [words, search, filter, learned, starred, srsData]);

  const displayList = isGlobalMode ? globalResults : filtered;

  // Keyboard: '/' to focus search, Escape to clear
  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === '/' && !selectedWord && document.activeElement?.tagName !== 'INPUT') {
        e.preventDefault();
        searchRef.current?.focus();
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [selectedWord]);

  const FILTER_OPTIONS = [
    { id: 'all',        label: 'Tất cả',      emoji: '📚' },
    { id: 'new',        label: 'SRS mới',      emoji: '✨' },
    { id: 'due',        label: 'Đến hạn',      emoji: '⏰' },
    { id: 'notLearned', label: 'Chưa thuộc',   emoji: '○'  },
    { id: 'learned',    label: 'Đã thuộc',     emoji: '✓'  },
    { id: 'starred',    label: 'Yêu thích',    emoji: '★'  },
  ];

  // ── LEARN MODE ──
  if (viewMode === 'learn') {
    return (
      <div className="max-w-7xl mx-auto px-6 py-8">
        <div className="flex items-center gap-3 mb-6">
          <button onClick={() => setViewMode('browse')}
            className="px-4 py-2 rounded-2xl text-sm font-semibold transition-all hover:scale-105"
            style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
            ← Về danh sách
          </button>
          <div className="text-xs tracking-widest" style={{ color: 'var(--accent)', fontWeight: 600 }}>
            CHẾ ĐỘ HỌC TỪ MỚI · HSK {selectedHSK}
          </div>
        </div>
        <VocabLearnMode
          words={words}
          srsData={srsData}
          learned={learned}
          starred={starred}
          toggleLearned={toggleLearned}
          toggleStar={toggleStar}
          updateSRS={updateSRS}
          onExit={() => setViewMode('browse')}
        />
      </div>
    );
  }

  // ── BROWSE MODE ──
  return (
    <div className="max-w-7xl mx-auto px-6 py-8">

      {/* ── HEADER ── */}
      <div className="mb-6">
        <div className="text-xs tracking-[0.3em] mb-1" style={{ color:'var(--accent)' }}>词汇 · TỪ VỰNG</div>
        <div className="flex items-end justify-between flex-wrap gap-3 mb-5">
          <h1 className="text-3xl" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>
            {isGlobalMode ? <>Tìm kiếm <span style={{ color:'var(--accent)' }}>HSK 1-6</span></> : <>Từ vựng <span style={{ color:'var(--accent)' }}>HSK {selectedHSK}</span></>}
          </h1>
          {/* View mode toggle */}
          {!isGlobalMode && (
            <div className="flex gap-2">
              <button onClick={() => setViewMode('learn')}
                className="flex items-center gap-1.5 px-4 py-2 rounded-2xl text-sm font-semibold transition-all hover:scale-105"
                style={{ background: 'linear-gradient(135deg, #10b981, #34d399)', color: 'white', boxShadow: '0 4px 12px rgba(16,185,129,0.3)' }}>
                ✨ Học từ mới ({srsStats.new})
              </button>
              <button
                onClick={() => setGridDensity(d => d === 'comfortable' ? 'compact' : 'comfortable')}
                className="p-2 rounded-xl transition-all hover:scale-110"
                style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)', fontSize: '16px' }}
                title={gridDensity === 'comfortable' ? 'Chế độ compact' : 'Chế độ comfortable'}>
                {gridDensity === 'comfortable' ? '⊞' : '⊟'}
              </button>
            </div>
          )}
        </div>

        {/* ── GLOBAL SEARCH BAR ── */}
        <div className="mb-4 p-4 rounded-3xl soft-shadow"
          style={{ background: 'linear-gradient(135deg, var(--surface) 0%, var(--surface-soft) 100%)', border: `2px solid ${isGlobalMode ? 'var(--accent)' : 'var(--accent-soft)'}`, transition: 'border-color 0.2s' }}>
          <div className="flex items-center gap-2 mb-2">
            <span>🌐</span>
            <span className="text-xs tracking-widest font-bold" style={{ color: 'var(--accent)' }}>TÌM KIẾM TOÀN CỤC HSK 1-6</span>
            {isGlobalMode && <span className="ml-auto text-xs px-2 py-0.5 rounded-full font-semibold" style={{ background:'var(--accent)', color:'white' }}>{globalResults.length} kết quả</span>}
          </div>
          <div className="relative">
            <input type="text" value={globalSearch} onChange={e => setGlobalSearch(e.target.value)}
              placeholder="Tìm chữ Hán, pinyin, hoặc nghĩa tiếng Việt..."
              className="w-full px-4 py-3 pl-11 rounded-2xl outline-none"
              style={{ background:'var(--bg)', color:'var(--ink)', border:'1px solid var(--border)', fontSize:'15px' }} />
            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-lg" style={{ color:'var(--accent)' }}>🔍</span>
            {globalSearch && (
              <button onClick={() => setGlobalSearch('')}
                className="absolute right-3 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold"
                style={{ background:'var(--accent-soft)', color:'white' }}>✕</button>
            )}
          </div>
          {!isGlobalMode && (
            <div className="mt-2 text-xs" style={{ color:'var(--muted)' }}>
              💡 Hoặc nhấn <kbd className="px-1.5 py-0.5 rounded" style={{ background:'var(--surface)',border:'1px solid var(--border)',fontFamily:'monospace' }}>/</kbd> để tìm kiếm nhanh
            </div>
          )}
        </div>

        {/* ── LEVEL TABS + FILTER + SEARCH (khi không global) ── */}
        {!isGlobalMode && (
          <>
            {/* HSK level tabs */}
            <div className="flex gap-1.5 flex-wrap mb-4">
              {[1,2,3,4,5,6].map(level => {
                const lvlDue = due_byLevel_safe(srsData, level);

// ============ FSRS-4.5 ALGORITHM ============
// Lightweight FSRS implementation (~30 lines)
// Better than SM-2 by ~20% retention accuracy
const FSRS_W = [0.4, 0.6, 2.4, 5.8, 4.93, 0.94, 0.86, 0.01, 1.49, 0.14, 0.94, 2.18, 0.05, 0.34, 1.26, 0.29, 2.61];

function fsrsInitStability(rating) {
  // Initial stability based on first rating (1-4)
  return Math.max(FSRS_W[rating - 1] || 1, 0.1);
}

function fsrsNextInterval(stability, requestedRetention = 0.9) {
  // Days until 90% retention probability
  return Math.round(9 * stability * (requestedRetention / (1 - requestedRetention)));
}

function fsrsUpdateState(card, rating) {
  // card = { stability, difficulty, reps, lapses, state }
  // rating: 1=Again, 2=Hard, 3=Good, 4=Easy
  const now = Date.now();
  if (!card || card.state === 'new') {
    // First review
    const stability = fsrsInitStability(rating);
    const difficulty = Math.max(1, Math.min(10,
      FSRS_W[4] - (rating - 3) * FSRS_W[5]
    ));
    const nextInterval = rating === 1 ? 1 : rating === 2 ? 2 : rating === 3 ? fsrsNextInterval(stability) : Math.round(fsrsNextInterval(stability) * FSRS_W[16]);
    return {
      state: rating === 1 ? 'learning' : 'review',
      stability,
      difficulty,
      reps: 1,
      lapses: 0,
      lastReview: now,
      nextReview: now + nextInterval * 86400000,
      lastRating: rating,
      interval: nextInterval,
    };
  }

  if (card.state === 'learning' || card.state === 'relearning') {
    if (rating < 3) {
      return { ...card, lastReview: now, nextReview: now + 600000, lastRating: rating, interval: 0 }; // 10 min
    }
    const stability = fsrsInitStability(rating);
    const interval = rating === 3 ? 1 : 3;
    return { ...card, state: 'review', stability, reps: (card.reps||0) + 1, lastReview: now, nextReview: now + interval * 86400000, lastRating: rating, interval };
  }

  // Review state
  const elapsedDays = Math.max(1, (now - (card.lastReview||now)) / 86400000);
  const retrievability = Math.exp(Math.log(0.9) * elapsedDays / (card.stability||1));

  let newStability, newDifficulty, newLapses = card.lapses||0, nextState = 'review';

  if (rating === 1) {
    // Forgot
    newLapses = (card.lapses||0) + 1;
    newStability = card.stability * FSRS_W[11] * Math.exp(-FSRS_W[12] * newLapses);
    newDifficulty = Math.min(10, (card.difficulty||5) + FSRS_W[6] * (1 - retrievability));
    nextState = 'relearning';
  } else {
    const hardPenalty = rating === 2 ? FSRS_W[15] : 1;
    const easyBonus = rating === 4 ? FSRS_W[16] : 1;
    newStability = card.stability * (
      Math.exp(FSRS_W[8]) *
      (11 - (card.difficulty||5)) *
      Math.pow(card.stability||1, -FSRS_W[9]) *
      (Math.exp((1 - retrievability) * FSRS_W[10]) - 1) *
      hardPenalty * easyBonus
    );
    newDifficulty = Math.max(1, Math.min(10,
      (card.difficulty||5) - FSRS_W[6] * (rating - 3)
    ));
  }

  newStability = Math.max(0.1, newStability || 0.5);
  let interval;
  if (nextState === 'relearning') {
    interval = 0; // 10 min relearn
  } else {
    interval = Math.max(1, fsrsNextInterval(newStability));
    if (rating === 2) interval = Math.max(1, Math.round(interval * FSRS_W[15]));
  }

  return {
    state: nextState,
    stability: newStability,
    difficulty: newDifficulty,
    reps: (card.reps||0) + 1,
    lapses: newLapses,
    lastReview: now,
    nextReview: nextState === 'relearning'
      ? now + 600000
      : now + interval * 86400000,
    lastRating: rating,
    interval,
  };
}

// Format interval for display
function formatInterval(days) {
  if (!days || days === 0) return '10 phút';
  if (days === 1) return '1 ngày';
  if (days < 7) return `${days} ngày`;
  if (days < 30) return `${Math.round(days / 7)} tuần`;
  if (days < 365) return `${Math.round(days / 30)} tháng`;
  return `${Math.round(days / 365)} năm`;
}
