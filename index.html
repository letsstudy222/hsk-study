        </div>
        <div className="p-4 rounded-2xl" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
          <div style={{ fontSize: '28px', fontWeight: 800, color: accuracy >= 70 ? '#10b981' : '#f59e0b', lineHeight: 1 }}>{accuracy}%</div>
          <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>Chính xác</div>
        </div>
      </div>

      {/* Breakdown bar */}
      {stats.total > 0 && (
        <div className="mb-6 max-w-xs mx-auto">
          <div className="flex h-3 rounded-full overflow-hidden mb-2">
            {stats.forgot > 0 && <div style={{ width:`${(stats.forgot/stats.total)*100}%`, background:'#ef4444' }} title={`Quên: ${stats.forgot}`} />}
            {stats.hard  > 0 && <div style={{ width:`${(stats.hard/stats.total)*100}%`,  background:'#f59e0b' }} title={`Khó: ${stats.hard}`} />}
            {stats.good  > 0 && <div style={{ width:`${(stats.good/stats.total)*100}%`,  background:'#10b981' }} title={`Ổn: ${stats.good}`} />}
            {stats.easy  > 0 && <div style={{ width:`${(stats.easy/stats.total)*100}%`,  background:'#3b82f6' }} title={`Dễ: ${stats.easy}`} />}
          </div>
          <div className="flex justify-center gap-3 text-xs" style={{ color: 'var(--muted)' }}>
            <span>😕 {stats.forgot}</span>
            <span>🤔 {stats.hard}</span>
            <span>🙂 {stats.good}</span>
            <span>😎 {stats.easy}</span>
          </div>
        </div>
      )}

      {/* CTA buttons */}
      <div className="flex flex-col gap-3 max-w-xs mx-auto">
        {hasMore && (
          <button onClick={onContinue}
            className="w-full py-3.5 rounded-2xl font-bold text-base transition-all hover:scale-105"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white', boxShadow: '0 4px 16px rgba(61,139,209,0.35)' }}>
            ▶ Tiếp tục ({remaining} từ còn lại)
          </button>
        )}
        <button onClick={onReset}
          className="w-full py-3 rounded-2xl font-semibold transition-all hover:scale-[1.02]"
          style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
          🔁 Bắt đầu lại từ đầu
        </button>
      </div>
    </div>
  );
};

// ============ FLASHCARD VIEW (REBUILT) ============
const FlashcardView = ({ srsData, updateSRS }) => {
  const [hskLevel, setHskLevel] = useState(1);
  const [mode, setMode] = useState('daily'); // 'daily' | 'new' | 'cram'
  const [flipped, setFlipped] = useState(false);
  const [sessionQueue, setSessionQueue] = useState(null); // null = not started | [] = queue of words
  const [sessionIdx, setSessionIdx] = useState(0);         // current position in queue
  const [reQueue, setReQueue] = useState([]);              // failed cards to repeat at session end
  const [sessionStats, setSessionStats] = useState({ forgot:0, hard:0, good:0, easy:0, total:0 });
  const [feedback, setFeedback] = useState(null);          // brief rating flash
  const [sessionDone, setSessionDone] = useState(false);   // show end screen

  // Touch swipe state
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);
  const cardRef = useRef(null);
  const isSwiping = useRef(false);

  const words = ALL_HSK[hskLevel] || [];

  // ── Count stats per mode ──
  const modeCounts = useMemo(() => {
    const now = Date.now();
    let daily = 0, newCards = 0, cram = words.length;
    for (const w of words) {
      const d = srsData[w.id];
      if (!d || d.nextReview <= now) daily++;
      if (!d) newCards++;
    }
    return { daily, new: newCards, cram };
  }, [words, srsData, hskLevel]);

  // ── Build session queue ──
  const buildQueue = useCallback((targetMode) => {
    const now = Date.now();
    let pool = [];
    if (targetMode === 'daily') {
      pool = words.filter(w => {
        const d = srsData[w.id];
        return !d || d.nextReview <= now;
      });
      // Sort: overdue first, then by nextReview
      pool.sort((a, b) => {
        const da = srsData[a.id], db = srsData[b.id];
        if (!da && !db) return 0;
        if (!da) return 1; // new cards after due
        if (!db) return -1;
        return (da.nextReview||0) - (db.nextReview||0);
      });
    } else if (targetMode === 'new') {
      pool = words.filter(w => !srsData[w.id]);
    } else {
      pool = [...words];
    }
    return pool.slice(0, SESSION_SIZE);
  }, [words, srsData]);

  const startSession = (targetMode) => {
    const queue = buildQueue(targetMode);
    setSessionQueue(queue);
    setSessionIdx(0);
    setReQueue([]);
    setSessionStats({ forgot:0, hard:0, good:0, easy:0, total:0 });
    setFlipped(false);
    setFeedback(null);
    setSessionDone(false);
    setMode(targetMode);
  };

  const resetSession = () => {
    setSessionQueue(null);
    setSessionIdx(0);
    setReQueue([]);
    setSessionStats({ forgot:0, hard:0, good:0, easy:0, total:0 });
    setFlipped(false);
    setFeedback(null);
    setSessionDone(false);
  };

  // Current word
  const currentWord = sessionQueue ? sessionQueue[sessionIdx] : null;

  // Auto-speak on new card
  useEffect(() => {
    if (!currentWord) return;
    setFlipped(false);
    const t = setTimeout(() => speak(currentWord.hanzi), 280);
    return () => clearTimeout(t);
  }, [currentWord?.id]);

  // Progress through session
  const remaining = useMemo(() => {
    if (!sessionQueue) return 0;
    const allDue = buildQueue(mode);
    return Math.max(0, allDue.length - (sessionIdx + 1));
  }, [sessionQueue, sessionIdx, mode, buildQueue]);

  // ── Handle Rating ──
  const handleRate = useCallback((rating) => {
    if (!currentWord || feedback) return;
    const prev = srsData[currentWord.id] || null;
    const next = fsrsUpdateState(prev, rating);
    updateSRS(currentWord.id, next);

    const ratingKey = ['', 'forgot', 'hard', 'good', 'easy'][rating] || 'good';
    setSessionStats(s => ({ ...s, [ratingKey]: s[ratingKey]+1, total: s.total+1 }));

    // Flash feedback
    const rc = RATING_CONFIG[rating - 1];
    setFeedback({ ...rc, interval: formatInterval(next.interval) });

    // If failed → add to requeue (will appear again at end of session)
    if (rating === 1) {
      setReQueue(q => [...q, currentWord]);
    }

    setTimeout(() => {
      setFeedback(null);
      const nextIdx = sessionIdx + 1;

      if (nextIdx >= sessionQueue.length) {
        // Reached end of initial queue
        if (reQueue.length > 0 && rating !== 1) {
          // Replay failed cards
          setSessionQueue(q => [...q, ...reQueue]);
          setReQueue([]);
          setSessionIdx(nextIdx);
        } else if (rating === 1 && reQueue.length === 0) {
          // Only failed card
          setSessionQueue(q => [...q, currentWord]);
          setSessionIdx(nextIdx);
        } else {
          setSessionDone(true);
        }
      } else {
        setSessionIdx(nextIdx);
      }
    }, 650);
  }, [currentWord, feedback, srsData, updateSRS, sessionIdx, sessionQueue, reQueue]);

  // ── Keyboard shortcuts ──
  useEffect(() => {
    const handleKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (!sessionQueue || sessionDone || feedback) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setFlipped(f => !f);
      } else if (flipped) {
        if (e.key === '1') { e.preventDefault(); handleRate(1); }
        else if (e.key === '2') { e.preventDefault(); handleRate(2); }
        else if (e.key === '3') { e.preventDefault(); handleRate(3); }
        else if (e.key === '4') { e.preventDefault(); handleRate(4); }
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [flipped, feedback, currentWord, sessionQueue, sessionDone, handleRate]);

  // ── Touch / Swipe gestures ──
  const handleTouchStart = (e) => {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
    isSwiping.current = false;
  };

  const handleTouchMove = (e) => {
    if (!touchStartX.current) return;
    const dx = e.touches[0].clientX - touchStartX.current;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
      isSwiping.current = true;
    }
  };

  const handleTouchEnd = (e) => {
    if (!touchStartX.current) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    if (isSwiping.current && Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (!flipped) {
        // Swipe up to flip
      } else if (!feedback) {
        if (dx < -60) handleRate(1); // swipe left = forgot
        else if (dx > 60) handleRate(4); // swipe right = easy
      }
    } else if (!isSwiping.current && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
      setFlipped(f => !f);
    }
    touchStartX.current = null;
    isSwiping.current = false;
  };

  // ── SRS Status indicator for current card ──
  const currentCardSRS = currentWord ? srsData[currentWord.id] : null;
  const srsStatusLabel = !currentCardSRS
    ? { label: 'MỚI', color: '#10b981', bg: '#d1fae5' }
    : currentCardSRS.state === 'learning' || currentCardSRS.state === 'relearning'
    ? { label: 'ĐANG HỌC', color: '#f59e0b', bg: '#fef3c7' }
    : { label: `${currentCardSRS.reps || 0} LẦN ÔN`, color: 'var(--accent)', bg: 'var(--surface-soft)' };

  // ── PRE-SESSION SETUP SCREEN ──
  if (!sessionQueue) {
    return (
      <div className="max-w-2xl mx-auto px-6 py-8">
        <div className="mb-8">
          <div className="text-xs tracking-[0.3em] mb-2" style={{ color:'var(--accent)' }}>卡片 · FLASHCARD</div>
          <h1 className="text-3xl mb-1" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Ôn tập với SRS</h1>
          <div className="text-sm mb-6" style={{ color:'var(--muted)' }}>Thuật toán FSRS-4.5 — tối ưu hóa thời điểm ôn tập</div>

          {/* HSK Level tabs */}
          <div className="flex gap-1.5 flex-wrap mb-6">
            {[1,2,3,4,5,6].map(l => {
              const due = (() => {
                const now = Date.now();
                return (ALL_HSK[l]||[]).filter(w => {
                  const d = srsData[w.id]; return !d || d.nextReview <= now;
                }).length;
              })();
              return (
                <button key={l}
                  onClick={() => { setHskLevel(l); }}
                  className="relative px-4 py-2 rounded-2xl text-sm transition-all font-semibold"
                  style={{
                    background: hskLevel === l ? 'var(--accent)' : 'var(--surface)',
                    color: hskLevel === l ? 'white' : 'var(--ink)',
                    border: '1px solid var(--border)'
                  }}>
                  HSK {l}
                  {due > 0 && (
                    <span className="absolute -top-1.5 -right-1.5 min-w-[18px] h-[18px] px-1 rounded-full text-[10px] font-bold flex items-center justify-center"
                      style={{ background: hskLevel === l ? 'white' : 'var(--accent)', color: hskLevel === l ? 'var(--accent)' : 'white' }}>
                      {due > 99 ? '99+' : due}
                    </span>
                  )}
                </button>
              );
            })}
          </div>

          {/* Mode selector - 3 clean modes */}
          <div className="space-y-3 mb-8">
            {[
              {
                id: 'daily',
                icon: '⏰',
                title: 'Daily Review',
                desc: 'Ôn từ đến hạn theo lịch SRS',
                count: modeCounts.daily,
                countLabel: 'từ đến hạn',
                color: 'var(--accent)',
                gradient: 'linear-gradient(135deg, var(--accent), var(--accent-2))',
                recommended: true,
              },
              {
                id: 'new',
                icon: '✨',
                title: 'Học từ mới',
                desc: 'Học các từ chưa vào SRS',
                count: modeCounts.new,
                countLabel: 'từ mới',
                color: '#10b981',
                gradient: 'linear-gradient(135deg, #10b981, #34d399)',
              },
              {
                id: 'cram',
                icon: '📚',
                title: 'Cram Mode',
                desc: 'Xem lại toàn bộ, không ảnh hưởng lịch SRS',
                count: modeCounts.cram,
                countLabel: 'từ tổng cộng',
                color: '#8b5cf6',
                gradient: 'linear-gradient(135deg, #8b5cf6, #a78bfa)',
              },
            ].map(m => (
              <div key={m.id}
                onClick={() => setMode(m.id)}
                className="relative p-5 rounded-2xl cursor-pointer transition-all hover:scale-[1.01]"
                style={{
                  background: mode === m.id ? 'var(--surface-soft)' : 'var(--surface)',
                  border: `2px solid ${mode === m.id ? m.color : 'var(--border)'}`,
                  boxShadow: mode === m.id ? `0 4px 20px ${m.color}25` : 'none',
                }}>
                {m.recommended && (
                  <div className="absolute -top-2 right-4 px-2 py-0.5 rounded-full text-[10px] font-bold text-white"
                    style={{ background: m.color }}>
                    KHUYẾN NGHỊ
                  </div>
                )}
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0 text-2xl"
                    style={{ background: m.gradient }}>
                    {m.icon}
                  </div>
                  <div className="flex-1">
                    <div className="flex items-center gap-2">
                      <div style={{ fontWeight: 600, fontSize: '16px', color: 'var(--ink)' }}>{m.title}</div>
                    </div>
                    <div style={{ fontSize: '13px', color: 'var(--muted)', marginTop: '2px' }}>{m.desc}</div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div style={{ fontWeight: 800, fontSize: '22px', color: m.color, lineHeight: 1 }}>
                      {Math.min(m.count, SESSION_SIZE)}
                    </div>
                    <div style={{ fontSize: '10px', color: 'var(--muted)' }}>
                      {m.count > SESSION_SIZE ? `/${m.count}` : m.countLabel}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Session size info */}
          <div className="flex items-center gap-2 mb-6 p-3 rounded-xl"
            style={{ background: 'var(--surface-soft)', border: '1px solid var(--border)' }}>
            <span style={{ fontSize: '14px' }}>ℹ️</span>
            <span className="text-xs" style={{ color: 'var(--muted)' }}>
              Mỗi session tối đa <strong style={{ color: 'var(--ink)' }}>{SESSION_SIZE} từ</strong> để giữ tập trung. Từ quên sẽ xuất hiện lại trong cùng session.
            </span>
          </div>

          {/* Start button */}
          {modeCounts[mode] === 0 ? (
            <div className="text-center py-8 rounded-2xl" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
              <div className="text-5xl mb-3 hanzi-text" style={{ color: 'var(--accent-soft)' }}>空</div>
              <div className="font-semibold mb-1" style={{ color: 'var(--ink)' }}>
                {mode === 'daily' ? 'Không có từ nào đến hạn hôm nay 🎉' : 'Không có từ mới'}
              </div>
              <div className="text-sm" style={{ color: 'var(--muted)' }}>
                {mode === 'daily' ? 'Thử chế độ "Học từ mới" hoặc "Cram Mode"' : 'Thử chế độ khác'}
              </div>
            </div>
          ) : (
            <button
              onClick={() => startSession(mode)}
              className="w-full py-4 rounded-2xl font-bold text-lg transition-all hover:scale-[1.02] active:scale-[0.98]"
              style={{
                background: 'linear-gradient(135deg, var(--accent), var(--accent-2))',
                color: 'white',
                boxShadow: '0 6px 24px rgba(61,139,209,0.4)',
              }}>
              ▶ Bắt đầu Session ({Math.min(modeCounts[mode] || 0, SESSION_SIZE)} từ)
            </button>
          )}

          {/* Keyboard shortcut hint */}
          <div className="mt-4 text-xs text-center" style={{ color: 'var(--muted)' }}>
            Phím tắt: <kbd className="px-1.5 py-0.5 rounded" style={{ background:'var(--surface)',border:'1px solid var(--border)',fontFamily:'monospace' }}>Space</kbd> lật thẻ &nbsp;
            <kbd className="px-1.5 py-0.5 rounded" style={{ background:'var(--surface)',border:'1px solid var(--border)',fontFamily:'monospace' }}>1-4</kbd> đánh giá
          </div>
        </div>
      </div>
    );
  }

  // ── SESSION END SCREEN ──
  if (sessionDone) {
    return (
      <div className="max-w-lg mx-auto px-6 py-8">
        <SessionEndScreen
          stats={sessionStats}
          remaining={remaining}
          onContinue={() => {
            const cont = buildQueue(mode);
            setSessionQueue(cont);
            setSessionIdx(0);
            setReQueue([]);
            setSessionStats({ forgot:0, hard:0, good:0, easy:0, total:0 });
            setFlipped(false);
            setFeedback(null);
            setSessionDone(false);
          }}
          onReset={resetSession}
        />
      </div>
    );
  }

  if (!currentWord) {
    return (
      <div className="max-w-2xl mx-auto px-6 py-8 text-center">
        <div className="text-5xl mb-4 hanzi-text" style={{ color:'var(--accent-soft)' }}>空</div>
        <div className="font-semibold mb-2" style={{ color:'var(--ink)' }}>Hết từ trong chế độ này</div>
        <button onClick={resetSession} className="px-6 py-3 rounded-2xl text-sm font-semibold"
          style={{ background:'var(--accent)', color:'white' }}>Quay lại</button>
      </div>
    );
  }

  // ── SESSION PROGRESS ──
  const sessionProgress = sessionIdx / Math.max(sessionQueue.length, 1);

  // ── ACTIVE SESSION SCREEN ──
  return (
    <div className="max-w-2xl mx-auto px-4 py-6 relative select-none">

      {/* Rating feedback toast */}
      {feedback && (
        <div className="fixed top-20 left-1/2 z-[100] flex items-center gap-3 px-5 py-3.5 rounded-2xl soft-shadow-lg"
          style={{
            transform: 'translateX(-50%)',
            background: feedback.bg,
            border: `1.5px solid ${feedback.border}`,
            animation: 'slideUp 0.25s ease-out',
            minWidth: '220px',
            maxWidth: '320px'
          }}>
          <div style={{ fontSize: '24px', lineHeight: 1 }}>{feedback.emoji}</div>
          <div className="flex-1">
            <div style={{ color: feedback.color, fontWeight: 700, fontSize: '14px' }}>
              {feedback.label}
            </div>
            <div style={{ color: feedback.color, fontSize: '12px', opacity: 0.75 }}>
              Ôn lại sau {feedback.interval}
            </div>
          </div>
          <div className="hanzi-text" style={{ color: feedback.color, fontSize: '20px', fontWeight: 500, opacity: 0.8 }}>
            {currentWord.hanzi}
          </div>
        </div>
      )}

      {/* Top bar: session progress + controls */}
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2">
          <button onClick={resetSession}
            className="flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-xl transition-all hover:scale-105"
            style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
            ← Thoát
          </button>
          <div className="text-center">
            <div style={{ fontSize: '12px', color: 'var(--muted)', fontWeight: 500 }}>
              {sessionIdx + 1} / {sessionQueue.length}
            </div>
          </div>
          <div className="flex items-center gap-2">
            {/* SRS Status badge */}
            <div className="px-2 py-0.5 rounded-md text-[10px] font-bold"
              style={{ background: srsStatusLabel.bg, color: srsStatusLabel.color }}>
              {srsStatusLabel.label}
            </div>
            <button onClick={() => speak(currentWord.hanzi)}
              className="w-8 h-8 rounded-full flex items-center justify-center transition-all hover:scale-110"
              style={{ background: 'var(--accent)', color: 'white', fontSize: '13px' }}>
              🔊
            </button>
          </div>
        </div>

        {/* Session progress bar */}
        <div className="h-1.5 rounded-full overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
          <div className="h-full rounded-full transition-all duration-500"
            style={{
              width: `${sessionProgress * 100}%`,
              background: 'linear-gradient(90deg, var(--accent), var(--accent-2))'
            }} />
        </div>

        {/* Session mini stats */}
        {sessionStats.total > 0 && (
          <div className="flex gap-3 mt-2 text-xs justify-center" style={{ color: 'var(--muted)' }}>
            {sessionStats.forgot > 0 && <span>😕 {sessionStats.forgot}</span>}
            {sessionStats.hard  > 0 && <span>🤔 {sessionStats.hard}</span>}
            {sessionStats.good  > 0 && <span>🙂 {sessionStats.good}</span>}
            {sessionStats.easy  > 0 && <span>😎 {sessionStats.easy}</span>}
          </div>
        )}
      </div>

      {/* ── FLASHCARD ── */}
      <div className="mb-5" style={{ perspective: '1600px' }}>
        <div
          ref={cardRef}
          className="relative cursor-pointer transition-transform duration-500"
          onClick={() => !feedback && setFlipped(f => !f)}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleTouchEnd}
          style={{
            transformStyle: 'preserve-3d',
            transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)',
            height: 'clamp(320px, 44vw, 460px)',
            width: '100%',
          }}
        >
          {/* ── FRONT ── */}
          <div
            className="absolute inset-0 rounded-3xl soft-shadow-lg flex flex-col items-center justify-center p-8"
            style={{
              background: 'linear-gradient(145deg, var(--surface) 0%, var(--surface-soft) 100%)',
              border: '1px solid var(--border)',
              backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden',
            }}
          >
            {/* HSK badge */}
            <div className="absolute top-4 left-4 px-2 py-0.5 rounded-md text-[10px] font-bold"
              style={{ background: 'var(--surface-soft)', color: 'var(--accent)', border: '1px solid var(--border)' }}>
              HSK {hskLevel}
            </div>

            {/* Word type */}
            <div className="absolute top-4 right-4 px-2 py-0.5 rounded-md text-[10px]"
              style={{ background: 'var(--surface-soft)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
              {currentWord.type}
            </div>

            <div className="text-[11px] tracking-[0.25em] mb-6" style={{ color: 'var(--muted)', fontWeight: 500 }}>
              NHẤN ĐỂ XEM NGHĨA
            </div>

            {/* Hanzi — main display */}

// ── Question Generators ──
const generateMCQ = (word, pool) => {
  const distractors = pool.filter(w => w.id !== word.id).sort(() => Math.random() - 0.5).slice(0, 3);
  return {
    type: 'mcq', word,
    prompt: word.hanzi,
    promptPinyin: word.pinyin,
    correct: word.meaning,
    options: [...distractors.map(w => w.meaning), word.meaning].sort(() => Math.random() - 0.5),
  };
};

const generateHanziMCQ = (word, pool) => {
  const distractors = pool.filter(w => w.id !== word.id).sort(() => Math.random() - 0.5).slice(0, 3);
  return {
    type: 'hanzi_mcq', word,
    prompt: word.meaning,
    promptSub: word.pinyin,
    correct: word.hanzi,
    options: [...distractors.map(w => w.hanzi), word.hanzi].sort(() => Math.random() - 0.5),
  };
};

const generateCloze = (word, pool) => {
  const ex = (word.examples && word.examples[0]) || { hanzi: word.example, pinyin: word.examplePinyin, meaning: word.exampleMeaning };
  if (!ex?.hanzi || !ex.hanzi.includes(word.hanzi)) {
    // Fallback to MCQ if cloze not possible
    return generateMCQ(word, pool);
  }
  const blanked = ex.hanzi.replace(word.hanzi, '___');
  const distractors = pool.filter(w => w.id !== word.id).sort(() => Math.random() - 0.5).slice(0, 3);
  return {
    type: 'cloze', word,
    prompt: blanked,
    promptSub: ex.meaning,
    correct: word.hanzi,
    options: [...distractors.map(w => w.hanzi), word.hanzi].sort(() => Math.random() - 0.5),
  };
};

const generatePinyinInput = (word) => ({
  type: 'pinyin', word,
  prompt: word.hanzi,
  promptSub: word.meaning,
  correct: word.pinyin,
  inputMode: true,
});

const generateMeaningInput = (word) => ({
  type: 'meaning', word,
  prompt: word.hanzi,
  promptPinyin: word.pinyin,
  correct: word.meaning,
  inputMode: true,
});

const generateSentenceBuilder = (word, pool) => {
  const ex = (word.examples && word.examples[0]) || { hanzi: word.example, meaning: word.exampleMeaning };
  if (!ex?.hanzi || ex.hanzi.length < 4) return generateMCQ(word, pool);

  // Smart word segmentation using ALL_HSK dictionary — prefer multi-char words
  const text = ex.hanzi;
  const segments = [];
  let i = 0;
  while (i < text.length) {
    if (!/[\u4e00-\u9fff，。！？、：；]/.test(text[i])) { i++; continue; }
    let matched = null;
    // Try longest match: 4→3→2→1
    for (let len = 4; len >= 2 && !matched; len--) {
      if (i + len > text.length) continue;
      const slice = text.slice(i, i + len);
      for (let l = 1; l <= 6 && !matched; l++) {
        if ((ALL_HSK[l] || []).some(w => w.hanzi === slice)) matched = slice;
      }
    }
    if (matched) { segments.push(matched); i += matched.length; }
    else { segments.push(text[i]); i++; }
  }

  // Filter out punctuation segments, keep meaningful parts
  const wordParts = segments.filter(s => /[\u4e00-\u9fff]/.test(s));
  if (wordParts.length < 3) return generateMCQ(word, pool);

  // Cap at 7 parts for usability
  const parts = wordParts.slice(0, 7);
  return {
    type: 'sentence', word,
    prompt: ex.meaning,
    promptSub: `(${word.hanzi} — ${word.meaning})`,
    correct: parts.join(''),     // joined correct answer
    correctOrder: [...parts],    // correct sequence
    parts: [...parts].sort(() => Math.random() - 0.5),  // shuffled
  };
};

// ── Sentence Builder Component (rebuilt) ──
const SentenceBuilder = ({ parts, correctOrder, correct, onSubmit }) => {
  const [selected, setSelected] = useState([]);      // { word, originalIdx }[]
  const [remaining, setRemaining] = useState(
    parts.map((word, idx) => ({ word, idx }))
  );
  const [submitted, setSubmitted] = useState(false);
  const [isCorrect, setIsCorrect] = useState(null);
  const [shaking, setShaking] = useState(false);

  const addWord = (item) => {
    if (submitted) return;
    setSelected(s => [...s, item]);
    setRemaining(r => r.filter(x => x.idx !== item.idx));
  };

  const removeWord = (item, selIdx) => {
    if (submitted) return;
    setSelected(s => s.filter((_, i) => i !== selIdx));
    setRemaining(r => {
      // Re-insert at roughly original position
      const newR = [...r, item];
      newR.sort((a, b) => a.idx - b.idx);
      return newR;
    });
  };

  const handleSubmit = () => {
    if (selected.length === 0 || submitted) return;
    const answer = selected.map(x => x.word).join('');
    // Compare against correct (normalize whitespace)
    const correctNorm = (correct || correctOrder.join('')).replace(/\s/g, '');
    const answerNorm = answer.replace(/\s/g, '');
    const ok = answerNorm === correctNorm;
    setIsCorrect(ok);
    setSubmitted(true);
    if (!ok) {
      setShaking(true);
      setTimeout(() => setShaking(false), 600);
    }
    setTimeout(() => onSubmit(answer), ok ? 800 : 1200);
  };

  const handleReset = () => {
    setSelected([]);
    setRemaining(parts.map((word, idx) => ({ word, idx })));
    setSubmitted(false);
    setIsCorrect(null);
    setShaking(false);
  };

  // Keyboard: Enter to submit, Backspace to remove last
  useEffect(() => {
    const handler = (e) => {
      if (submitted) return;
      if (e.key === 'Enter' && selected.length > 0) { e.preventDefault(); handleSubmit(); }
      if (e.key === 'Backspace' && selected.length > 0) {
        e.preventDefault();
        const last = selected[selected.length - 1];
        removeWord(last, selected.length - 1);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [selected, submitted]);

  const answerBg = submitted
    ? (isCorrect ? '#d1fae5' : '#fee2e2')
    : selected.length > 0 ? 'var(--surface-soft)' : 'var(--bg)';
  const answerBorder = submitted
    ? (isCorrect ? '2px solid #6ee7b7' : '2px solid #fca5a5')
    : '2px dashed var(--accent-soft)';

  return (
    <div>
      {/* Answer zone — where selected words appear */}
      <div className="text-[10px] tracking-widest mb-2 font-bold" style={{ color: 'var(--muted)' }}>
        XẾP TỪ VÀO ĐÂY (nhấn từ bên dưới):
      </div>
      <div
        className="min-h-[60px] p-3 rounded-2xl mb-4 flex flex-wrap gap-2 items-center transition-all"
        style={{
          background: answerBg,
          border: answerBorder,
          animation: shaking ? 'shake 0.5s ease' : 'none',
        }}>
        {selected.length === 0 && !submitted && (
          <span className="text-sm" style={{ color: 'var(--muted)', fontStyle: 'italic' }}>
            Nhấn từ bên dưới để đặt vào đây...
          </span>
        )}
        {selected.map((item, i) => (
          <button
            key={`sel-${item.idx}-${i}`}
            onClick={() => !submitted && removeWord(item, i)}
            className="hanzi-text px-3 py-2 rounded-xl font-medium transition-all hover:opacity-75 active:scale-95"
            style={{
              background: submitted
                ? (isCorrect ? '#10b981' : '#ef4444')
                : 'linear-gradient(135deg, var(--accent), var(--accent-2))',
              color: 'white',
              fontSize: '20px',
              cursor: submitted ? 'default' : 'pointer',
              boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
            }}>
            {item.word}
          </button>
        ))}
        {submitted && isCorrect && (
          <span className="ml-1 text-sm font-bold" style={{ color: '#065f46' }}>✓</span>
        )}
        {submitted && !isCorrect && selected.length > 0 && (
          <span className="ml-1 text-sm font-bold" style={{ color: '#991b1b' }}>✗</span>
        )}
      </div>

      {/* Correct answer reveal on wrong */}
      {submitted && !isCorrect && (
        <div className="mb-3 p-3 rounded-xl" style={{ background: '#fef3c7', border: '1px solid #fde68a' }}>
          <div className="text-[10px] tracking-widest mb-1 font-bold" style={{ color: '#92400e' }}>ĐÁP ÁN ĐÚNG:</div>
          <div className="hanzi-text text-xl font-medium" style={{ color: '#78350f' }}>
            {correctOrder.join('')}
          </div>
        </div>
      )}

      {/* Word bank */}
      <div className="text-[10px] tracking-widest mb-2 font-bold" style={{ color: 'var(--muted)' }}>
        TỪ CÓ SẴN:
      </div>
      <div className="flex flex-wrap gap-2 mb-4 min-h-[48px]"
        style={{ padding: '10px', background: 'var(--bg)', borderRadius: '16px', border: '1px solid var(--border)' }}>
        {remaining.length === 0 && !submitted && (
          <span className="text-sm" style={{ color: 'var(--muted)', fontStyle: 'italic', margin: 'auto' }}>
            Đã dùng hết — nhấn Kiểm tra!
          </span>
        )}
        {remaining.map((item) => (
          <button
            key={`rem-${item.idx}`}
            onClick={() => addWord(item)}
            disabled={submitted}
            className="hanzi-text px-3 py-2 rounded-xl font-medium transition-all hover:scale-105 active:scale-95 disabled:opacity-50"
            style={{
              background: 'var(--surface)',
              color: 'var(--ink)',
              border: '1.5px solid var(--border)',
              fontSize: '20px',
              boxShadow: '0 2px 4px rgba(0,0,0,0.08)',
            }}>
            {item.word}
          </button>
        ))}
      </div>

      {/* Controls */}
      {!submitted ? (
        <div className="flex gap-2">
          <button onClick={handleSubmit} disabled={selected.length === 0}
            className="flex-1 py-3 rounded-2xl font-bold text-base transition-all hover:scale-[1.02] active:scale-[0.98] disabled:opacity-40"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white' }}>

          </button>
          <button onClick={handleReset}

            style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>

          </button>
        </div>
      ) : (
        <div className="text-center text-sm py-2" style={{ color: 'var(--muted)' }}>
          {isCorrect ? '🎉 Đang chuyển câu tiếp...' : '❌ Xem đáp án → câu tiếp...'}
        </div>
      )}

      {/* Keyboard hint */}
      <div className="mt-2 text-xs text-center" style={{ color: 'var(--muted)' }}>
        <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>Enter</kbd> kiểm tra &nbsp;·&nbsp;
        <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>⌫</kbd> xóa từ cuối &nbsp;·&nbsp; Nhấn từ đã chọn để bỏ ra
      </div>
    </div>
  );
};

const buildQuizSession = (level, quizType, count = 10, srsData = {}) => {
  const pool = ALL_HSK[level] || [];
  if (pool.length < 4) return [];

  // Prioritize due/weak words
  const now = Date.now();
  const sorted = [...pool].sort((a, b) => {
    const da = srsData[a.id], db = srsData[b.id];
    if (!da && !db) return Math.random() - 0.5;
    if (!da) return -1; // never reviewed = higher priority
    if (!db) return 1;
    const overdueA = da.nextReview <= now ? 1 : 0;
    const overdueB = db.nextReview <= now ? 1 : 0;
    return overdueB - overdueA || Math.random() - 0.5;
  });

  const selected = sorted.slice(0, Math.min(count, pool.length));
  return selected.map(w => {
    switch (quizType) {
      case 'mcq':       return generateMCQ(w, pool);
      case 'hanzi_mcq': return generateHanziMCQ(w, pool);
      case 'cloze':     return generateCloze(w, pool);
      case 'pinyin':    return generatePinyinInput(w);
      case 'meaning':   return generateMeaningInput(w);
      case 'sentence':  return generateSentenceBuilder(w, pool);
      default:          return generateMCQ(w, pool);
    }
  }).filter(Boolean);
};

            </div>

              <div style={{ color: '#991b1b' }}>
                <span className="font-bold">Bạn trả lời:</span> "{e.userAnswer}"
              </div>
              <div style={{ color: '#065f46' }}>
                <span className="font-bold">Đáp án đúng:</span> "{e.correct}"
              </div>
              {e.word.example && (
                <div className="mt-2 pt-2 italic" style={{ borderTop: '1px dashed #fecaca', color: '#7f1d1d' }}>
                  <button onClick={() => speak(e.word.example)} className="hover:opacity-75 hanzi-text">
                    {e.word.example} 🔊
                  </button>
                  <div>{e.word.exampleMeaning}</div>
                </div>
              )}
            </div>
          </div>
        ))}
      </div>
      <button onClick={onDismiss} className="mt-4 w-full py-2.5 rounded-2xl text-sm font-semibold"
        style={{ background: 'var(--surface-soft)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
        Đã hiểu, đóng lại
      </button>
    </div>
  );
};

const QuizResult = ({ score, total, quizType, errors, hskLevel, bestStreak, onRetry, onNewType, onErrorRecall }) => {
  const [showErrors, setShowErrors] = useState(false);
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  const grade = pct >= 90 ? { char: '优', label: 'Xuất sắc! 太棒了!', color: '#10b981' }
    : pct >= 70 ? { char: '良', label: 'Tốt lắm! 很不错!', color: '#f59e0b' }
    : pct >= 50 ? { char: '可', label: 'Tạm được, cố thêm nhé.', color: '#f59e0b' }
    : { char: '差', label: 'Cần ôn thêm nhiều. 继续加油!', color: '#ef4444' };

  return (
    <div className="max-w-2xl mx-auto px-6 py-8">
      {/* Grade */}
      <div className="text-center mb-8">
        <div className="inline-flex items-center justify-center w-24 h-24 rounded-full mb-4"
          style={{ background: `${grade.color}20`, border: `3px solid ${grade.color}` }}>
          <span className="hanzi-text" style={{ fontSize: '44px', color: grade.color, fontWeight: 600, lineHeight: 1 }}>
            {grade.char}
          </span>
        </div>
        <h2 className="text-2xl font-bold mb-1" style={{ color: 'var(--ink)', fontFamily: 'var(--font-display)' }}>
          Kết quả Quiz
        </h2>
        <p className="text-sm" style={{ color: 'var(--muted)' }}>{grade.label}</p>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-3 gap-3 mb-4">
        {[
          { label: 'Đúng', value: score, color: '#10b981' },
          { label: 'Chính xác', value: `${pct}%`, color: grade.color },
          { label: 'Sai', value: total - score, color: '#ef4444' },
        ].map(s => (
          <div key={s.label} className="p-4 rounded-2xl text-center soft-shadow"
            style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
            <div style={{ fontSize: '28px', fontWeight: 800, color: s.color, lineHeight: 1 }}>{s.value}</div>
            <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Best streak badge */}
      {bestStreak >= 3 && (
        <div className="flex items-center justify-center gap-2 mb-4 py-2.5 rounded-2xl"
          style={{ background: 'linear-gradient(135deg, #ff6b2b20, #ff950020)', border: '1px solid #ff6b2b40' }}>
          <span style={{ fontSize: '20px' }}>🔥</span>
          <span className="font-bold text-sm" style={{ color: '#e05a1a' }}>
            Streak tốt nhất: {bestStreak} câu liên tiếp!
          </span>
        </div>
      )}

      {/* Accuracy bar */}
      <div className="h-3 rounded-full overflow-hidden mb-6" style={{ background: 'var(--surface-soft)' }}>
        <div className="h-full rounded-full transition-all duration-700"
          style={{ width: `${pct}%`, background: pct >= 70 ? 'linear-gradient(90deg,#10b981,#34d399)' : 'linear-gradient(90deg,#f59e0b,#fbbf24)' }} />
      </div>

      {/* Action buttons */}
      <div className="flex gap-3 mb-4 flex-wrap">
        <button onClick={onRetry}
          className="flex-1 py-3 rounded-2xl font-bold transition-all hover:scale-[1.02]"
          style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white', minWidth: '120px' }}>
          🔁 Làm lại
        </button>
        <button onClick={onNewType}
          className="flex-1 py-3 rounded-2xl font-semibold transition-all hover:scale-[1.02]"
          style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)', minWidth: '120px' }}>
          Đổi loại quiz
        </button>
      </div>

      {/* Error recall button */}
      {errors.length > 0 && onErrorRecall && (
        <button onClick={onErrorRecall}
          className="w-full py-3 rounded-2xl font-semibold text-sm transition-all hover:scale-[1.01] mb-3"
          style={{ background: 'linear-gradient(135deg, #f59e0b20, #fbbf2420)', color: '#92400e', border: '1px solid #fde68a' }}>
          📚 Ôn lại {errors.length} từ sai ngay bây giờ
        </button>
      )}

      {/* Error analysis toggle */}
      {errors.length > 0 && (
        <button onClick={() => setShowErrors(!showErrors)}
          className="w-full py-3 rounded-2xl font-semibold text-sm transition-all"
          style={{ background: '#fef2f2', color: '#991b1b', border: '1px solid #fecaca' }}>
          {showErrors ? '▲ Ẩn' : `❌ Xem chi tiết ${errors.length} câu sai`}
        </button>
      )}

      {showErrors && (
        <ErrorAnalysis errors={errors} onDismiss={() => setShowErrors(false)} />
      )}
    </div>
  );
};

// ── Main QuizView ──
const QuizView = ({ toggleLearned, learned, addQuizScore, srsData }) => {
  const [phase, setPhase] = useState('setup'); // 'setup' | 'quiz' | 'result' | 'error_recall'
  const [hskLevel, setHskLevel] = useState(1);
  const [quizType, setQuizType] = useState('mcq');
  const [questionCount, setQuestionCount] = useState(10);
  const [questions, setQuestions] = useState([]);
  const [currentQ, setCurrentQ] = useState(0);
  const [score, setScore] = useState(0);
  const [selectedAns, setSelectedAns] = useState(null);
  const [userInput, setUserInput] = useState('');
  const [sentenceAnswer, setSentenceAnswer] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [errors, setErrors] = useState([]);
  const [sessionErrors, setSessionErrors] = useState([]);
  const [quizStreak, setQuizStreak] = useState(0);    // consecutive correct answers
  const [bestStreak, setBestStreak] = useState(0);    // best streak this session
  const [hintUsed, setHintUsed] = useState(false);    // hint used for current question
  const [showHint, setShowHint] = useState(false);    // hint visible
  const [errorRecallIdx, setErrorRecallIdx] = useState(0); // for error recall phase
  const [errorRecallResult, setErrorRecallResult] = useState(null);
  const inputRef = useRef(null);

  const currentQuestion = questions[currentQ];

  // Auto-speak on new question
  useEffect(() => {
    if (!currentQuestion || phase !== 'quiz' || showResult) return;
    if (currentQuestion.type !== 'hanzi_mcq' && currentQuestion.type !== 'sentence') {
      const t = setTimeout(() => speak(currentQuestion.word.hanzi), 300);
      return () => clearTimeout(t);
    }
  }, [currentQ, questions, phase]);

  // Auto-focus input
  useEffect(() => {
    if (currentQuestion?.inputMode && !showResult && inputRef.current) {
      setTimeout(() => inputRef.current?.focus(), 150);
    }
  }, [currentQ, showResult, currentQuestion]);

  // Reset hint on question change
  useEffect(() => {
    setHintUsed(false);
    setShowHint(false);
  }, [currentQ]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (phase !== 'quiz') return;
      if (currentQuestion?.type === 'mcq' || currentQuestion?.type === 'hanzi_mcq' || currentQuestion?.type === 'cloze') {
        const n = parseInt(e.key);
        if (n >= 1 && n <= 4 && !showResult && currentQuestion.options?.[n-1]) {
          handleAnswer(currentQuestion.options[n - 1]);
        }
      }
      if (showResult && (e.key === 'Enter' || e.key === 'ArrowRight')) { e.preventDefault(); advance(); }
      if (e.code === 'Space' && !showResult) { e.preventDefault(); speak(currentQuestion?.word?.hanzi || ''); }
      if ((e.key === 'h' || e.key === 'H') && !showResult && !hintUsed) { e.preventDefault(); handleHint(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [phase, currentQuestion, showResult, hintUsed]);

  const startQuiz = () => {
    const qs = buildQuizSession(hskLevel, quizType, questionCount, srsData || {});
    if (qs.length === 0) return;
    setQuestions(qs);
    setCurrentQ(0); setScore(0);
    setSelectedAns(null); setUserInput('');
    setSentenceAnswer(null);
    setShowResult(false);
    setSessionErrors([]);
    setQuizStreak(0); setBestStreak(0);
    setHintUsed(false); setShowHint(false);
    setPhase('quiz');
  };

  const handleHint = () => {
    if (hintUsed || showResult || !currentQuestion) return;
    setHintUsed(true);
    setShowHint(true);
  };

  const handleAnswer = (answer) => {
    if (showResult || !currentQuestion) return;
    setSelectedAns(answer);
    setShowResult(true);

    const correct = currentQuestion.correct;
    let isCorrect = false;

    if (currentQuestion.type === 'pinyin') {
      isCorrect = pinyinMatch(answer, correct) !== 'wrong';
    } else if (currentQuestion.type === 'meaning') {
      const a = answer.toLowerCase().trim(), c = correct.toLowerCase().trim();
      isCorrect = a === c || c.includes(a) || a.includes(c);
    } else if (currentQuestion.type === 'sentence') {
      isCorrect = answer === correct || answer.replace(/\s/g,'') === correct.replace(/\s/g,'');
    } else {
      isCorrect = answer === correct;
    }

    // Streak tracking
    if (isCorrect) {
      setScore(s => s + 1);
      setQuizStreak(s => {
        const next = s + 1;
        setBestStreak(b => Math.max(b, next));
        return next;
      });
    } else {
      setQuizStreak(0);
      const errEntry = { word: currentQuestion.word, userAnswer: answer, correct, type: currentQuestion.type };
      setSessionErrors(prev => [...prev, errEntry]);
    }
  };

  const handleInputSubmit = () => {
    if (!userInput.trim()) return;
    handleAnswer(userInput.trim());
  };

  const advance = () => {
    const nextIdx = currentQ + 1;
    if (nextIdx >= questions.length) {
      addQuizScore({ level: hskLevel, score, total: questions.length, date: Date.now() });
      setErrors(sessionErrors);
      setPhase('result');
    } else {
      setCurrentQ(nextIdx);
      setSelectedAns(null);
      setUserInput('');
      setSentenceAnswer(null);
      setShowResult(false);
    }
  };

  // Hint content generator
  const getHint = () => {
    if (!currentQuestion) return null;
    const w = currentQuestion.word;
    switch (currentQuestion.type) {
      case 'mcq':       return `Pinyin: ${w.pinyin}`;
      case 'hanzi_mcq': return `Bắt đầu bằng: ${w.hanzi[0]}`;
      case 'cloze':     return `Pinyin: ${w.pinyin}`;
      case 'pinyin':    return `Bắt đầu bằng: ${w.pinyin.split(' ')[0][0]}...`;
      case 'meaning':   return `Bắt đầu bằng: "${w.meaning[0]}"`;
      default:          return null;
    }
  };

  // ── SETUP SCREEN ──
  if (phase === 'setup') {
    return (
      <div className="max-w-2xl mx-auto px-6 py-8">
        <div className="mb-8">
          <div className="text-xs tracking-[0.3em] mb-2" style={{ color: 'var(--accent)' }}>测验 · KIỂM TRA</div>
          <h1 className="text-3xl mb-1" style={{ fontFamily: 'var(--font-display)', fontWeight: 600, color: 'var(--ink)' }}>
            Quiz & Active Recall
          </h1>
          <p className="text-sm mb-6" style={{ color: 'var(--muted)' }}>
            6 loại quiz từ dễ đến khó — ưu tiên từ bạn hay quên
          </p>

          {/* HSK Level */}
          <div className="flex gap-2 flex-wrap mb-6">
            {[1,2,3,4,5,6].map(l => (
              <button key={l} onClick={() => setHskLevel(l)}
                className="relative px-4 py-2 rounded-2xl font-semibold text-sm transition-all"
                style={{ background: hskLevel===l ? 'var(--accent)' : 'var(--surface)', color: hskLevel===l ? 'white' : 'var(--ink)', border: '1px solid var(--border)' }}>
                HSK {l}
              </button>
            ))}
          </div>

          {/* Quiz type cards */}
          <div className="space-y-2.5 mb-6">
            {QUIZ_TYPES.map(t => (
              <div key={t.id}
                onClick={() => setQuizType(t.id)}
                className="relative p-4 rounded-2xl cursor-pointer transition-all hover:scale-[1.01]"
                style={{
                  background: quizType === t.id ? 'var(--surface-soft)' : 'var(--surface)',
                  border: `2px solid ${quizType === t.id ? t.color : 'var(--border)'}`,
                  boxShadow: quizType === t.id ? `0 4px 16px ${t.color}20` : 'none',
                }}>
                {t.recommended && (
                  <div className="absolute -top-2.5 right-4 px-2.5 py-0.5 rounded-full text-[10px] font-bold text-white"
                    style={{ background: t.color }}>KHUYẾN NGHỊ</div>
                )}
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-2xl flex items-center justify-center flex-shrink-0 text-xl font-bold"
                    style={{ background: t.gradient, color: 'white', fontFamily: t.icon === 'ā' ? 'Quicksand' : 'Noto Sans SC' }}>
                    {t.icon}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-0.5 flex-wrap">
                      <span className="font-bold text-sm" style={{ color: 'var(--ink)' }}>{t.label}</span>
                      <span className="text-[10px] px-2 py-0.5 rounded-full font-bold"
                        style={{ background: t.color + '20', color: t.color }}>
                        {t.badge}
                      </span>
                      {/* Difficulty dots */}
                      <div className="flex gap-0.5 ml-auto">
                        {[1,2,3,4].map(d => (
                          <div key={d} className="w-1.5 h-1.5 rounded-full"
                            style={{ background: d <= t.difficulty ? t.color : 'var(--border)' }} />
                        ))}
                      </div>
                    </div>
                    <p className="text-xs" style={{ color: 'var(--muted)', lineHeight: 1.4 }}>{t.desc}</p>
                  </div>
                </div>
              </div>
            ))}
          </div>

          {/* Question count */}
          <div className="flex items-center gap-3 mb-6 p-4 rounded-2xl"
            style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
            <span className="text-sm font-semibold" style={{ color: 'var(--ink)' }}>Số câu hỏi:</span>
            {[5, 10, 15, 20].map(n => (
              <button key={n} onClick={() => setQuestionCount(n)}
                className="px-3 py-1.5 rounded-xl text-sm font-bold transition-all"
                style={{ background: questionCount===n ? 'var(--accent)' : 'var(--bg)', color: questionCount===n ? 'white' : 'var(--ink)', border: `1px solid ${questionCount===n ? 'var(--accent)' : 'var(--border)'}` }}>
                {n}
              </button>
            ))}
          </div>

          {/* Adaptive mode notice */}
          {srsData && Object.keys(srsData).length > 0 && (
            <div className="flex items-center gap-2 mb-4 p-3 rounded-2xl text-xs"
              style={{ background: 'var(--surface-soft)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
              <span style={{ fontSize: '14px' }}>🎯</span>
              <span>Câu hỏi ưu tiên các từ <strong style={{ color: 'var(--ink)' }}>đến hạn ôn / chưa học</strong> theo lịch SRS của bạn</span>
            </div>
          )}

          <button onClick={startQuiz}
            className="w-full py-4 rounded-2xl font-bold text-lg transition-all hover:scale-[1.02] active:scale-[0.98]"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white', boxShadow: '0 6px 24px rgba(61,139,209,0.4)' }}>
            ▶ Bắt đầu Quiz ({questionCount} câu)
          </button>

          <div className="mt-4 text-xs text-center" style={{ color: 'var(--muted)' }}>
            Phím <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>1-4</kbd> chọn đáp án &nbsp;·&nbsp;
            <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>H</kbd> xem gợi ý &nbsp;·&nbsp;
            <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>→</kbd> câu tiếp
          </div>
        </div>
      </div>
    );
  }

  // ── RESULT SCREEN ──
  if (phase === 'result') {
    return (
      <div className="max-w-2xl mx-auto px-6 py-8">
        <QuizResult
          score={score} total={questions.length}
          quizType={quizType} errors={errors}
          hskLevel={hskLevel}
          bestStreak={bestStreak}
          onRetry={() => startQuiz()}
          onNewType={() => setPhase('setup')}
          onErrorRecall={() => { setErrorRecallIdx(0); setErrorRecallResult(null); setPhase('error_recall'); }}
        />
      </div>
    );
  }

  // ── ERROR RECALL PHASE ──
  if (phase === 'error_recall') {
    const errWord = errors[errorRecallIdx];
    if (!errWord || errorRecallIdx >= errors.length) {
      return (
        <div className="max-w-md mx-auto px-6 py-16 text-center">
          <div className="text-5xl mb-4">🎉</div>
          <h2 className="text-xl font-bold mb-2" style={{ color: 'var(--ink)' }}>Ôn lại xong!</h2>
          <p className="text-sm mb-6" style={{ color: 'var(--muted)' }}>Đã ôn lại {errors.length} từ sai. Hãy làm lại quiz để kiểm tra!</p>
          <button onClick={() => setPhase('setup')}
            className="px-6 py-3 rounded-2xl font-bold"
            style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white' }}>
            Quay lại Quiz
          </button>
        </div>
      );
    }
    return (
      <div className="max-w-md mx-auto px-6 py-8">
        <div className="flex items-center justify-between mb-4">
          <button onClick={() => setPhase('setup')}
            className="text-sm px-3 py-1.5 rounded-xl"
            style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
            ← Thoát
          </button>
          <span className="text-sm font-semibold" style={{ color: 'var(--muted)' }}>
            Ôn lại {errorRecallIdx + 1}/{errors.length}
          </span>
        </div>
        <div className="text-xs tracking-widest mb-5 text-center font-bold" style={{ color: '#ef4444' }}>
          ÔN LẠI CÁC TỪ SAI
        </div>
        <div className="p-6 rounded-3xl soft-shadow text-center mb-5"
          style={{ background: 'var(--surface)', border: '1.5px solid var(--accent-soft)' }}>
          <button onClick={() => speak(errWord.word.hanzi)}
            className="hanzi-text hover:opacity-75 transition-opacity mb-3 block mx-auto"
            style={{ fontSize: 'clamp(52px,12vw,72px)', color: 'var(--ink)', fontWeight: 500, lineHeight: 1 }}>
            {errWord.word.hanzi} <span style={{ fontSize: '16px' }}>🔊</span>
          </button>
          <ColoredPinyin pinyin={errWord.word.pinyin} size="xl" />
          <div className="mt-2 text-xl font-bold" style={{ color: 'var(--ink)' }}>{errWord.word.meaning}</div>
          <div className="mt-2 text-xs px-3 py-0.5 inline-block rounded-full" style={{ background: 'var(--bg)', color: 'var(--muted)' }}>
            {errWord.word.type}
          </div>

          {errWord.word.example && (
            <div className="mt-4 p-3 rounded-2xl text-left" style={{ background: 'var(--bg)', border: '1px solid var(--border)' }}>
              <div className="text-[10px] tracking-widest mb-1.5 font-bold" style={{ color: 'var(--accent)' }}>VÍ DỤ</div>
              <button onClick={() => speak(errWord.word.example)} className="hanzi-text text-sm hover:opacity-75 block text-left"
                style={{ color: 'var(--ink)', fontWeight: 500 }}>
                {errWord.word.example} 🔊
              </button>
              <div className="text-xs italic mt-0.5" style={{ color: 'var(--muted)' }}>{errWord.word.exampleMeaning}</div>
            </div>
          )}

          <div className="mt-3 p-2.5 rounded-xl text-xs" style={{ background: '#fee2e2' }}>
            <span className="font-semibold" style={{ color: '#991b1b' }}>Bạn đã trả lời: </span>
            <span style={{ color: '#7f1d1d' }}>"{errWord.userAnswer || '(bỏ qua)'}"</span>
          </div>
        </div>

        <div className="text-xs tracking-widest mb-3 text-center font-bold" style={{ color: 'var(--muted)' }}>
          BẠN ĐÃ NHỚ TỪ NÀY CHƯA?
        </div>
        {errorRecallResult === null ? (
          <div className="flex gap-2">
            {[
              { r: 'forgot', label: '😕 Chưa nhớ', bg: '#fee2e2', color: '#991b1b' },
              { r: 'hard',   label: '🤔 Nhớ một phần', bg: '#fef3c7', color: '#92400e' },
              { r: 'got',    label: '😊 Đã nhớ!', bg: '#d1fae5', color: '#065f46' },
            ].map(({ r, label, bg, color }) => (
              <button key={r}
                onClick={() => {
                  setErrorRecallResult(r);
                  setTimeout(() => {
                    setErrorRecallIdx(i => i + 1);
                    setErrorRecallResult(null);
                  }, 600);
                }}
                className="flex-1 py-3 rounded-2xl text-sm font-bold transition-all hover:scale-[1.03]"
                style={{ background: bg, color }}>
                {label}
              </button>
            ))}
          </div>
        ) : (
          <div className="py-3 rounded-2xl text-center font-bold text-sm"
            style={{ background: errorRecallResult === 'got' ? '#d1fae5' : '#fef3c7', color: errorRecallResult === 'got' ? '#065f46' : '#92400e' }}>
            {errorRecallResult === 'got' ? '✓ Tiếp tục...' : '→ Tiếp tục...'}
          </div>
        )}
      </div>
    );
  }

  // ── ACTIVE QUIZ ──
  if (!currentQuestion) return <div className="p-12 text-center" style={{ color: 'var(--muted)' }}>Đang tải...</div>;

  const progressPct = questions.length > 0 ? (currentQ / questions.length) * 100 : 0;

    currentQuestion.inputMode

          {/* Pinyin / Meaning input */}
          {(currentQuestion.type === 'pinyin' || currentQuestion.type === 'meaning') && (
            <div>

                placeholder={currentQuestion.type === 'pinyin' ? 'Gõ pinyin (vd: wǒ ài nǐ hoặc wo ai ni)...' : 'Gõ nghĩa tiếng Việt...'}

                  Kiểm tra ✓

          {currentQuestion.type === 'sentence' && (
            <SentenceBuilder
              parts={currentQuestion.parts}

              correct={currentQuestion.correct}

          )}

          {/* Hint button */}
          {hint && !hintUsed && (
            <button onClick={handleHint}
              className="w-full mt-3 py-2 rounded-2xl text-xs font-semibold transition-all hover:scale-[1.01]"
              style={{ background: 'var(--surface-soft)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
              💡 Xem gợi ý (phím H) — sẽ trừ điểm streak
            </button>
          )}
        </>
      )}
    </div>
  );
};

// Helper: Load HanziWriter library lazily
const loadHanziWriter = () => {
  return new Promise((resolve, reject) => {
    if (window.HanziWriter) return resolve(window.HanziWriter);
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.7/dist/hanzi-writer.min.js';
    script.onload = () => resolve(window.HanziWriter);
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

// ============ LISTENING & DICTATION SYSTEM ============

// ── Pinyin normalizer: strip tones for comparison ──
const stripTones = (s) => s.toLowerCase()
  .replace(/[āáǎà]/g, 'a').replace(/[ēéěè]/g, 'e').replace(/[īíǐì]/g, 'i')
  .replace(/[ōóǒò]/g, 'o').replace(/[ūúǔù]/g, 'u').replace(/[ǖǘǚǜü]/g, 'v')
  .replace(/\s+/g, ' ').trim();

// Normalize pinyin for search — removes tones AND spaces for compact match
// e.g. "nǐhǎo" → "nihao", "ni hao" → "nihao"
const normalizePinyin = (s) => stripTones(s).replace(/\s/g, '');

// Compare user input to correct pinyin (lenient: ignore tones, spacing)
const pinyinMatch = (input, correct) => {
  const normalIn = stripTones(input);
  const normalCor = stripTones(correct);
  if (normalIn === normalCor) return 'exact';
  if (normalIn.replace(/\s/g,'') === normalCor.replace(/\s/g,'')) return 'close';
  return 'wrong';
};

// ── Speed config ──
const SPEEDS = [
  { id: 'slow',   label: '🐢 Chậm',        rate: SPEAK_RATE.slow,   color: '#10b981', desc: 'Rõ ràng từng âm tiết' },
  { id: 'normal', label: '▶ Bình thường',   rate: SPEAK_RATE.normal, color: 'var(--accent)', desc: 'Tốc độ học tập' },
  { id: 'fast',   label: '⚡ Nhanh',        rate: SPEAK_RATE.fast,   color: '#f59e0b', desc: 'Gần tốc độ native' },
];

// ── Build exercise pool from ALL_HSK ──
const buildExercises = (hskLevel, srsData, mode) => {
  const words = ALL_HSK[hskLevel] || [];
  const shuffled = [...words].sort(() => Math.random() - 0.5);
  if (mode === 'dictation' || mode === 'mcq') return shuffled.slice(0, 20);
  // sentence mode: use example sentences
  return shuffled.filter(w => w.example).slice(0, 15);
};

// ── MCQ Choices generator ──
const buildMCQChoices = (correct, level, field) => {
  const pool = ALL_HSK[level] || [];
  const distractors = pool
    .filter(w => w[field] !== correct[field])
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(w => ({ text: w[field], id: w.id }));
  const choices = [
    { text: correct[field], id: correct.id, isCorrect: true },
    ...distractors,
  ].sort(() => Math.random() - 0.5);
  return choices;
};

// ── Animated Sound Wave ──

  const bars = 5;
  return (

              : `${Math.floor(size * 0.25)}px`,

            transition: 'height 0.2s',
          }}
        />
      ))}
    </div>
  );
};

// ============ LISTENING VIEW ============
const ListeningView = ({ srsData, trackActivity }) => {
  const [hskLevel, setHskLevel] = useState(1);
  const [mode, setMode] = useState(null); // null=setup | 'dictation'|'mcq'|'speed'|'sentence'
  const [speed, setSpeed] = useState('normal');
  const [exercises, setExercises] = useState([]);
  const [idx, setIdx] = useState(0);
  const [phase, setPhase] = useState('listen'); // 'listen'|'answer'|'result'
  const [playing, setPlaying] = useState(false);
  const [userInput, setUserInput] = useState('');
  const [result, setResult] = useState(null); // null|'correct'|'wrong'|'close'
  const [selectedChoice, setSelectedChoice] = useState(null);
  const [sessionStats, setSessionStats] = useState({ correct: 0, wrong: 0, skipped: 0, total: 0 });
  const [sessionDone, setSessionDone] = useState(false);
  const [playCount, setPlayCount] = useState(0);
  const [mcqChoices, setMCQChoices] = useState([]);
  const [speedResults, setSpeedResults] = useState({}); // { slow: bool, normal: bool, fast: bool }
  const inputRef = useRef(null);
  const rateForMode = SPEEDS.find(s => s.id === speed)?.rate || 0.85;

  const word = exercises[idx] || null;

  // Build MCQ choices when word changes
  useEffect(() => {
    if (!word || mode !== 'mcq') return;
    setMCQChoices(buildMCQChoices(word, hskLevel, 'meaning'));
  }, [word?.id, mode]);

  // Auto-focus input for dictation
  useEffect(() => {
    if (mode === 'dictation' && phase === 'answer' && inputRef.current) {
      setTimeout(() => inputRef.current?.focus(), 100);
    }
  }, [phase, mode]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (!mode || sessionDone) return;
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); if (phase === 'listen') playAudio(); }
      if (e.key === 'Enter' && phase === 'listen') { e.preventDefault(); setPhase('answer'); }
      if (result && (e.key === 'ArrowRight' || e.key === 'Enter')) { e.preventDefault(); advance(); }
      if (e.key === 'Escape') { setMode(null); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [mode, phase, result, sessionDone]);

  const playAudio = () => {
    if (!word || playing) return;
    const text = (mode === 'sentence') ? word.example : word.hanzi;
    setPlaying(true);
    setPlayCount(c => c + 1);
    speak(text, rateForMode, () => setPlaying(false));
  };

  const startSession = (selectedMode) => {
    const pool = buildExercises(hskLevel, srsData, selectedMode);
    if (pool.length === 0) return;
    setMode(selectedMode);
    setExercises(pool);
    setIdx(0);
    setPhase('listen');
    setResult(null);
    setUserInput('');
    setSelectedChoice(null);
    setSessionStats({ correct: 0, wrong: 0, skipped: 0, total: 0 });
    setSessionDone(false);
    setPlayCount(0);
    setSpeedResults({});
    // Auto-play after a short delay
    setTimeout(() => {
      const text = selectedMode === 'sentence' ? pool[0]?.example : pool[0]?.hanzi;
      if (text) { setPlaying(true); speak(text, rateForMode, () => setPlaying(false)); }
    }, 600);
  };

  const advance = () => {
    const nextIdx = idx + 1;
    setResult(null);
    setUserInput('');
    setSelectedChoice(null);
    setPhase('listen');
    setPlayCount(0);
    setSpeedResults({});
    if (nextIdx >= exercises.length) {
      setSessionDone(true);
    } else {
      setIdx(nextIdx);
      // Auto-play next
      setTimeout(() => {
        const text = mode === 'sentence' ? exercises[nextIdx]?.example : exercises[nextIdx]?.hanzi;
        if (text) { setPlaying(true); speak(text, rateForMode, () => setPlaying(false)); }
      }, 400);
    }
  };

  const handleSkip = () => {
    setSessionStats(s => ({ ...s, skipped: s.skipped + 1, total: s.total + 1 }));
    advance();
  };

  // ── Dictation submit ──
  const handleDictationSubmit = () => {
    if (!userInput.trim() || !word) return;
    const match = pinyinMatch(userInput.trim(), word.pinyin);
    const isCorrect = match !== 'wrong';
    setResult(isCorrect ? (match === 'exact' ? 'correct' : 'close') : 'wrong');
    setSessionStats(s => ({
      ...s,
      correct: s.correct + (isCorrect ? 1 : 0),
      wrong: s.wrong + (isCorrect ? 0 : 1),
      total: s.total + 1,
    }));
    if (trackActivity) trackActivity('learnWord', 1);
  };

  // ── MCQ submit ──
  const handleMCQSelect = (choice) => {
    if (result) return;
    setSelectedChoice(choice.id);
    const isCorrect = choice.isCorrect;
    setResult(isCorrect ? 'correct' : 'wrong');
    setSessionStats(s => ({
      ...s,
      correct: s.correct + (isCorrect ? 1 : 0),
      wrong: s.wrong + (isCorrect ? 0 : 1),
      total: s.total + 1,
    }));
    if (trackActivity) trackActivity('learnWord', 1);
  };

  // ── Speed training ──
  const handleSpeedPlay = (speedId, rate) => {
    if (speedResults[speedId] !== undefined) return;
    setPlaying(true);
    speak(word.hanzi, rate, () => {
      setPlaying(false);
      setSpeedResults(p => ({ ...p, [speedId]: true }));
    });
  };
  const allSpeedsDone = SPEEDS.every(s => speedResults[s.id]);

  // ── Session done ──
  if (sessionDone && mode) {
    return (
      <div className="max-w-4xl mx-auto px-6 py-8">
        <div className="text-xs tracking-[0.3em] mb-2" style={{ color: 'var(--accent)' }}>听力 · LUYỆN NGHE</div>
        <ListeningSessionEnd
          stats={sessionStats}
          mode={mode}
          onContinue={() => startSession(mode)}
          onReset={() => setMode(null)}
        />
      </div>
    );
  }

  // ── Setup screen ──
  if (!mode) {
    return (
      <div className="max-w-2xl mx-auto px-6 py-8">
        <div className="mb-8">
          <div className="text-xs tracking-[0.3em] mb-2" style={{ color: 'var(--accent)' }}>听力 · LUYỆN NGHE</div>
          <h1 className="text-3xl mb-1" style={{ fontFamily: 'var(--font-display)', fontWeight: 600, color: 'var(--ink)' }}>
            Luyện nghe tiếng Trung
          </h1>
          <p className="text-sm mb-8" style={{ color: 'var(--muted)' }}>
            Phát triển kỹ năng nghe qua 4 chế độ luyện tập khác nhau
          </p>

          {/* HSK Level selector */}
          <div className="flex gap-2 flex-wrap mb-8">
            {[1,2,3,4,5,6].map(l => (
              <button key={l} onClick={() => setHskLevel(l)}
                className="relative px-4 py-2 rounded-2xl font-semibold text-sm transition-all"
                style={{ background: hskLevel===l ? 'var(--accent)' : 'var(--surface)', color: hskLevel===l ? 'white' : 'var(--ink)', border: '1px solid var(--border)' }}>
                HSK {l}
              </button>
            ))}
          </div>

          {/* Mode cards */}
          <div className="space-y-3 mb-8">
            {[
              {
                id: 'dictation',
                icon: '✍️',
                title: 'Nghe — Gõ Pinyin',
                desc: 'Nghe từ và gõ lại pinyin. Luyện phân biệt thanh điệu và âm tiết.',
                color: 'var(--accent)',
                gradient: 'linear-gradient(135deg, var(--accent), var(--accent-2))',
                recommended: true,
                badge: '听写',
              },
              {
                id: 'mcq',
                icon: '🎯',
                title: 'Nghe — Chọn Nghĩa',
                desc: 'Nghe từ và chọn nghĩa tiếng Việt đúng trong 4 đáp án.',
                color: '#8b5cf6',
                gradient: 'linear-gradient(135deg, #8b5cf6, #a78bfa)',
                badge: '选择',
              },
              {
                id: 'speed',
                icon: '⚡',
                title: 'Tốc Độ Nghe',
                desc: 'Luyện tai với 3 tốc độ: Chậm → Bình thường → Nhanh.',
                color: '#f59e0b',
                gradient: 'linear-gradient(135deg, #f59e0b, #fbbf24)',
                badge: '速度',
              },
              {
                id: 'sentence',
                icon: '📜',
                title: 'Nghe Câu Ví Dụ',
                desc: 'Nghe câu ví dụ hoàn chỉnh, chọn nghĩa tiếng Việt đúng.',
                color: '#10b981',
                gradient: 'linear-gradient(135deg, #10b981, #34d399)',
                badge: '例句',
              },
            ].map(m => (
              <div key={m.id}
                className="relative p-5 rounded-3xl cursor-pointer transition-all hover:scale-[1.01] soft-shadow"
                style={{ background: 'var(--surface)', border: '1.5px solid var(--border)' }}
                onClick={() => startSession(m.id)}>
                {m.recommended && (
                  <div className="absolute -top-2.5 right-5 px-2.5 py-0.5 rounded-full text-[10px] font-bold text-white"
                    style={{ background: m.color }}>KHUYẾN NGHỊ</div>
                )}
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0"
                    style={{ background: m.gradient }}>
                    {m.icon}
                  </div>
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-0.5">
                      <span className="font-bold text-base" style={{ color: 'var(--ink)' }}>{m.title}</span>
                      <span className="hanzi-text text-xs px-1.5 py-0.5 rounded-md" style={{ background: m.gradient, color: 'white' }}>{m.badge}</span>
                    </div>
                    <p className="text-xs" style={{ color: 'var(--muted)', lineHeight: 1.5 }}>{m.desc}</p>
                  </div>
                  <div className="text-xl flex-shrink-0" style={{ color: 'var(--muted)' }}>→</div>
                </div>
              </div>
            ))}
          </div>

          {/* TTS availability check */}
          {!('speechSynthesis' in window) && (
            <div className="p-4 rounded-2xl" style={{ background: '#fee2e2', border: '1px solid #fecaca' }}>
              <p className="text-sm font-semibold" style={{ color: '#991b1b' }}>
                ⚠️ Trình duyệt của bạn không hỗ trợ đọc tiếng Trung. Hãy thử Chrome hoặc Edge.
              </p>
            </div>
          )}

          {/* Tips */}
          <div className="mt-6 p-4 rounded-2xl text-sm" style={{ background: 'var(--surface-soft)', color: 'var(--muted)', border: '1px solid var(--border)' }}>
            <div className="font-semibold mb-2" style={{ color: 'var(--ink)' }}>💡 Mẹo luyện nghe hiệu quả:</div>
            <ul className="space-y-1 text-xs" style={{ listStyle: 'none', padding: 0 }}>
              <li>• Bắt đầu với HSK 1-2 để làm quen với 4 thanh điệu</li>
              <li>• Nghe 2-3 lần trước khi trả lời — không cần vội</li>
              <li>• Chế độ "Tốc Độ Nghe" giúp tai quen với nhịp độ native speaker</li>
              <li>• Phím <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>Space</kbd> phát âm, <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>Enter</kbd> xác nhận, <kbd style={{ background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'3px',padding:'1px 5px',fontFamily:'monospace' }}>→</kbd> tiếp theo</li>
            </ul>
          </div>
        </div>
      </div>
    );
  }

  // ── Active exercise screen ──
  const progressPct = exercises.length > 0 ? (idx / exercises.length) * 100 : 0;
  const modeConfig = {
    dictation: { title: 'Nghe — Gõ Pinyin', icon: '✍️', color: 'var(--accent)' },
    mcq:       { title: 'Nghe — Chọn Nghĩa', icon: '🎯', color: '#8b5cf6' },
    speed:     { title: 'Tốc Độ Nghe', icon: '⚡', color: '#f59e0b' },
    sentence:  { title: 'Nghe Câu Ví Dụ', icon: '📜', color: '#10b981' },
  }[mode];

  return (
    <div className="max-w-xl mx-auto px-4 py-6">
      {/* Header */}
      <div className="flex items-center justify-between mb-4">
        <button onClick={() => setMode(null)}
          className="flex items-center gap-1.5 text-sm px-3 py-1.5 rounded-xl transition-all hover:scale-105"
          style={{ background: 'var(--surface)', color: 'var(--muted)', border: '1px solid var(--border)' }}>

        </button>
        <div className="flex items-center gap-2">
          <span style={{ fontSize: '16px' }}>{modeConfig.icon}</span>
          <span className="text-sm font-semibold" style={{ color: 'var(--ink)' }}>{modeConfig.title}</span>
        </div>
        <div className="text-sm font-semibold" style={{ color: 'var(--muted)' }}>
          {idx + 1}/{exercises.length}

      {/* Progress bar */}
      <div className="h-1.5 rounded-full overflow-hidden mb-6" style={{ background: 'var(--surface-soft)' }}>
        <div className="h-full rounded-full transition-all duration-500"
          style={{ width: `${progressPct}%`, background: `linear-gradient(90deg, ${modeConfig.color}, ${modeConfig.color}aa)` }} />
      </div>

      {sessionStats.total > 0 && (
        <div className="flex justify-center gap-4 mb-4 text-xs" style={{ color: 'var(--muted)' }}>
          <span style={{ color: '#10b981', fontWeight: 600 }}>✓ {sessionStats.correct}</span>
          <span style={{ color: '#ef4444', fontWeight: 600 }}>✗ {sessionStats.wrong}</span>
          {sessionStats.skipped > 0 && <span>⏭ {sessionStats.skipped}</span>}
        </div>

      {word && (
        <>
          {/* ═══════════════════════════════════════════

          ═══════════════════════════════════════════ */}
          <div className="rounded-3xl soft-shadow-lg mb-5 overflow-hidden"
