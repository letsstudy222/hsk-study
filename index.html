// ============ HELPERS ============
const getToneColor = (pinyin) => {
  const toneMarks = {
    1: ['ā','ē','ī','ō','ū','ǖ','Ā','Ē','Ī','Ō','Ū'],
    2: ['á','é','í','ó','ú','ǘ','Á','É','Í','Ó','Ú'],
    3: ['ǎ','ě','ǐ','ǒ','ǔ','ǚ','Ǎ','Ě','Ǐ','Ǒ','Ǔ'],
    4: ['à','è','ì','ò','ù','ǜ','À','È','Ì','Ò','Ù'],
  };
  for (let tone in toneMarks)
    for (let mark of toneMarks[tone])
      if (pinyin.includes(mark)) return parseInt(tone);
  return 0;
};

const TONE_COLORS = { 1:'var(--tone-1)', 2:'var(--tone-2)', 3:'var(--tone-3)', 4:'var(--tone-4)', 0:'var(--ink)' };

const speak = (text) => {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
};

// ============ COMPONENTS ============
const ColoredPinyin = ({ pinyin, size = 'base' }) => {
  const sizeClass = { sm:'text-sm', base:'text-base', lg:'text-lg', xl:'text-xl', '2xl':'text-2xl' }[size];
  const syllables = pinyin.split(/(\s+)/);
  return (
    <span className={`${sizeClass} font-medium tracking-wide`} style={{ fontFamily: 'var(--font-pinyin)' }}>
      {syllables.map((s, i) => {
        if (/^\s+$/.test(s)) return <span key={i}>{s}</span>;
        return <span key={i} style={{ color: TONE_COLORS[getToneColor(s)] }}>{s}</span>;
      })}
    </span>
  );
};

const VocabDetailModal = ({ word, onClose, isLearned, isStarred, toggleLearned, toggleStar }) => {
  const [charIdx, setCharIdx] = useState(0);
  const [strokeCount, setStrokeCount] = useState(0);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const writerContainerRef = useRef(null);

  const currentChar = word ? word.hanzi[charIdx] : '';

  useEffect(() => {
    if (!word) return;
    setCharIdx(0);
  }, [word]);

  useEffect(() => {
    if (!currentChar) return;
    let cancelled = false;
    setLoading(true);
    setError(null);

    (async () => {
      try {
        const HanziWriter = await loadHanziWriter();
        if (cancelled) return;

        if (writerContainerRef.current) {
          writerContainerRef.current.innerHTML = '';
        }

        const containerId = `hw-detail-${Date.now()}`;
        if (writerContainerRef.current) {
          writerContainerRef.current.id = containerId;
        }

        const isDark = document.documentElement.style.getPropertyValue('--bg') === '#0f1a2e';
        const inkColor = isDark ? '#e8f1fc' : '#1e3a5f';

        const writer = HanziWriter.create(containerId, currentChar, {
          width: 200,
          height: 200,
          padding: 8,
          showOutline: true,
          showCharacter: false,
          strokeColor: inkColor,
          outlineColor: '#d6e4f0',
          highlightColor: '#5b9bd5',
          drawingColor: '#5b9bd5',
          strokeAnimationSpeed: 0.5,
          delayBetweenStrokes: 600,
        });

        HanziWriter.loadCharacterData(currentChar).then(charData => {
          if (cancelled) return;
          setStrokeCount(charData.strokes.length);
        }).catch(() => {});

        // Auto-animate on open
        setTimeout(() => {
          if (!cancelled && writer) {
            writer.animateCharacter();
          }
        }, 300);

        // Save writer ref for replay button
        writerContainerRef.current._writer = writer;
        setLoading(false);
      } catch (e) {
        if (!cancelled) {
          setError('Không thể tải dữ liệu nét bút');
          setLoading(false);
        }
      }
    })();

    return () => { cancelled = true; };
  }, [currentChar]);

  const handleReplay = () => {
    const w = writerContainerRef.current?._writer;
    if (w) w.animateCharacter();
  };

  // Close on ESC
  useEffect(() => {
    const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handleEsc);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', handleEsc);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  if (!word) return null;

  return (
    <div
      onClick={onClose}
      className="fixed inset-0 z-[100] flex items-center justify-center p-4"
      style={{ background: 'rgba(15, 26, 46, 0.5)', backdropFilter: 'blur(8px)', animation: 'fadeIn 0.2s ease-out' }}

      <div
        onClick={(e) => e.stopPropagation()}

        style={{
          background: 'var(--surface)',

          ✕
        </button>

        {/* Header section */}
        <div className="p-6 pb-4" style={{ background: 'linear-gradient(135deg, var(--surface-soft), var(--surface))' }}>
          <div className="flex items-start gap-4 flex-wrap">
            <div className="flex-1 min-w-0">
              <span className="text-xs px-3 py-1 rounded-full inline-block mb-3" style={{ background:'var(--bg)', color:'var(--muted)' }}>{word.type}</span>
              <button onClick={() => speak(word.hanzi)}

                🔊 Phát âm

// ============ FLASHCARD VIEW ============
const FlashcardView = ({ srsData, updateSRS }) => {
  const [hskLevel, setHskLevel] = useState(1);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  // Theo dõi phiên học
  const [sessionStats, setSessionStats] = useState({ forgot: 0, hard: 0, good: 0, easy: 0, total: 0 });
  // Toast hiển thị feedback sau khi đánh giá
  const [feedback, setFeedback] = useState(null); // { label, color, interval, emoji }
  const words = ALL_HSK[hskLevel] || [];

  const dueCards = useMemo(() => {
    const now = Date.now();
    const due = words.filter(w => {
      const data = srsData[w.id];
      if (!data) return true;
      return data.nextReview <= now;
    });
    return due.length > 0 ? due : words;
  }, [words, srsData]);

  const currentWord = dueCards[currentIdx % dueCards.length];

  const handleRate = (quality) => {
    if (!currentWord) return;
    const prev = srsData[currentWord.id] || { ef: 2.5, interval: 0, reps: 0 };
    let { ef, interval, reps } = prev;
    if (quality < 3) { reps = 0; interval = 1; }
    else {
      if (reps === 0) interval = 1;
      else if (reps === 1) interval = 6;
      else interval = Math.round(interval * ef);
      reps += 1;
      ef = Math.max(1.3, ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
    }
    const nextReview = Date.now() + interval * 24 * 60 * 60 * 1000;
    updateSRS(currentWord.id, { ef, interval, reps, nextReview });

    // Cập nhật thống kê phiên học
    const ratingMap = { 1: 'forgot', 3: 'hard', 4: 'good', 5: 'easy' };
    const labelMap = {
      1: { label: 'Quên', emoji: '😕', color: '#dc2626', bg: '#fee2e2' },
      3: { label: 'Khó', emoji: '🤔', color: '#d97706', bg: '#fef3c7' },
      4: { label: 'Tốt', emoji: '🙂', color: '#059669', bg: '#d1fae5' },
      5: { label: 'Dễ', emoji: '😎', color: '#2563eb', bg: '#dbeafe' }
    };
    setSessionStats(s => ({
      ...s,
      [ratingMap[quality]]: s[ratingMap[quality]] + 1,
      total: s.total + 1
    }));

    // Hiện feedback
    const intervalText = interval === 1 ? '1 ngày' : interval >= 30 ? `~${Math.round(interval/30)} tháng` : `${interval} ngày`;
    setFeedback({
      ...labelMap[quality],
      interval: intervalText,
      hanzi: currentWord.hanzi
    });

    // Tự động ẩn feedback và chuyển thẻ
    setTimeout(() => {
      setFeedback(null);
      setFlipped(false);
      setCurrentIdx(i => i + 1);
    }, 800);
  };

  // Phím tắt: 1=Quên, 2=Khó, 3=Tốt, 4=Dễ, Space=Lật
  useEffect(() => {
    const handleKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') {
        e.preventDefault();
        setFlipped(f => !f);
      } else if (flipped && !feedback) {
        if (e.key === '1') handleRate(1);
        else if (e.key === '2') handleRate(3);
        else if (e.key === '3') handleRate(4);
        else if (e.key === '4') handleRate(5);
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [flipped, feedback, currentWord]);

  const resetSession = () => {
    setSessionStats({ forgot: 0, hard: 0, good: 0, easy: 0, total: 0 });
    setCurrentIdx(0);
    setFlipped(false);
    setFeedback(null);
  };

  if (!currentWord) {
    return (
      <div className="max-w-2xl mx-auto px-6 py-20 text-center">
        <div className="text-6xl mb-6 hanzi-text" style={{ color:'var(--accent)', fontWeight:500 }}>完</div>
        <div className="text-2xl" style={{ fontFamily:'var(--font-display)', color:'var(--ink)', fontWeight:600 }}>Bạn đã ôn xong tất cả thẻ!</div>
        <div className="mt-2 text-sm" style={{ color:'var(--muted)' }}>Hãy quay lại sau, hoặc chọn cấp HSK khác.</div>
      </div>
    );
  }

  // Tỷ lệ session
  const accuracy = sessionStats.total > 0 ? Math.round(((sessionStats.good + sessionStats.easy) / sessionStats.total) * 100) : 0;

  return (
    <div className="max-w-3xl mx-auto px-6 py-8 relative">
      {/* Feedback toast */}
      {feedback && (
        <div className="fixed top-24 left-1/2 z-50 px-6 py-4 rounded-2xl soft-shadow-lg flex items-center gap-3"
          style={{
            background: feedback.bg,
            border: `1px solid ${feedback.color}`,
            transform: 'translateX(-50%)',

// ============ QUIZ VIEW ============
const QuizView = ({ toggleLearned, learned, addQuizScore }) => {
  const [hskLevel, setHskLevel] = useState(1);
  const [questions, setQuestions] = useState([]);
  const [currentQ, setCurrentQ] = useState(0);
  const [score, setScore] = useState(0);
  const [selectedAns, setSelectedAns] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [finished, setFinished] = useState(false);

  const generateQuiz = (level) => {
    const words = ALL_HSK[level] || [];
    if (words.length < 4) return [];
    const shuffled = [...words].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, Math.min(10, words.length)).map(w => {
      const wrongs = words.filter(x => x.id !== w.id).sort(() => Math.random() - 0.5).slice(0, 3);
      const options = [...wrongs.map(x => x.meaning), w.meaning].sort(() => Math.random() - 0.5);
      return { word: w, options, correct: w.meaning };
    });
  };

  const startQuiz = (level) => {
    setHskLevel(level);
    setQuestions(generateQuiz(level));
    setCurrentQ(0); setScore(0); setSelectedAns(null); setShowResult(false); setFinished(false);
  };

  useEffect(() => { startQuiz(1); }, []);

  const handleAnswer = (option) => {
    if (showResult) return;
    setSelectedAns(option);
    setShowResult(true);
    if (option === questions[currentQ].correct) {
      setScore(s => s + 1);
      const wid = questions[currentQ].word.id;
      if (!learned.includes(wid)) toggleLearned(wid);
    }
  };

  const next = () => {
    if (currentQ + 1 >= questions.length) {
      setFinished(true);
      addQuizScore({ level: hskLevel, score, total: questions.length, date: Date.now() });
    } else {
      setCurrentQ(c => c + 1); setSelectedAns(null); setShowResult(false);
    }
  };

  if (finished) {
    const pct = Math.round((score / questions.length) * 100);
    return (
      <div className="max-w-2xl mx-auto px-6 py-12 text-center">
        <div className="text-7xl mb-4" style={{ fontFamily:'var(--font-display)', color:'var(--accent)' }}>{pct >= 80 ? '优' : pct >= 60 ? '良' : '加'}</div>
        <div className="text-3xl mb-2" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Kết quả</div>
        <div className="text-6xl mb-6" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--accent)' }}>{score}/{questions.length}</div>
        <div className="mb-8" style={{ color:'var(--muted)' }}>
          {pct >= 80 ? 'Xuất sắc! 太棒了!' : pct >= 60 ? 'Tốt lắm! Tiếp tục cố gắng nhé.' : 'Hãy ôn tập thêm và thử lại.'}
        </div>
        <button onClick={() => startQuiz(hskLevel)} className="px-6 py-3 rounded-2xl" style={{ background:'var(--accent)', color:'white' }}>Làm lại</button>
      </div>
    );
  }

  if (!questions.length) return <div className="p-12 text-center" style={{ color:'var(--muted)' }}>Đang tải...</div>;
  const q = questions[currentQ];

  return (
    <div className="max-w-2xl mx-auto px-6 py-8">
      <div className="mb-6">
        <div className="text-xs tracking-[0.3em] mb-2" style={{ color:'var(--accent)' }}>测验 · QUIZ</div>
        <h1 className="text-3xl mb-4" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Trắc nghiệm</h1>
        <div className="flex gap-2 flex-wrap mb-4">
          {[1,2,3,4,5,6].map(l => (
            <button key={l} onClick={() => startQuiz(l)} className="px-3 py-1.5 rounded-2xl text-sm"
              style={{ background: hskLevel === l ? 'var(--accent)' : 'var(--surface)', color: hskLevel === l ? 'white' : 'var(--ink)', border:'1px solid var(--border)' }}>HSK {l}</button>
          ))}
        </div>
        <div className="flex justify-between text-sm mb-2" style={{ color:'var(--muted)' }}>
          <span>Câu {currentQ + 1} / {questions.length}</span>
          <span>Điểm: {score}</span>
        </div>
        <div className="h-1 rounded-full overflow-hidden" style={{ background:'var(--surface)' }}>
          <div className="h-full transition-all" style={{ width:`${((currentQ + 1) / questions.length) * 100}%`, background:'var(--accent)' }} />
        </div>
      </div>

      <div className="p-8 rounded-2xl mb-6 text-center" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
        <div className="text-xs tracking-widest mb-3" style={{ color:'var(--muted)' }}>NGHĨA CỦA TỪ NÀY LÀ?</div>
        <button onClick={() => speak(q.word.hanzi)} className="text-7xl mb-3" style={{ fontFamily:'var(--font-display)', color:'var(--ink)', fontWeight:700 }}>{q.word.hanzi}</button>
        <div className="mb-2"><ColoredPinyin pinyin={q.word.pinyin} size="xl" /></div>
        <button onClick={() => speak(q.word.hanzi)} className="text-sm" style={{ color:'var(--accent)' }}>🔊 Phát âm</button>
      </div>

      <div className="grid gap-3 mb-6">
        {q.options.map((opt, i) => {
          const isCorrect = opt === q.correct;
          const isSelected = opt === selectedAns;
          let bg = 'var(--surface)', col = 'var(--ink)', bd = 'var(--border)';
          if (showResult) {
            if (isCorrect) { bg = '#10b981'; col = 'white'; bd = '#10b981'; }
            else if (isSelected) { bg = '#dc2626'; col = 'white'; bd = '#dc2626'; }
          }
          return (
            <button key={i} onClick={() => handleAnswer(opt)} disabled={showResult}
              className="p-4 rounded-2xl text-left transition-all"
              style={{ background: bg, color: col, border:`1px solid ${bd}` }}>
              <span className="text-xs mr-3 opacity-60">{String.fromCharCode(65 + i)}.</span>{opt}
            </button>
          );
        })}
      </div>

      {showResult && (
        <button onClick={next} className="w-full py-3 rounded-2xl" style={{ background:'var(--accent)', color:'white', fontFamily:'var(--font-display)', fontWeight:600 }}>
          {currentQ + 1 >= questions.length ? 'Xem kết quả' : 'Câu tiếp theo →'}
        </button>
      )}
    </div>
  );
};

// Helper: Load HanziWriter library lazily
const loadHanziWriter = () => {
  return new Promise((resolve, reject) => {
    if (window.HanziWriter) return resolve(window.HanziWriter);
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/hanzi-writer@3.7/dist/hanzi-writer.min.js';
    script.onload = () => resolve(window.HanziWriter);
    script.onerror = reject;
    document.head.appendChild(script);
  });
};

const WritingView = () => {
  const [hskLevel, setHskLevel] = useState(1);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0); // index of character within word (for multi-char words)
  const [mode, setMode] = useState('animate'); // 'animate' | 'quiz' | 'practice'
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [strokeCount, setStrokeCount] = useState(0);
  const [currentStroke, setCurrentStroke] = useState(0);
  const writerContainerRef = useRef(null);
  const writerRef = useRef(null);

  const practiceCanvasRef = useRef(null);
  const isDrawing = useRef(false);
  const lastPos = useRef({ x: 0, y: 0 });

  const words = ALL_HSK[hskLevel] || [];
  const currentWord = words[currentIdx];
  const currentChar = currentWord ? currentWord.hanzi[charIdx] : '';

  // Reset character index when word changes
  useEffect(() => {
    setCharIdx(0);
  }, [currentIdx, hskLevel]);

  // Initialize / re-initialize HanziWriter when char or mode changes
  useEffect(() => {
    if (!currentChar) return;
    let cancelled = false;
    setLoading(true);
    setError(null);
    setCurrentStroke(0);

    (async () => {
      try {
        const HanziWriter = await loadHanziWriter();
        if (cancelled) return;

        // Clean up previous writer
        if (writerContainerRef.current) {
          writerContainerRef.current.innerHTML = '';
        }

        // Create unique ID for this writer
        const containerId = `hw-${Date.now()}`;
        if (writerContainerRef.current) {
          writerContainerRef.current.id = containerId;
        }

        const isDark = document.documentElement.style.getPropertyValue('--bg') === '#0f1a2e';
        const accentColor = '#5b9bd5';
        const accentSoft = '#a8c8e8';
        const inkColor = isDark ? '#e8f1fc' : '#1e3a5f';

        const writer = HanziWriter.create(containerId, currentChar, {
          width: 280,
          height: 280,
          padding: 12,
          showOutline: true,
          showCharacter: mode === 'animate',
          strokeColor: inkColor,
          outlineColor: '#d6e4f0',
          radicalColor: accentColor,
          highlightColor: accentColor,
          drawingColor: accentColor,
          strokeAnimationSpeed: 0.5,
          delayBetweenStrokes: 600,
          drawingFadeDuration: 300,
          showHintAfterMisses: 2,
        });

        writerRef.current = writer;

        // Get stroke count
        HanziWriter.loadCharacterData(currentChar).then(charData => {
          if (cancelled) return;
          setStrokeCount(charData.strokes.length);
        }).catch(() => {});

        // Auto-start based on mode
        if (mode === 'animate') {
          setTimeout(() => {
            if (!cancelled && writerRef.current) {
              writerRef.current.animateCharacter({
                onComplete: () => {
                  if (!cancelled) setCurrentStroke(0);
                }
              });
            }
          }, 400);
        } else if (mode === 'quiz') {
          setTimeout(() => {
            if (!cancelled && writerRef.current) {
              writerRef.current.quiz({
                onCorrectStroke: ({ strokeNum }) => {
                  if (!cancelled) setCurrentStroke(strokeNum + 1);
                },
                onComplete: () => {
                  if (!cancelled) setCurrentStroke(strokeCount);
                }
              });
            }
          }, 400);
        }

        setLoading(false);
      } catch (e) {
        if (!cancelled) {
          console.error('HanziWriter error:', e);
          setError('Không thể tải dữ liệu chữ. Vui lòng kiểm tra kết nối mạng.');
          setLoading(false);
        }
      }
    })();

    return () => { cancelled = true; };
  }, [currentChar, mode]);

  // Practice canvas (free drawing)
  useEffect(() => {
    if (mode !== 'practice') return;
    const c = practiceCanvasRef.current;
    if (!c) return;
    const ratio = window.devicePixelRatio || 1;
    const rect = c.getBoundingClientRect();
    c.width = rect.width * ratio;
    c.height = rect.height * ratio;
    const ctx = c.getContext('2d');
    ctx.scale(ratio, ratio);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    drawPracticeGrid();
  }, [mode, currentIdx, charIdx, hskLevel]);

  const drawPracticeGrid = () => {
    const c = practiceCanvasRef.current;
    if (!c) return;
    const ctx = c.getContext('2d');
    const ratio = window.devicePixelRatio || 1;
    const w = c.width / ratio, h = c.height / ratio;
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.save();
    // Grid lines (米 pattern)
    ctx.strokeStyle = 'rgba(91, 155, 213, 0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
    ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
    ctx.moveTo(0, 0); ctx.lineTo(w, h);
    ctx.moveTo(w, 0); ctx.lineTo(0, h);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle = 'rgba(91, 155, 213, 0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(1, 1, w-2, h-2);
    // Light hint character
    ctx.fillStyle = 'rgba(168, 200, 232, 0.25)';
    ctx.font = `${Math.min(w, h) * 0.78}px "Noto Sans SC", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentChar, w/2, h/2 + 4);
    ctx.restore();
  };

  const getPos = (e) => {
    const c = practiceCanvasRef.current;
    const rect = c.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x, y };
  };

  const startDraw = (e) => {
    e.preventDefault();
    isDrawing.current = true;
    lastPos.current = getPos(e);
  };
  const draw = (e) => {
    if (!isDrawing.current) return;
    e.preventDefault();
    const c = practiceCanvasRef.current;
    const ctx = c.getContext('2d');
    const pos = getPos(e);
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastPos.current = pos;
  };
  const stopDraw = () => { isDrawing.current = false; };

  const handleAnimate = () => {
    if (writerRef.current && !loading) {
      writerRef.current.animateCharacter({
        onComplete: () => setCurrentStroke(strokeCount)
      });
    }
  };

  const handleQuiz = () => {
    setMode('quiz');
  };

  if (!currentWord) return null;

  return (
    <div className="max-w-5xl mx-auto px-6 py-8">
      <div className="mb-6">
        <div className="text-xs tracking-[0.3em] mb-2" style={{ color:'var(--accent)' }}>书写 · LUYỆN VIẾT</div>
        <h1 className="text-3xl mb-4" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Tập viết chữ Hán</h1>
        <div className="flex gap-2 flex-wrap mb-3">
          {[1,2,3,4,5,6].map(l => (
            <button key={l} onClick={() => { setHskLevel(l); setCurrentIdx(0); }} className="px-3 py-1.5 rounded-2xl text-sm transition-all"
              style={{ background: hskLevel === l ? 'var(--accent)' : 'var(--surface)', color: hskLevel === l ? 'white' : 'var(--ink)', border:'1px solid var(--border)' }}>HSK {l}</button>
          ))}
        </div>
      </div>

      {/* Word info bar */}
      <div className="p-5 rounded-3xl mb-5 soft-shadow" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div>
            <div className="text-xs tracking-widest mb-1" style={{ color:'var(--muted)' }}>TỪ {currentIdx + 1} / {words.length}</div>
            <div className="flex items-baseline gap-3 flex-wrap">
              <button onClick={() => speak(currentWord.hanzi)} className="text-3xl hover:opacity-70 transition hanzi-text" style={{ color:'var(--ink)', fontWeight:500 }}>{currentWord.hanzi}</button>
              <ColoredPinyin pinyin={currentWord.pinyin} size="lg" />
              <span style={{ color:'var(--muted)' }}>—</span>
              <span style={{ color:'var(--ink)' }}>{currentWord.meaning}</span>
            </div>
          </div>
          {/* Character selector for multi-char words */}
          {currentWord.hanzi.length > 1 && (
            <div className="flex gap-2 items-center">
              <span className="text-xs" style={{ color:'var(--muted)' }}>Chọn chữ:</span>
              {currentWord.hanzi.split('').map((ch, i) => (
                <button key={i} onClick={() => setCharIdx(i)}
                  className="w-10 h-10 rounded-2xl hanzi-text transition-all"
                  style={{
                    background: charIdx === i ? 'var(--accent)' : 'var(--bg)',
                    color: charIdx === i ? 'white' : 'var(--ink)',
                    border: '1px solid var(--border)',
                    fontSize: '20px', fontWeight: 500
                  }}>{ch}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="grid md:grid-cols-2 gap-5">
        {/* HanziWriter Display */}
        <div className="p-6 rounded-3xl soft-shadow" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
          <div className="flex justify-between items-center mb-3">
            <div className="text-xs tracking-widest" style={{ color:'var(--muted)' }}>
              {mode === 'animate' && 'XEM THỨ TỰ NÉT BÚT'}

                  <div className="text-sm" style={{ color:'var(--muted)' }}>Đang tải dữ liệu nét bút...</div>

            )}

          </div>

          {/* Mode buttons */}
          <div className="grid grid-cols-3 gap-2">
            <button onClick={() => setMode('animate')}
              className="py-2.5 rounded-2xl text-sm transition-all"

            </button>
            <button onClick={() => setMode('practice')}

// ============ READING VIEW ============
// Lookup từ vựng theo hanzi - tìm nghĩa nhanh
const buildVocabIndex = () => {
  const index = {};
  for (const level of [1,2,3,4,5,6]) {
    for (const word of (ALL_HSK[level] || [])) {
      // chỉ lưu từ đơn (1 ký tự) để hover từng chữ tra
      if (word.hanzi && word.hanzi.length <= 4) {
        if (!index[word.hanzi]) index[word.hanzi] = { ...word, level };
      }
    }
  }
  return index;
};

let _vocabIndexCache = null;
const getVocabIndex = () => {
  if (!_vocabIndexCache) _vocabIndexCache = buildVocabIndex();
  return _vocabIndexCache;
};

// Tìm nghĩa của 1 ký tự hoặc cụm
const lookupWord = (text) => {
  const idx = getVocabIndex();
  // Thử tìm trực tiếp
  if (idx[text]) return idx[text];
  return null;
};

// Popup hiển thị khi hover từng chữ
const HoverPopup = ({ char, x, y, onClose }) => {
  const containerRef = useRef(null);
  const [strokeData, setStrokeData] = useState(null);
  const word = lookupWord(char);

  useEffect(() => {
    let cancelled = false;
    let writer = null;
    const init = async () => {
      try {
        const HanziWriter = await loadHanziWriter();
        if (cancelled || !containerRef.current) return;

        // Lấy thông tin số nét
        HanziWriter.loadCharacterData(char).then(data => {
          if (data && data.strokes && !cancelled) {
            setStrokeData({ strokeCount: data.strokes.length });
          }
        }).catch(() => {});

        containerRef.current.innerHTML = '';
        writer = HanziWriter.create(containerRef.current, char, {
          width: 90,
          height: 90,
          padding: 4,
          strokeColor: '#5b9bd5',
          radicalColor: '#7eb4dc',
          strokeAnimationSpeed: 0.5,
          delayBetweenStrokes: 500,
          showOutline: true,
          showCharacter: false
        });
        setTimeout(() => {
          if (!cancelled && writer) writer.animateCharacter();
        }, 200);
      } catch (e) { /* ignore */ }
    };
    init();
    return () => { cancelled = true; };
  }, [char]);

  // Tính vị trí popup để không tràn màn hình
  const popupWidth = 320;
  const popupHeight = 220;
  const padding = 16;
  let left = x + 16;
  let top = y + 16;
  if (typeof window !== 'undefined') {
    if (left + popupWidth > window.innerWidth - padding) left = x - popupWidth - 16;
    if (top + popupHeight > window.innerHeight - padding) top = y - popupHeight - 16;
    if (left < padding) left = padding;
    if (top < padding) top = padding;
  }

  return (
    <div
      onMouseLeave={onClose}
      className="fixed rounded-2xl soft-shadow-lg overflow-hidden"
      style={{
        left, top,
        width: popupWidth,
        background: 'var(--surface)',
        border: '1px solid var(--accent-soft)',
        zIndex: 1000,
        animation: 'fadeIn 0.15s ease-out',
        pointerEvents: 'auto'
      }}
    >
      <div className="p-3 flex gap-3" style={{ background: 'linear-gradient(135deg, var(--surface), var(--surface-soft))' }}>
        {/* Stroke order container */}
        <div className="flex-shrink-0 rounded-xl" style={{ background: 'var(--bg)', padding: 4, border: '1px solid var(--border)' }}>
          <div ref={containerRef} style={{ width: 90, height: 90 }} />
        </div>
        {/* Word info */}
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <div className="text-3xl hanzi-text" style={{ color: 'var(--ink)', fontWeight: 500, lineHeight: 1 }}>{char}</div>
            <button
              onClick={(e) => { e.stopPropagation(); speak(char); }}
              className="text-xs px-2 py-0.5 rounded-md"
              style={{ background: 'var(--accent)', color: 'white', fontWeight: 500 }}
            >🔊</button>
          </div>
          {word ? (
            <>
              <div className="mb-1"><ColoredPinyin pinyin={word.pinyin} size="sm" /></div>
              <div className="text-sm line-clamp-2" style={{ color: 'var(--ink)' }}>{word.meaning}</div>
              <div className="text-xs mt-1 inline-block px-1.5 py-0.5 rounded-md" style={{ background: 'var(--bg)', color: 'var(--accent)', fontWeight: 500 }}>HSK {word.level}</div>
            </>
          ) : (
            <div className="text-xs italic" style={{ color: 'var(--muted)' }}>Chưa có trong từ điển HSK 1-6</div>
          )}
          {strokeData && (
            <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{strokeData.strokeCount} nét</div>
          )}
        </div>
      </div>
    </div>
  );
};

// Component để render câu/đoạn văn với mỗi chữ có thể hover
const HoverableText = ({ text, fontSize = '20px', lineHeight = 2 }) => {
  const [hovered, setHovered] = useState(null); // { char, x, y }
  const hideTimerRef = useRef(null);

  const handleEnter = (e, char) => {
    if (hideTimerRef.current) {
      clearTimeout(hideTimerRef.current);
      hideTimerRef.current = null;
    }
    // Bỏ qua dấu câu / khoảng trắng
    if (/[\s,。!?,.!?;:、""''""''()()「」【】《》—\-…]/.test(char)) return;
    const rect = e.currentTarget.getBoundingClientRect();
    setHovered({ char, x: rect.left, y: rect.bottom });
  };

  const handleLeave = () => {
    // Delay nhỏ để di chuột vào popup không bị mất
    hideTimerRef.current = setTimeout(() => setHovered(null), 150);
  };

  // Tách text thành các ký tự
  const chars = Array.from(text);

  return (
    <>
      <span
        className="hanzi-text"
        style={{ fontSize, lineHeight, color: 'var(--ink)', fontWeight: 500 }}
      >
        {chars.map((ch, i) => {
          const isHanzi = /[\u4e00-\u9fff]/.test(ch);
          if (!isHanzi) return <span key={i}>{ch}</span>;
          return (
            <span
              key={i}
              onMouseEnter={(e) => handleEnter(e, ch)}
              onMouseLeave={handleLeave}
              className="cursor-pointer transition-colors"
              style={{
                display: 'inline-block',
                padding: '0 1px',
                borderBottom: '1px dashed transparent',
                color: hovered && hovered.char === ch ? 'var(--accent)' : 'inherit'
              }}
              onMouseOver={(e) => { e.currentTarget.style.borderBottomColor = 'var(--accent-soft)'; }}
              onMouseOut={(e) => { e.currentTarget.style.borderBottomColor = 'transparent'; }}
            >
              {ch}
            </span>
          );
        })}
      </span>
      {hovered && (
        <HoverPopup
          char={hovered.char}
          x={hovered.x}
          y={hovered.y}
          onClose={() => setHovered(null)}
        />
      )}
    </>
  );
};

const ReadingView = () => {

  }, [selectedReadingId, studyMode]);

  // Render một câu với chế độ hiển thị

    return (
      <div className="max-w-5xl mx-auto px-6 py-8">
        <div className="mb-6">
          <div className="text-xs tracking-[0.3em] mb-2" style={{ color: 'var(--accent)' }}>阅读 · BÀI ĐỌC</div>
          <h1 className="text-4xl mb-4" style={{ fontFamily: 'var(--font-display)', fontWeight: 600, color: 'var(--ink)' }}>
            Luyện đọc theo cấp HSK
          </h1>
          <div className="flex gap-2 flex-wrap mb-3">
            {[1,2,3,4,5,6].map(level => (
              <button
                key={level}
                onClick={() => setHskLevel(level)}
                className="px-4 py-2 rounded-2xl transition-all"
                style={{
                  background: hskLevel === level ? 'var(--accent)' : 'var(--surface)',
                  color: hskLevel === level ? 'white' : 'var(--ink)',
                  border: '1px solid var(--border)',
                  fontFamily: 'var(--font-display)',
                  fontWeight: 600
                }}>
                HSK {level}
              </button>
            ))}
          </div>
          <div className="text-sm" style={{ color: 'var(--muted)' }}>
            <strong style={{ color: 'var(--ink)' }}>{levelReadings.length}</strong> bài đọc · 
            <span className="ml-2 text-xs">Di chuột vào từng chữ để xem nghĩa và thứ tự nét</span>
          </div>
        </div>

        {levelReadings.length === 0 ? (
          <div className="text-center py-16 rounded-3xl" style={{ background: 'var(--surface)', border: '1px solid var(--border)', color: 'var(--muted)' }}>
            <div className="text-5xl mb-3 hanzi-text">读</div>
            <div>Đang cập nhật bài đọc HSK {hskLevel}...</div>
          </div>
        ) : (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {levelReadings.map((reading, idx) => (
              <button
                key={reading.id}
                onClick={() => setSelectedReadingId(reading.id)}
                className="text-left p-5 rounded-3xl soft-shadow hover:soft-shadow-lg hover:-translate-y-1 transition-all relative overflow-hidden"
                style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
                <div className="absolute top-0 left-0 w-1 h-full" style={{ background: 'var(--accent)' }} />
                <div className="flex items-start gap-3 mb-3 pl-2">
                  <div className="flex-shrink-0 w-10 h-10 rounded-2xl flex items-center justify-center"
                    style={{ background: 'var(--bg)', color: 'var(--accent)', fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: '14px', border: '1px solid var(--border)' }}>
                    {String(idx + 1).padStart(2, '0')}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xl mb-1 hanzi-text" style={{ color: 'var(--ink)', fontWeight: 500 }}>{reading.title}</div>
                    <div className="mb-1"><ColoredPinyin pinyin={reading.titlePinyin} size="sm" /></div>
                    <div className="text-sm italic" style={{ color: 'var(--muted)' }}>{reading.titleMeaning}</div>
                  </div>
                </div>
                <div className="text-xs flex items-center justify-between pl-2" style={{ color: 'var(--accent)' }}>
                  <span>{reading.sentences.length} câu</span>
                  <span>Đọc bài →</span>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  // Khi đã chọn bài: hiển thị bài đọc
  const totalSentences = selectedReading.sentences.length;
  return (
    <div className="max-w-4xl mx-auto px-6 py-8">
      {/* Back button */}
      <button
        onClick={() => setSelectedReadingId(null)}
        className="mb-4 px-3 py-1.5 rounded-2xl text-sm transition-all"
        style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)', fontWeight: 500 }}
      >← Danh sách bài đọc</button>

      {/* Title */}
      <div className="mb-6 p-6 rounded-3xl soft-shadow" style={{ background: 'linear-gradient(135deg, var(--surface), var(--surface-soft))', border: '1px solid var(--border)' }}>
        <div className="text-xs tracking-[0.3em] mb-2" style={{ color: 'var(--accent)' }}>HSK {hskLevel} · 阅读</div>
        <h1 className="text-3xl mb-2 hanzi-text" style={{ color: 'var(--ink)', fontWeight: 500 }}>{selectedReading.title}</h1>
        <div className="mb-1"><ColoredPinyin pinyin={selectedReading.titlePinyin} size="lg" /></div>
        <div className="text-base italic" style={{ color: 'var(--muted)' }}>{selectedReading.titleMeaning}</div>
      </div>

      {/* Mode controls */}
      <div className="mb-5 p-4 rounded-2xl" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
        {/* Display mode */}
        <div className="mb-3">
          <div className="text-xs tracking-widest mb-2" style={{ color: 'var(--muted)', fontWeight: 600 }}>CHẾ ĐỘ HIỂN THỊ</div>
          <div className="flex gap-1.5 flex-wrap">
            {[
              { key: 'chinese', label: '汉 Chữ Hán' },
              { key: 'pinyin', label: 'ā Pinyin' },
              { key: 'meaning', label: 'V Nghĩa' },
              { key: 'combined', label: '✓ Kết hợp' }
            ].map(opt => (
              <button
                key={opt.key}
                onClick={() => setDisplayMode(opt.key)}
                className="px-3 py-1.5 rounded-xl text-sm transition-all"
                style={{
                  background: displayMode === opt.key ? 'var(--accent)' : 'var(--bg)',
                  color: displayMode === opt.key ? 'white' : 'var(--ink)',
                  border: '1px solid var(--border)',
                  fontWeight: 500
                }}>
                {opt.label}
              </button>
            ))}
          </div>
        </div>

        {/* Study mode */}
        <div>
          <div className="text-xs tracking-widest mb-2" style={{ color: 'var(--muted)', fontWeight: 600 }}>CÁCH HỌC</div>
          <div className="flex gap-1.5 flex-wrap">
            <button
              onClick={() => setStudyMode('full')}
              className="px-3 py-1.5 rounded-xl text-sm transition-all"
              style={{
                background: studyMode === 'full' ? 'var(--accent-2)' : 'var(--bg)',
                color: studyMode === 'full' ? 'white' : 'var(--ink)',
                border: '1px solid var(--border)',
                fontWeight: 500
              }}>📖 Cả bài</button>
            <button
              onClick={() => setStudyMode('sentence')}
              className="px-3 py-1.5 rounded-xl text-sm transition-all"
              style={{
                background: studyMode === 'sentence' ? 'var(--accent-2)' : 'var(--bg)',
                color: studyMode === 'sentence' ? 'white' : 'var(--ink)',
                border: '1px solid var(--border)',
                fontWeight: 500
              }}>📑 Từng câu</button>
            <button
              onClick={() => speak(selectedReading.sentences.map(s => s.hanzi).join(' '))}
              className="px-3 py-1.5 rounded-xl text-sm transition-all ml-auto"
              style={{ background: 'var(--accent)', color: 'white', fontWeight: 500 }}
            >🔊 Nghe cả bài</button>
          </div>
        </div>
      </div>

      {/* Content */}
      {studyMode === 'full' ? (
        <div>
          {selectedReading.sentences.map((s, i) => renderSentence(s, i))}
        </div>
      ) : (
        <div>
          {/* Sentence-by-sentence mode */}
          <div className="mb-3 flex items-center justify-between">
            <div className="text-sm" style={{ color: 'var(--muted)' }}>
              Câu <strong style={{ color: 'var(--ink)' }}>{currentSentenceIdx + 1}</strong> / {totalSentences}
            </div>
            <div className="text-xs" style={{ color: 'var(--accent)' }}>{Math.round((currentSentenceIdx + 1) / totalSentences * 100)}%</div>
          </div>

          {/* Progress bar */}
          <div className="mb-4 h-1.5 rounded-full overflow-hidden" style={{ background: 'var(--bg)' }}>
            <div className="h-full transition-all duration-500" style={{
              width: `${(currentSentenceIdx + 1) / totalSentences * 100}%`,
              background: 'linear-gradient(90deg, var(--accent-soft), var(--accent))'
            }} />
          </div>

          {/* Current sentence */}
          {renderSentence(selectedReading.sentences[currentSentenceIdx], currentSentenceIdx, true)}

          {/* Navigation */}
          <div className="flex gap-2 mt-4">
            <button
              onClick={() => setCurrentSentenceIdx(Math.max(0, currentSentenceIdx - 1))}
              disabled={currentSentenceIdx === 0}
              className="flex-1 py-3 rounded-2xl transition-all disabled:opacity-40 disabled:cursor-not-allowed"
              style={{ background: 'var(--surface)', color: 'var(--ink)', border: '1px solid var(--border)', fontWeight: 500 }}
            >← Câu trước</button>
            <button
              onClick={() => setCurrentSentenceIdx(Math.min(totalSentences - 1, currentSentenceIdx + 1))}
              disabled={currentSentenceIdx === totalSentences - 1}
              className="flex-1 py-3 rounded-2xl transition-all disabled:opacity-40 disabled:cursor-not-allowed"
              style={{ background: 'var(--accent)', color: 'white', fontWeight: 500 }}
            >Câu tiếp →</button>
          </div>

          {/* Sentence list jump */}
          <div className="mt-5 p-3 rounded-2xl" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
            <div className="text-xs tracking-widest mb-2" style={{ color: 'var(--muted)', fontWeight: 600 }}>NHẢY TỚI CÂU</div>
            <div className="flex gap-1.5 flex-wrap">
              {selectedReading.sentences.map((_, i) => (
                <button
                  key={i}
                  onClick={() => setCurrentSentenceIdx(i)}
                  className="w-8 h-8 rounded-lg text-xs transition-all"
                  style={{
                    background: i === currentSentenceIdx ? 'var(--accent)' : (i < currentSentenceIdx ? 'var(--accent-soft)' : 'var(--bg)'),
                    color: i <= currentSentenceIdx ? 'white' : 'var(--ink)',
                    border: '1px solid var(--border)',
                    fontWeight: 500
                  }}>{i + 1}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Tip */}
      <div className="mt-6 p-3 rounded-2xl text-sm flex items-start gap-2" style={{ background: 'var(--surface-soft)', color: 'var(--muted)' }}>
        <span>💡</span>
        <div>Mẹo: Di chuột vào bất kỳ chữ Hán nào để xem nghĩa, pinyin và thứ tự nét bút. Nhấn 🔊 để nghe phát âm.</div>
      </div>
    </div>
  );
};

// ============ PROGRESS VIEW ============
const ProgressView = ({ learned, starred, srsData, quizScores }) => {
  const stats = useMemo(() => {
    const result = {};
    [1,2,3,4,5,6].forEach(l => {
      const words = ALL_HSK[l] || [];
      const learnedInLvl = words.filter(w => learned.includes(w.id)).length;
      result[l] = { total: words.length, learned: learnedInLvl, pct: words.length > 0 ? Math.round((learnedInLvl/words.length)*100) : 0 };
    });
    return result;
  }, [learned]);

  const totalLearned = Object.values(stats).reduce((a, b) => a + b.learned, 0);
  const totalAll = Object.values(stats).reduce((a, b) => a + b.total, 0);
  const overallPct = totalAll > 0 ? Math.round((totalLearned / totalAll) * 100) : 0;

  const srsCount = Object.keys(srsData).length;
  const dueCount = Object.values(srsData).filter(d => d.nextReview <= Date.now()).length;

  return (
    <div className="max-w-5xl mx-auto px-6 py-8">
      <div className="mb-8">
        <div className="text-xs tracking-[0.3em] mb-2" style={{ color:'var(--accent)' }}>进度 · TIẾN ĐỘ</div>
        <h1 className="text-4xl mb-2" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Theo dõi học tập</h1>
        <p style={{ color:'var(--muted)' }}>Tất cả thống kê được lưu lại giữa các phiên học</p>
      </div>

      {/* Overall stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        {[
          { label:'Từ đã thuộc', value: totalLearned, sub:`${overallPct}%` },
          { label:'Từ đánh dấu', value: starred.length, sub:'★' },
          { label:'Đang ôn (SRS)', value: srsCount, sub:'thẻ' },
          { label:'Cần ôn hôm nay', value: dueCount, sub:'thẻ' },
        ].map((s, i) => (
          <div key={i} className="p-5 rounded-2xl" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
            <div className="text-xs tracking-widest mb-1" style={{ color:'var(--muted)' }}>{s.label.toUpperCase()}</div>
            <div className="text-3xl" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--accent)' }}>{s.value}</div>
            <div className="text-sm" style={{ color:'var(--muted)' }}>{s.sub}</div>
          </div>
        ))}
      </div>

      {/* HSK levels progress */}
      <div className="p-6 rounded-2xl mb-8" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
        <h2 className="text-xl mb-4" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Tiến độ theo cấp HSK</h2>
        <div className="space-y-4">
          {[1,2,3,4,5,6].map(l => {
            const s = stats[l];
            return (
              <div key={l}>
                <div className="flex justify-between mb-1">
                  <span style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>HSK {l}</span>
                  <span className="text-sm" style={{ color:'var(--muted)' }}>{s.learned}/{s.total} ({s.pct}%)</span>
                </div>
                <div className="h-3 rounded-full overflow-hidden" style={{ background:'var(--bg)' }}>
                  <div className="h-full transition-all duration-700" style={{ width:`${s.pct}%`, background:`linear-gradient(90deg, var(--accent), var(--accent-2))` }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Quiz history */}
      {quizScores.length > 0 && (
        <div className="p-6 rounded-2xl" style={{ background:'var(--surface)', border:'1px solid var(--border)' }}>
          <h2 className="text-xl mb-4" style={{ fontFamily:'var(--font-display)', fontWeight:600, color:'var(--ink)' }}>Lịch sử Quiz</h2>
          <div className="space-y-2">
            {quizScores.slice(-10).reverse().map((q, i) => {
              const pct = Math.round((q.score / q.total) * 100);
              return (
                <div key={i} className="flex justify-between items-center p-3 rounded-2xl" style={{ background:'var(--bg)' }}>
                  <div>
                    <div style={{ fontFamily:'var(--font-display)', color:'var(--ink)' }}>HSK {q.level}</div>
                    <div className="text-xs" style={{ color:'var(--muted)' }}>{new Date(q.date).toLocaleDateString('vi-VN')} {new Date(q.date).toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'})}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-lg" style={{ fontFamily:'var(--font-display)', fontWeight:700, color: pct >= 80 ? '#10b981' : pct >= 60 ? '#f59e0b' : '#dc2626' }}>{q.score}/{q.total}</div>
                    <div className="text-xs" style={{ color:'var(--muted)' }}>{pct}%</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
};

// ============ MAIN APP ============
function App() {
  const [view, setView] = useState('home');
  const [selectedHSK, setSelectedHSK] = useState(1);
  const [darkMode, setDarkMode] = useState(false);
  const [learned, setLearned] = useState([]);
  const [starred, setStarred] = useState([]);
  const [srsData, setSrsData] = useState({});
  const [quizScores, setQuizScores] = useState([]);

  // Load from localStorage
  useEffect(() => {
    try {
      const l = localStorage.getItem('hsk:learned');
      if (l) setLearned(JSON.parse(l));
      const s = localStorage.getItem('hsk:starred');
      if (s) setStarred(JSON.parse(s));
      const sr = localStorage.getItem('hsk:srs');
      if (sr) setSrsData(JSON.parse(sr));
      const q = localStorage.getItem('hsk:quiz');
      if (q) setQuizScores(JSON.parse(q));
      const d = localStorage.getItem('hsk:dark');
      if (d) setDarkMode(JSON.parse(d));
    } catch (e) {}
  }, []);

  // Save to localStorage
  const persist = (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  };

  const toggleLearned = (id) => {
    setLearned(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      persist('hsk:learned', next);
      return next;
    });
  };
  const toggleStar = (id) => {
    setStarred(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      persist('hsk:starred', next);
      return next;
    });
  };
  const updateSRS = (id, data) => {
    setSrsData(prev => {
      const next = { ...prev, [id]: data };
      persist('hsk:srs', next);
      return next;
    });
  };
  const addQuizScore = (s) => {
    setQuizScores(prev => {
      const next = [...prev, s].slice(-50);
      persist('hsk:quiz', next);
      return next;
    });
  };
  const toggleDark = () => {
    setDarkMode(d => {
      const next = !d;
      persist('hsk:dark', next);
      return next;
    });
  };

  const learnedCount = useMemo(() => {
    const r = {};
    [1,2,3,4,5,6].forEach(l => {
      const words = ALL_HSK[l] || [];
      r[l] = words.filter(w => learned.includes(w.id)).length;
    });
    return r;
  }, [learned]);
  const totalCount = useMemo(() => {
    const r = {};
    [1,2,3,4,5,6].forEach(l => { r[l] = (ALL_HSK[l] || []).length; });
    return r;
  }, []);

  // CSS variables based on theme
  const themeStyles = darkMode ? {
    '--bg': '#0f1a2e',
    '--bg-header': 'rgba(15, 26, 46, 0.85)',
    '--surface': '#1a2842',
    '--surface-soft': '#243352',
    '--ink': '#e8f1fc',
    '--muted': '#8da9c9',
    '--border': '#2d3e5c',
    '--accent': '#7eb4dc',
    '--accent-soft': '#5b9bd5',
    '--accent-2': '#a8c8e8',
    '--tone-1': '#93c5fd',
    '--tone-2': '#6ee7b7',
    '--tone-3': '#fcd34d',
    '--tone-4': '#fca5a5',
  } : {
    '--bg': '#f0f7ff',
    '--bg-header': 'rgba(240, 247, 255, 0.85)',
    '--surface': '#ffffff',
    '--surface-soft': '#e8f1fc',
    '--ink': '#1e3a5f',
    '--muted': '#6b8caf',
    '--border': '#d6e4f0',
    '--accent': '#5b9bd5',
    '--accent-soft': '#a8c8e8',
    '--accent-2': '#7eb4dc',
    '--tone-1': '#2563eb',
    '--tone-2': '#10b981',
    '--tone-3': '#f59e0b',
    '--tone-4': '#ef4444',
  };

  return (
    <div style={{
      ...themeStyles,
      fontFamily: 'var(--font-body)',
      background: 'var(--bg)',
      color: 'var(--ink)',
      minHeight: '100vh',
      backgroundImage: 'radial-gradient(circle at 20% 20%, rgba(168, 200, 232, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(126, 180, 220, 0.1) 0%, transparent 50%)',
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Quicksand:wght@300;400;500;600;700&family=Nunito:wght@300;400;500;600;700&display=swap');
        :root {
          --font-display: 'Quicksand', 'Noto Sans SC', sans-serif;
          --font-body: 'Nunito', 'Noto Sans SC', sans-serif;
          --font-pinyin: 'Quicksand', sans-serif;
          --font-hanzi: 'Noto Sans SC', sans-serif;
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        html { overflow-y: scroll; scrollbar-gutter: stable; }
        body { margin: 0; letter-spacing: 0.01em; overflow-x: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        button { cursor: pointer; border: none; font-family: inherit; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        button:hover { filter: brightness(1.03); }
        input, textarea { font-family: inherit; }

        /* Always-visible, custom-styled scrollbar */
        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        ::-webkit-scrollbar { width: 12px; height: 12px; }
        html::-webkit-scrollbar-track,
        body::-webkit-scrollbar-track,
        ::-webkit-scrollbar-track { background: var(--surface-soft, rgba(168, 200, 232, 0.15)); border-radius: 8px; }
        html::-webkit-scrollbar-thumb,
        body::-webkit-scrollbar-thumb,
        ::-webkit-scrollbar-thumb {
          background: var(--accent-soft, #a8c8e8);
          border-radius: 8px;
          border: 2px solid var(--surface-soft, rgba(168, 200, 232, 0.15));
        }
        html::-webkit-scrollbar-thumb:hover,
        body::-webkit-scrollbar-thumb:hover,
        ::-webkit-scrollbar-thumb:hover {
          background: var(--accent, #5b9bd5);
        }
        /* Firefox */
        html { scrollbar-width: thin; scrollbar-color: var(--accent-soft, #a8c8e8) var(--surface-soft, rgba(168, 200, 232, 0.15)); }

        .hanzi-text { font-family: var(--font-hanzi); font-weight: 500; }
        .soft-shadow { box-shadow: 0 4px 24px rgba(91, 155, 213, 0.08); }
        .soft-shadow-lg { box-shadow: 0 8px 32px rgba(91, 155, 213, 0.12); }
        .line-clamp-1 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
        .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
      `}</style>

      <Header view={view} setView={setView} darkMode={darkMode} toggleDark={toggleDark} />

      <main>
        {view === 'home' && <HomeView setView={setView} setSelectedHSK={setSelectedHSK} learnedCount={learnedCount} totalCount={totalCount} />}
        {view === 'vocab' && <VocabView selectedHSK={selectedHSK} setSelectedHSK={setSelectedHSK} learned={learned} toggleLearned={toggleLearned} starred={starred} toggleStar={toggleStar} />}
        {view === 'grammar' && <GrammarView />}
        {view === 'reading' && <ReadingView />}
        {view === 'flashcard' && <FlashcardView srsData={srsData} updateSRS={updateSRS} />}
        {view === 'quiz' && <QuizView toggleLearned={toggleLearned} learned={learned} addQuizScore={addQuizScore} />}
        {view === 'writing' && <WritingView />}
        {view === 'progress' && <ProgressView learned={learned} starred={starred} srsData={srsData} quizScores={quizScores} />}
      </main>

      <footer className="mt-20 py-8 px-6 text-center" style={{ borderTop:'1px solid var(--border)', color:'var(--muted)' }}>
        <div className="text-xs tracking-[0.3em] mb-2">加油 · CỐ LÊN</div>
        <div className="text-sm">Học một chút mỗi ngày — 学一点,每天进步</div>
      </footer>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
setTimeout(() => {
  const loading = document.getElementById('loading');
  if (loading) {
    loading.style.transition = 'opacity 0.5s';
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 500);
  }
}, 100);
</script>
</body>
</html>
