            style={{ background: activeTab === t.id ? 'var(--accent)' : 'transparent', color: activeTab === t.id ? 'white' : 'var(--ink)', boxShadow: activeTab === t.id ? '0 2px 8px rgba(61,139,209,0.3)' : 'none' }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ══════════════════════════════
           TAB: OVERVIEW
      ══════════════════════════════ */}
      {activeTab === 'overview' && (
        <div className="space-y-5">
          {/* Per-level mastery */}
          <div className="p-5 rounded-3xl soft-shadow" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
            <div className="text-xs tracking-widest mb-4 font-bold" style={{ color: 'var(--muted)' }}>
              TIẾN ĐỘ THEO CẤP HSK
            </div>
            <div className="space-y-3">
              {[1,2,3,4,5,6].map(l => {
                const s = levelStats[l];
                const col = hskColors[l];
                return (
                  <div key={l}>
                    <div className="flex items-center justify-between mb-1">
                      <div className="flex items-center gap-2">
                        <span className="font-bold text-sm w-12" style={{ color: col }}>HSK {l}</span>
                        <span className="text-xs" style={{ color: 'var(--muted)' }}>{s.learned}/{s.total} từ</span>
                        {s.due > 0 && (
                          <span className="text-[10px] px-1.5 py-0.5 rounded-full font-bold"
                            style={{ background: `${col}20`, color: col }}>
                            {s.due} cần ôn
                          </span>
                        )}
                      </div>
                      <div className="flex items-center gap-2">
                        {s.pct === 100 && <span style={{ color: '#10b981', fontSize: '14px' }}>✓</span>}
                        <span className="text-sm font-bold" style={{ color: col }}>{s.pct}%</span>
                      </div>
                    </div>
                    <div className="h-2.5 rounded-full overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
                      <div className="h-full rounded-full transition-all duration-700"
                        style={{ width: `${s.pct}%`, background: col, boxShadow: s.pct > 0 ? `0 0 8px ${col}50` : 'none' }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Overall */}
            <div className="mt-5 pt-4" style={{ borderTop: '1px dashed var(--border)' }}>
              <div className="flex justify-between items-center mb-2">
                <span className="font-bold text-sm" style={{ color: 'var(--ink)' }}>Tổng tiến độ HSK 1-6</span>
                <span className="text-2xl font-extrabold" style={{ color: 'var(--accent)' }}>{overallPct}%</span>
              </div>
              <div className="h-3 rounded-full overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
                <div className="h-full rounded-full transition-all"
                  style={{ width: `${overallPct}%`, background: 'linear-gradient(90deg, var(--accent), var(--accent-soft))' }} />
              </div>
            </div>
          </div>

          {/* ETA + Forecast */}
          {nextLevelETA && (
            <div className="p-5 rounded-3xl soft-shadow" style={{ background: 'linear-gradient(135deg, var(--surface), var(--surface-soft))', border: '1px solid var(--accent-soft)' }}>
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-xl"
                  style={{ background: 'linear-gradient(135deg, var(--accent), var(--accent-2))', color: 'white' }}>
                  🎯
                </div>
                <div className="flex-1">
                  <div className="font-bold" style={{ color: 'var(--ink)' }}>
                    Hoàn thành HSK {nextLevelETA.level}
                  </div>
                  <div className="text-sm" style={{ color: 'var(--muted)' }}>
                    Còn {nextLevelETA.remaining} từ
                    {nextLevelETA.days
                      ? ` · Ước tính ${nextLevelETA.days} ngày nữa (${avgWordsPerDay} từ/ngày)`
                      : ' · Bắt đầu học để tính ETA'
                    }
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 365-day Heatmap */}
          <div className="p-5 rounded-3xl soft-shadow" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
            <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
              <div>
                <div className="text-xs tracking-widest font-bold" style={{ color: 'var(--muted)' }}>
                  LỊCH HỌC 365 NGÀY
                </div>
                <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>
                  {activeDays} ngày đã học trong năm qua
                </div>
              </div>
              <div className="flex items-center gap-2 text-xs" style={{ color: 'var(--muted)' }}>
                <span>Ít</span>
                {[0,1,2,3,4].map(i => (
                  <div key={i} className="w-3 h-3 rounded-sm"
                    style={{ background: i === 0 ? 'var(--surface-soft)' : heatmapColors[i] }} />
                ))}
                <span>Nhiều</span>
              </div>
            </div>
            {/* Compact heatmap grid - 52 weeks */}
            <div className="overflow-x-auto">
              <div style={{ display: 'flex', gap: '2px', minWidth: '728px' }}>
                {Array.from({ length: 52 }, (_, weekIdx) => (
                  <div key={weekIdx} style={{ display: 'flex', flexDirection: 'column', gap: '2px' }}>
                    {heatmapData.slice(weekIdx * 7, weekIdx * 7 + 7).map((day, dayIdx) => (
                      <div key={dayIdx}
                        title={`${day.date}: ${day.words > 0 ? `${day.words} từ` : day.frozen ? 'Freeze 🧊' : 'Không học'}`}
                        style={{
                          width: '12px', height: '12px', borderRadius: '2px',
                          background: day.frozen ? '#60a5fa' : heatmapColors[day.intensity] || 'var(--surface-soft)',
                        }} />
                    ))}
                  </div>
                ))}
              </div>
            </div>
            {/* Month labels */}
            <div className="flex mt-2 text-[10px]" style={{ color: 'var(--muted)' }}>
              {['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'].map((m, i) => (
                <span key={m} style={{ flex: '1', textAlign: 'center' }}>{m}</span>
              ))}
            </div>
          </div>

          {/* Milestones */}
          <div className="p-5 rounded-3xl soft-shadow" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
            <div className="flex items-center justify-between mb-4">
              <div className="text-xs tracking-widest font-bold" style={{ color: 'var(--muted)' }}>
                THÀNH TÍCH ({doneMilestones}/{milestones.length})
              </div>
              <div className="h-1.5 flex-1 mx-4 rounded-full overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
                <div className="h-full rounded-full"
                  style={{ width: `${(doneMilestones/milestones.length)*100}%`, background: 'linear-gradient(90deg,#10b981,#34d399)' }} />
              </div>
              <span className="text-xs font-bold" style={{ color: '#10b981' }}>
                {Math.round((doneMilestones/milestones.length)*100)}%
              </span>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
              {milestones.map(m => (
                <div key={m.key}
                  className="flex items-center gap-3 p-3 rounded-xl"
                  style={{
                    background: m.done ? '#f0fdf4' : 'var(--surface-soft)',
                    border: `1px solid ${m.done ? '#6ee7b7' : 'var(--border)'}`,
                    opacity: m.done ? 1 : 0.55,
                  }}>
                  <div className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0"
                    style={{ background: m.done ? '#10b981' : 'var(--border)', color: 'white', fontSize: '11px' }}>
                    {m.done ? '✓' : '○'}
                  </div>
                  <span className="text-sm" style={{ color: m.done ? '#065f46' : 'var(--muted)', fontWeight: m.done ? 600 : 400 }}>
                    {m.label}
                  </span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════
           TAB: SRS HEALTH
      ══════════════════════════════ */}
      {activeTab === 'srs' && (
        <div className="space-y-5">
          {totalSRS === 0 ? (
            <div className="text-center py-16 rounded-3xl" style={{ background: 'var(--surface)', border: '1px solid var(--border)', color: 'var(--muted)' }}>
              <div className="text-5xl mb-4 hanzi-text" style={{ color: 'var(--accent-soft)' }}>空</div>
              <div className="font-semibold mb-1" style={{ color: 'var(--ink)' }}>Chưa có thẻ SRS nào</div>
              <div className="text-sm">Vào Flashcard và bắt đầu ôn tập để tạo thẻ SRS</div>
            </div>
          ) : (
            <>
              {/* SRS State breakdown */}
              <div className="p-5 rounded-3xl soft-shadow" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
                <div className="text-xs tracking-widest mb-4 font-bold" style={{ color: 'var(--muted)' }}>
                  TRẠNG THÁI THẺ SRS
                </div>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                  {[
                    { key: 'new',         label: 'Đang học',  color: '#10b981', icon: '🌱' },
                    { key: 'learning',    label: 'Lặp lại',   color: '#f59e0b', icon: '📖' },
                    { key: 'review',      label: 'Ôn dài hạn',color: 'var(--accent)', icon: '🎯' },
                    { key: 'relearning',  label: 'Học lại',   color: '#ef4444', icon: '🔄' },
                  ].map(s => (
                    <div key={s.key} className="p-4 rounded-2xl text-center"
                      style={{ background: `${s.color}10`, border: `1px solid ${s.color}30` }}>
                      <div style={{ fontSize: '20px', marginBottom: '4px' }}>{s.icon}</div>
                      <div style={{ fontSize: '24px', fontWeight: 800, color: s.color, lineHeight: 1 }}>
                        {srsHealth.states[s.key] || 0}
                      </div>
                      <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{s.label}</div>
                    </div>
                  ))}
                </div>

                {/* State proportional bar */}
                <div className="h-4 rounded-full overflow-hidden flex">
                  {[
                    { key: 'new', color: '#10b981' },
                    { key: 'learning', color: '#f59e0b' },
                    { key: 'review', color: 'var(--accent)' },
                    { key: 'relearning', color: '#ef4444' },
                  ].map(s => {
                    const pct = totalSRS > 0 ? (srsHealth.states[s.key] || 0) / totalSRS * 100 : 0;
                    return pct > 0 ? (
                      <div key={s.key} style={{ width: `${pct}%`, background: s.color }} title={`${s.key}: ${pct.toFixed(1)}%`} />
                    ) : null;
                  })}
                </div>
              </div>

              {/* Retention rate + Key metrics */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="p-5 rounded-3xl soft-shadow" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
                  <div className="text-xs tracking-widest mb-4 font-bold" style={{ color: 'var(--muted)' }}>
                    TỶ LỆ GHI NHỚ
                  </div>
                  <div className="flex items-end gap-4 mb-3">
                    <div style={{ fontSize: '48px', fontWeight: 800, lineHeight: 1, color: srsHealth.retentionRate >= 80 ? '#10b981' : srsHealth.retentionRate >= 60 ? '#f59e0b' : '#ef4444' }}>
                      {srsHealth.retentionRate}%
                    </div>
                    <div className="text-sm" style={{ color: 'var(--muted)', paddingBottom: '6px' }}>
                      {srsHealth.retentionRate >= 85 ? '🏆 Xuất sắc' : srsHealth.retentionRate >= 70 ? '👍 Tốt' : '📖 Cần cải thiện'}
                    </div>
                  </div>
                  <div className="h-2.5 rounded-full overflow-hidden" style={{ background: 'var(--surface-soft)' }}>
                    <div className="h-full rounded-full"

                  </div>
                  <div className="flex justify-between text-xs mt-2" style={{ color: 'var(--muted)' }}>
                    <span>Tổng lần ôn: {srsHealth.totalReps.toLocaleString()}</span>

// Nếu chưa cấu hình -> supa = null -> toàn bộ phần này "ngủ", app chạy như cũ.
const cloudEnabled = !!(
  window.SUPABASE_URL && window.SUPABASE_ANON_KEY &&
  !String(window.SUPABASE_URL).includes('YOUR_') &&
  !String(window.SUPABASE_ANON_KEY).includes('YOUR_') &&
  window.supabase
);
const supa = cloudEnabled
  ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
  : null;

// So sánh ổn định (sắp key) để tránh reload lặp do thứ tự key khác nhau
const stableStr = (o) => JSON.stringify(o, (k, v) =>
  (v && typeof v === 'object' && !Array.isArray(v))
    ? Object.keys(v).sort().reduce((a, key) => (a[key] = v[key], a), {})
    : v);

// Gom mọi tiến độ ('hsk:*') từ localStorage thành 1 object
function gatherLocal() {
  const blob = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('hsk:')) {
      try { blob[k] = JSON.parse(localStorage.getItem(k)); }
      catch { blob[k] = localStorage.getItem(k); }
    }
  }
  return blob;
}
// Ghi object tiến độ vào localStorage
function applyLocal(blob) {
  if (!blob) return;
  Object.entries(blob).forEach(([k, v]) => {
    if (k && k.startsWith('hsk:')) {
      try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
    }
  });
}
// Gộp cloud + local an toàn: KHÔNG bao giờ mất "từ đã học"
function mergeBlobs(localB, cloudB) {
  const out = { ...cloudB, ...localB }; // mặc định local thắng
  const uni = (a, b) => Array.from(new Set([
    ...(Array.isArray(a) ? a : []), ...(Array.isArray(b) ? b : [])
  ]));
  out['hsk:learned'] = uni(localB['hsk:learned'], cloudB['hsk:learned']);
  out['hsk:starred'] = uni(localB['hsk:starred'], cloudB['hsk:starred']);
  // SRS: gộp theo từng từ, giữ bản ôn gần đây hơn
  const ls = localB['hsk:srs'] || {}, cs = cloudB['hsk:srs'] || {};
  const srs = { ...cs };
  for (const id in ls) {
    if (!srs[id]) srs[id] = ls[id];
    else srs[id] = (ls[id]?.lastReview || 0) >= (cs[id]?.lastReview || 0) ? ls[id] : cs[id];
  }
  if (Object.keys(srs).length) out['hsk:srs'] = srs;
  // Thói quen/streak: giữ bản có xp cao hơn
  const lh = localB['hsk:habit'], ch = cloudB['hsk:habit'];
  if (lh || ch) out['hsk:habit'] = ((lh?.xp || 0) >= (ch?.xp || 0)) ? (lh || ch) : (ch || lh);
  return out;
}

// Widget tài khoản: nút trên header + modal đăng nhập/đăng ký + Xuất/Nhập
const AccountWidget = ({ supa, session, syncState }) => {
  const [open, setOpen] = useState(false);
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [msg, setMsg] = useState('');
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  const signIn = async () => {
    setBusy(true); setMsg('');
    const { error } = await supa.auth.signInWithPassword({ email: email.trim(), password: pw });
    setBusy(false);
    if (error) setMsg('⚠️ ' + error.message);
    else { setMsg('Đăng nhập thành công!'); setPw(''); }
  };
  const signUp = async () => {
    setBusy(true); setMsg('');
    const { error } = await supa.auth.signUp({ email: email.trim(), password: pw });
    setBusy(false);
    setMsg(error ? ('⚠️ ' + error.message) : 'Đã tạo tài khoản — giờ bấm Đăng nhập.');
  };
  const signOut = async () => { await supa.auth.signOut(); setMsg('Đã đăng xuất.'); };

  const exportData = () => {
    const blob = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('hsk:')) blob[k] = localStorage.getItem(k);
    }
    const url = URL.createObjectURL(new Blob([JSON.stringify(blob, null, 2)], { type: 'application/json' }));
    const a = document.createElement('a');
    a.href = url; a.download = 'hsk-tien-do-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click(); URL.revokeObjectURL(url);
  };
  const importData = (e) => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const blob = JSON.parse(r.result);
        Object.entries(blob).forEach(([k, v]) => {
          if (k.startsWith('hsk:')) localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
        });
        alert('Đã nhập tiến độ. Tải lại trang...');
        location.reload();
      } catch { alert('File không hợp lệ.'); }
    };
    r.readAsText(f);
  };

  const dot = { idle: 'var(--muted)', syncing: '#f59e0b', synced: '#10b981', error: '#ef4444' }[syncState] || 'var(--muted)';

  return (
    <>
      <button onClick={() => setOpen(true)}
        className="w-10 h-10 flex items-center justify-center rounded-2xl transition-all hover:scale-110 relative"
        style={{ background: 'var(--surface)', color: 'var(--accent)', border: '1px solid var(--border)', fontSize: '16px' }}
        title={session ? 'Tài khoản' : 'Đăng nhập để đồng bộ'}>
        {session ? '👤' : '☁'}
        <span className="absolute" style={{ bottom: 4, right: 4, width: 8, height: 8, borderRadius: 9999, background: dot, border: '1.5px solid var(--surface)' }} />
      </button>

      {open && ReactDOM.createPortal((
        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4"
          style={{ background: 'rgba(0,0,0,0.45)' }} onClick={() => setOpen(false)}>
          <div className="w-full max-w-sm rounded-3xl p-6"
            style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}
            onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <div className="font-semibold text-lg" style={{ color: 'var(--ink)' }}>
                {session ? 'Tài khoản' : 'Đăng nhập'}
              </div>
              <button onClick={() => setOpen(false)} style={{ color: 'var(--muted)', fontSize: 22 }}>×</button>
            </div>

            {session ? (
              <div className="space-y-3">
                <div className="text-sm" style={{ color: 'var(--muted)' }}>Đang đăng nhập:</div>
                <div className="font-medium break-all" style={{ color: 'var(--ink)' }}>{session.user.email}</div>
                <div className="text-xs flex items-center gap-2" style={{ color: 'var(--muted)' }}>
                  <span style={{ width: 8, height: 8, borderRadius: 9999, background: dot, display: 'inline-block' }} />
                  {{ idle: 'Sẵn sàng', syncing: 'Đang đồng bộ…', synced: 'Đã đồng bộ ✓', error: 'Lỗi đồng bộ' }[syncState] || 'Sẵn sàng'}
                </div>
                <button onClick={signOut}
                  className="w-full py-2.5 rounded-xl font-medium"
                  style={{ background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
                  Đăng xuất
                </button>
              </div>
            ) : (
              <div className="space-y-3">
                <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)}
                  className="w-full px-3 py-2.5 rounded-xl outline-none"
                  style={{ background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--border)' }} />
                <input type="password" placeholder="Mật khẩu (ít nhất 6 ký tự)" value={pw} onChange={e => setPw(e.target.value)}
                  className="w-full px-3 py-2.5 rounded-xl outline-none"
                  style={{ background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--border)' }} />
                <div className="flex gap-2">
                  <button onClick={signIn} disabled={busy}
                    className="flex-1 py-2.5 rounded-xl font-medium"
                    style={{ background: 'var(--accent)', color: 'white', opacity: busy ? 0.6 : 1 }}>
                    Đăng nhập
                  </button>
                  <button onClick={signUp} disabled={busy}
                    className="flex-1 py-2.5 rounded-xl font-medium"
                    style={{ background: 'var(--bg)', color: 'var(--accent)', border: '1px solid var(--border)', opacity: busy ? 0.6 : 1 }}>
                    Đăng ký
                  </button>
                </div>
              </div>
            )}

            {msg && <div className="text-sm mt-3" style={{ color: 'var(--ink)' }}>{msg}</div>}

            <div className="mt-5 pt-4" style={{ borderTop: '1px solid var(--border)' }}>
              <div className="text-xs mb-2" style={{ color: 'var(--muted)' }}>Sao lưu thủ công (luôn dùng được):</div>
              <div className="flex gap-2">
                <button onClick={exportData}
                  className="flex-1 py-2 rounded-xl text-sm font-medium"
                  style={{ background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
                  ⬇ Xuất tiến độ
                </button>
                <button onClick={() => fileRef.current && fileRef.current.click()}
                  className="flex-1 py-2 rounded-xl text-sm font-medium"
                  style={{ background: 'var(--bg)', color: 'var(--ink)', border: '1px solid var(--border)' }}>
                  ⬆ Nhập tiến độ
                </button>
                <input ref={fileRef} type="file" accept="application/json" onChange={importData} style={{ display: 'none' }} />
              </div>
            </div>
          </div>
        </div>
      ), document.body)}
    </>
  );
};

// ============ LINH THÚ ĐỒNG HÀNH ============
const PetView = () => {
  const [p, setP] = useState(() => readPet() || defaultPet());
  const [msg, setMsg] = useState('');
  const [react, setReact] = useState(null);       // happy | excited | sleepy
  const [floatTxt, setFloatTxt] = useState(null);
  const [evolveModal, setEvolveModal] = useState(null);
  const [editing, setEditing] = useState(false);
  const [nameInput, setNameInput] = useState('');
  const [dev, setDev] = useState(() => isDevMode());
  const [viewStage, setViewStage] = useState(null);
  const [morph, setMorph] = useState(null);      // hoạt ảnh tiến hóa: charge → flash → reveal
  const [devAmt, setDevAmt] = useState(25);      // EXP mỗi lần cho ăn ở chế độ vô hạn

  useEffect(() => {
    const today = new Date().toISOString().slice(0, 10);
    let sleepy = false;
    setP(prev => {
      const np = { ...prev };
      if (np.lastSeen) {
        const days = Math.round((Date.now() - new Date(np.lastSeen + 'T00:00:00').getTime()) / 86400000);
        if (days >= 2) sleepy = true;
      }
      if (np.bonusDay !== today) { np.food = (np.food || 0) + 8; np.bonusDay = today; setFloatTxt('+8 🍱 hôm nay'); setTimeout(() => setFloatTxt(null), 2600); }
      np.lastSeen = today; writePet(np); return np;
    });
    setTimeout(() => {
      const cur = readPet() || defaultPet();
      setReact(sleepy ? 'sleepy' : 'happy');
      setMsg(sleepy ? 'Lâu rồi không gặp~ cho mình ăn nhé! 🥺' : petStage(cur.lv).line);
      setTimeout(() => setReact(null), 2800);
    }, 60);
  }, []);

  const stage = petStage(p.lv);
  const shown = petDisplayStage(p);          // dạng đang hiển thị (có thể là skin cũ)
  const vis = (morph && morph.phase === 'charge' && morph.from) ? morph.from : shown; // dạng đang vẽ trong khung cảnh
  const need = petNeed(p.lv);
  const isDragon = vis.lv >= 11;
  const env = PET_ENVS[vis.art] || PET_ENVS.koi;
  const C = isDragon
    ? { a: '#ffcf5c', b: '#ff8f2e', water: ['#fff4d6', '#ffd277', '#e0951f'], gate: '#8a5212', deep: '#a86a1a' }
    : { a: '#46c2ad', b: '#2f8f86', water: ['#e2f8f1', '#8fd8cb', '#2f8f86'], gate: '#1d5a53', deep: '#236b62' };

  const startMorph = (fromStage, toStage) => {
    setMorph({ from: fromStage, phase: 'charge' });
    setTimeout(() => setMorph(m => (m ? { ...m, phase: 'flash' } : m)), 950);
    setTimeout(() => setMorph(m => (m ? { ...m, phase: 'reveal' } : m)), 1300);
    setTimeout(() => setEvolveModal(toStage), 2300);
    setTimeout(() => setMorph(null), 2650);
  };

  const tapPet = () => { if (morph) return; setReact('excited'); setTimeout(() => setReact(null), 1200); setMsg(PET_CHEERS[Math.floor(Math.random() * PET_CHEERS.length)]); };

  const feed = () => {
    const amt = dev ? devAmt : (p.food || 0);
    if (amt <= 0) { setMsg('Hết 🍱 rồi — học thêm để có thức ăn nhé!'); setReact('sleepy'); setTimeout(() => setReact(null), 1200); return; }
    let { lv, exp, food } = p; const beforeStage = petStage(lv).name; const beforeLv = lv;
    exp += amt; if (!dev) food = 0;
    while (exp >= petNeed(lv)) { exp -= petNeed(lv); lv++; }
    const np = { ...p, lv, exp, food }; writePet(np); setP(np);
    setFloatTxt('+' + amt + ' EXP'); setTimeout(() => setFloatTxt(null), 1500);
    setReact('happy'); setTimeout(() => setReact(null), 1400);
    const afterStage = petStage(lv).name;
    if (afterStage !== beforeStage) { np.skin = null; writePet(np); setP(np); setMsg(''); startMorph(petStage(beforeLv), petStage(lv)); }
    else if (lv > beforeLv) setMsg('升级 (shēngjí)! Lên cấp ' + lv + ' rồi! 🎉');
    else setMsg('好吃 (hǎochī)! Ngon quá~');
  };

  const toggleDev = () => { const nd = !dev; setDevMode(nd); setDev(nd); setMsg(nd ? 'Đã bật chế độ Vô hạn ♾️ — cho ăn thoải mái!' : 'Đã tắt chế độ Vô hạn.'); };
  const maxLevel = () => { const beforeLv = p.lv; const np = { ...p, lv: 16, exp: 0, skin: null }; writePet(np); setP(np); if (beforeLv < 16) { setMsg(''); startMorph(petStage(beforeLv), petStage(16)); } };
  const resetPet = () => { setMorph(null); setEvolveModal(null); const np = { ...p, lv: 1, exp: 0, skin: null }; writePet(np); setP(np); setMsg('Về lại quả trứng nhỏ — cùng nuôi lại từ đầu 🥚'); };

  const saveName = () => { const np = { ...p, name: nameInput.trim().slice(0, 16) }; writePet(np); setP(np); setEditing(false); };
  const displayName = p.name || stage.name;

  return (
    <div className="max-w-xl mx-auto px-5 py-7">
      <div className="mb-4">
        <div className="text-xs tracking-[0.3em] mb-1" style={{ color: 'var(--accent)' }}>灵兽 · LINH THÚ ĐỒNG HÀNH</div>
        <h1 className="text-2xl" style={{ fontFamily: 'var(--font-display)', fontWeight: 700, color: 'var(--ink)' }}>Cá chép hóa rồng</h1>
        <div className="text-xs mt-0.5" style={{ color: 'var(--muted)' }}>Học để nuôi · vượt Vũ Môn 龙门 hóa rồng</div>
      </div>

      {/* KHUNG CẢNH — nền đổi theo hình thái, crossfade mượt */}
      <div className="relative rounded-3xl overflow-hidden mb-4" style={{ height: 300, boxShadow: '0 16px 44px rgba(20,60,55,0.32)' }}>
        {/* các lớp môi trường chi tiết (crossfade theo hình thái) */}
        {Object.entries(PET_ENVS).map(([k, e]) => (
          <div key={k} className="absolute inset-0 env-fade pointer-events-none" style={{ background: `linear-gradient(180deg, ${e.sky[0]} 0%, ${e.sky[1]} 52%, ${e.sky[2]} 100%)`, opacity: vis.art === k ? 1 : 0 }}>
            <PetEnvScene art={k} />
          </div>
        ))}
        {/* bong bóng (chỉ khi ở dưới nước) */}
        <div className="absolute inset-0 env-fade pointer-events-none" style={{ opacity: env.water ? 1 : 0 }}>
          {[12, 30, 52, 70, 86].map((l, i) => (
            <span key={i} className="pet-bubble" style={{ left: l + '%', animationDelay: (i * 1.3) + 's', animationDuration: (6 + i) + 's', width: (5 + (i % 3) * 3) + 'px', height: (5 + (i % 3) * 3) + 'px' }} />
          ))}
        </div>

        {/* nhân vật */}
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          {msg && <div className="mb-2 px-3 py-1.5 rounded-2xl text-xs font-semibold max-w-[80%] text-center" style={{ background: 'rgba(255,255,255,0.92)', color: '#1f4b45', boxShadow: '0 4px 14px rgba(0,0,0,0.12)' }}>{msg}</div>}

            <div className="pet-ripple env-fade" style={{ borderColor: C.b, animationDelay: '1.2s', opacity: env.water ? undefined : 0 }} />
            {/* thảm mây (khi bay trên trời) */}
            <div className="absolute env-fade pet-cloudpad" style={{ left: '50%', bottom: -14, transform: 'translateX(-50%)', fontSize: 52, opacity: env.clouds ? 0.95 : 0 }}>☁️</div>

        <div className="absolute top-3 right-4 px-2.5 py-1 rounded-xl text-xs font-bold" style={{ background: `linear-gradient(135deg, ${C.a}, ${C.b})`, color: '#fff' }}>🍱 {dev ? '∞' : (p.food || 0)}</div>

            <button onClick={() => { setNameInput(p.name || ''); setEditing(true); }} className="text-left">

        </div>
        <div className="h-2.5 rounded-full overflow-hidden mb-3" style={{ background: 'var(--surface-soft)' }}>

        </button>
        <div className="text-xs text-center mt-2.5" style={{ color: 'var(--muted)' }}>Chạm vào cá để vuốt ve · ôn thẻ +1 · từ mới +2 · thuộc câu +4 · mở app mỗi ngày +8</div>

        <div className="flex items-center justify-between gap-2 mt-3 pt-3" style={{ borderTop: '1px solid var(--border)' }}>
          <button onClick={toggleDev} className="px-3 py-1.5 rounded-xl text-xs font-bold transition-all"
            style={{ background: dev ? `${C.b}22` : 'var(--surface-soft)', color: dev ? C.deep : 'var(--muted)', border: `1px solid ${dev ? C.b + '66' : 'var(--border)'}` }}>

          {dev && (
            <div className="flex items-center gap-1.5">
              <button onClick={resetPet} className="px-2.5 py-1.5 rounded-xl text-xs font-bold" style={{ background: 'var(--surface-soft)', color: 'var(--muted)', border: '1px solid var(--border)' }}>🔄 Về trứng</button>
              <button onClick={maxLevel} className="px-2.5 py-1.5 rounded-xl text-xs font-bold"
                style={{ background: `linear-gradient(135deg, ${C.a}, ${C.b})`, color: '#fff' }}>⏫ Tối đa</button>
            </div>
          )}
        </div>
        {dev && (
          <div className="flex items-center gap-1.5 mt-2.5 flex-wrap">
            <span className="text-xs font-semibold" style={{ color: 'var(--muted)' }}>EXP mỗi lần cho ăn:</span>
            {[10, 25, 50, 100, 250].map(v => (
              <button key={v} onClick={() => setDevAmt(v)} className="px-2.5 py-1 rounded-lg text-xs font-bold transition-all"
                style={{ background: devAmt === v ? `linear-gradient(135deg, ${C.a}, ${C.b})` : 'var(--surface-soft)', color: devAmt === v ? '#fff' : 'var(--muted)', border: devAmt === v ? '1px solid transparent' : '1px solid var(--border)' }}>+{v}</button>
            ))}
          </div>
        )}
      </div>

      {/* HÀNH TRÌNH TIẾN HÓA */}
      <div className="rounded-2xl p-4" style={{ background: 'var(--surface)', border: '1px solid var(--border)' }}>
        <div className="text-sm font-bold mb-2" style={{ color: 'var(--ink)' }}>Hành trình tiến hóa <span className="text-xs font-semibold" style={{ color: 'var(--muted)' }}>— chạm để xem lại & chọn dạng hiển thị</span></div>
        <div className="grid grid-cols-3 gap-2">
          {PET_STAGES.map((s, i) => {
            const reached = p.lv >= s.lv;
            return (
              <button key={i} disabled={!reached} onClick={() => reached && setViewStage(s)}
                className="relative rounded-xl p-2 flex flex-col items-center transition-all"
                style={{ background: reached ? `${C.b}14` : 'var(--surface-soft)', border: s.lv === shown.lv ? `2px solid ${C.b}` : `1px solid ${reached ? C.b + '44' : 'var(--border)'}`, cursor: reached ? 'pointer' : 'default' }}>
                {s.lv === shown.lv && <span className="absolute top-1 left-1.5 text-[10px] font-bold px-1.5 rounded-md" style={{ background: C.b, color: '#fff' }}>👁</span>}
                <div className="flex items-center justify-center" style={{ width: '100%', height: 52, overflow: 'hidden', opacity: reached ? 1 : 0.32, filter: reached ? 'none' : 'grayscale(1)' }}>
                  <div style={{ transform: 'translateY(4px)' }}><Creature emoji={s.emoji} size={48} /></div>
                </div>
                <span className="text-[11px] mt-1 font-semibold" style={{ color: reached ? C.deep : 'var(--muted)' }}>{reached ? s.name : 'Cấp ' + s.lv}</span>

      </div>

      {/* XEM LẠI MỘT DẠNG */}
      {viewStage && (
        <div className="fixed inset-0 z-[120] flex items-center justify-center px-6" style={{ background: 'rgba(15,30,28,0.6)' }} onClick={() => setViewStage(null)}>
          <div className="rounded-3xl p-7 text-center max-w-xs" style={{ background: `linear-gradient(160deg, ${C.water[0]}, ${C.water[1]})`, border: `1px solid ${C.b}55`, boxShadow: '0 20px 56px rgba(0,0,0,0.4)' }} onClick={e => e.stopPropagation()}>
            <div className="flex justify-center mb-2" style={{ filter: 'drop-shadow(0 6px 10px rgba(0,0,0,0.18))' }}><Creature emoji={viewStage.emoji} size={170} /></div>
            <div className="text-lg font-bold mb-1" style={{ color: '#1f4b45' }}>{viewStage.name}</div>
            <div className="text-xs mb-1" style={{ color: C.deep, fontWeight: 600 }}>Mở từ cấp {viewStage.lv}</div>
            <div className="text-xs px-3 py-2 rounded-xl mt-2" style={{ background: 'rgba(255,255,255,0.7)', color: '#2a5b54', lineHeight: 1.6 }}>{viewStage.line}</div>
            <div className="flex gap-2 mt-4 justify-center">
              {viewStage.lv !== shown.lv && (
                <button onClick={() => {
                    const np = { ...p, skin: viewStage.lv === stage.lv ? null : viewStage.lv };
                    writePet(np); setP(np); setViewStage(null);
                    setMsg('变身 (biànshēn)! Đổi sang dạng ' + viewStage.name + ' ✨');
                    setReact('happy'); setTimeout(() => setReact(null), 1400);
                  }}
                  className="px-4 py-2 rounded-xl text-sm font-bold" style={{ background: `linear-gradient(135deg, ${C.a}, ${C.b})`, color: '#fff' }}>
                  🎭 Hiển thị dạng này
                </button>
              )}
              <button onClick={() => setViewStage(null)} className="px-4 py-2 rounded-xl text-sm font-bold" style={{ background: 'rgba(255,255,255,0.85)', color: '#2a5b54', border: `1px solid ${C.b}55` }}>Đóng</button>
            </div>
          </div>
        </div>
      )}

      {/* MÀN HÓA THÂN */}
      {evolveModal && (
        <div className="fixed inset-0 z-[120] flex items-center justify-center px-6" style={{ background: 'rgba(15,30,28,0.62)' }} onClick={() => setEvolveModal(null)}>
          <div className="rounded-3xl p-8 text-center max-w-xs" style={{ background: `linear-gradient(160deg, ${C.water[0]}, ${C.water[1]})`, border: `2px solid ${C.a}`, boxShadow: '0 24px 64px rgba(0,0,0,0.4)' }}>
            <div className="pet-evolve mb-2 flex justify-center" style={{ filter: 'drop-shadow(0 6px 10px rgba(0,0,0,0.2))' }}><Creature emoji={evolveModal.emoji} size={150} /></div>
            <div className="text-lg font-bold mb-1" style={{ color: C.deep }}>Tiến hóa! 🎉</div>
            <div className="text-base font-bold mb-2" style={{ color: '#1f4b45' }}>{displayName} → {evolveModal.name}</div>
            <div className="text-xs px-3 py-2 rounded-xl mb-4" style={{ background: 'rgba(255,255,255,0.75)', color: '#2a5b54', lineHeight: 1.6 }}>{evolveModal.line}</div>
            <button onClick={() => setEvolveModal(null)} className="px-5 py-2 rounded-xl text-sm font-bold" style={{ background: `linear-gradient(135deg, ${C.a}, ${C.b})`, color: '#fff' }}>Tuyệt vời! ✨</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ============ MAIN APP ============


function App() {
  const [view, setView] = useState('home');
  const [selectedHSK, setSelectedHSK] = useState(1);
  const [darkMode, setDarkMode] = useState(false);
  const [learned, setLearned] = useState([]);
  const [starred, setStarred] = useState([]);
  const [srsData, setSrsData] = useState({});
  const [quizScores, setQuizScores] = useState([]);
  // Flashcard SRS: cài đặt + bộ đếm theo ngày + thống kê
  const [fcSettings, setFcSettings] = useState({ newPerDay: 10, maxReviews: 0, currentLevel: 1, typing: false });
  const [fcDaily, setFcDaily] = useState({ date: '', newDone: 0, reviewsDone: 0 });
  const [fcStats, setFcStats] = useState({ totalRated: 0, correct: 0 });
  const [showStreakModal, setShowStreakModal] = useState(false);
  const [showMilestone, setShowMilestone] = useState(null); // milestone object
  const [session, setSession] = useState(null);
  const [syncState, setSyncState] = useState('idle'); // idle | syncing | synced | error

  // === CLOUD: theo dõi phiên đăng nhập ===
  useEffect(() => {
    if (!supa) return;
    supa.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = supa.auth.onAuthStateChange((_e, s) => setSession(s || null));
    return () => sub.subscription.unsubscribe();
  }, []);

  // === CLOUD: khi đăng nhập -> kéo cloud, gộp, lưu, đẩy lại; reload nếu có dữ liệu mới ===
  useEffect(() => {
    if (!supa || !session) return;
    let cancelled = false;
    (async () => {
      setSyncState('syncing');
      try {
        const uid = session.user.id;
        const { data, error } = await supa.from('progress').select('data').eq('user_id', uid).maybeSingle();
        if (error) throw error;
        const cloudB = (data && data.data) || {};
        const localB = gatherLocal();
        const merged = mergeBlobs(localB, cloudB);
        const changed = stableStr(merged) !== stableStr(localB);
        applyLocal(merged);
        await supa.from('progress').upsert({ user_id: uid, data: merged, updated_at: new Date().toISOString() });
        if (cancelled) return;
        setSyncState('synced');
        if (changed) setTimeout(() => window.location.reload(), 400);
      } catch (e) {
        if (!cancelled) setSyncState('error');
        console.warn('Cloud sync (login):', (e && e.message) || e);
      }
    })();
    return () => { cancelled = true; };
  }, [session]);

  // === CLOUD: đẩy thay đổi lên cloud (mỗi 8s nếu có đổi + khi rời trang) ===
  useEffect(() => {
    if (!supa || !session) return;
    let last = stableStr(gatherLocal());
    const push = async () => {
      const cur = gatherLocal();
      const curStr = stableStr(cur);
      if (curStr === last) return;
      last = curStr;
      try {
        setSyncState('syncing');
        await supa.from('progress').upsert({ user_id: session.user.id, data: cur, updated_at: new Date().toISOString() });
        setSyncState('synced');
      } catch (e) { setSyncState('error'); }
    };
    const iv = setInterval(push, 8000);
    const onHide = () => { if (document.visibilityState === 'hidden') push(); };
    document.addEventListener('visibilitychange', onHide);
    window.addEventListener('beforeunload', push);
    return () => {
      clearInterval(iv);
      document.removeEventListener('visibilitychange', onHide);
      window.removeEventListener('beforeunload', push);
    };
  }, [session]);

  // === HABIT ENGINE ===
  const {
    habit,
    goalProgress,
    pendingMilestone,
    trackActivity,
    useFreeze,
    setGoal,
    markMilestoneSeen,
  } = useHabit();

  // Hiển thị milestone toast khi có milestone mới
  useEffect(() => {
    if (pendingMilestone && !showMilestone) {
      setShowMilestone(pendingMilestone);
    }
  }, [pendingMilestone]);

  // Load from localStorage
  useEffect(() => {
    try {
      const l = localStorage.getItem('hsk:learned');
      if (l) setLearned(JSON.parse(l));
      const s = localStorage.getItem('hsk:starred');
      if (s) setStarred(JSON.parse(s));
      const sr = localStorage.getItem('hsk:srs');
      if (sr) setSrsData(JSON.parse(sr));
      const q = localStorage.getItem('hsk:quiz');
      if (q) setQuizScores(JSON.parse(q));
      const d = localStorage.getItem('hsk:dark');
      if (d) setDarkMode(JSON.parse(d));
      const fs = localStorage.getItem('hsk:settings');
      if (fs) setFcSettings(p => ({ ...p, ...JSON.parse(fs) }));
      const fd = localStorage.getItem('hsk:daily');
      if (fd) setFcDaily(JSON.parse(fd));
      const fst = localStorage.getItem('hsk:fcstats');
      if (fst) setFcStats(JSON.parse(fst));
    } catch (e) {}
  }, []);

  // Save to localStorage
  const persist = (key, value) => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
  };

  const toggleLearned = (id) => {
    setLearned(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      persist('hsk:learned', next);
      return next;
    });
    // Track: đánh dấu thuộc từ = hoạt động học
    trackActivity('learnWord', 1);
  };
  const toggleStar = (id) => {
    setStarred(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      persist('hsk:starred', next);
      return next;
    });
  };
  const updateSRS = (id, data) => {
    setSrsData(prev => {
      const next = { ...prev, [id]: data };
      persist('hsk:srs', next);
      return next;
    });
    // Track SRS review
    trackActivity('reviewWord', 1);
  };
  // Flashcard: cập nhật cài đặt
  const updateFcSettings = (patch) => {
    setFcSettings(prev => { const next = { ...prev, ...patch }; persist('hsk:settings', next); return next; });
  };
  // Flashcard: tăng bộ đếm ngày (tự reset khi sang ngày mới)
  const bumpDaily = (kind) => {
    setFcDaily(prev => {
      const t = new Date().toLocaleDateString('en-CA');
      const base = prev.date === t ? prev : { date: t, newDone: 0, reviewsDone: 0 };
      const field = kind === 'new' ? 'newDone' : 'reviewsDone';
      const next = { ...base, [field]: (base[field] || 0) + 1 };
      persist('hsk:daily', next);
      return next;
    });
  };
  // Flashcard: thống kê tỉ lệ nhớ tích lũy
  const bumpFcStat = (correct) => {
    setFcStats(prev => {
      const next = { totalRated: (prev.totalRated || 0) + 1, correct: (prev.correct || 0) + (correct ? 1 : 0) };
      persist('hsk:fcstats', next);
      return next;
    });
  };
  const addQuizScore = (s) => {
    setQuizScores(prev => {
      const next = [...prev, s].slice(-50);
      persist('hsk:quiz', next);
      return next;
    });
    // Track quiz completion
    trackActivity('quizComplete', 1);
  };
  const toggleDark = () => {
    setDarkMode(d => {
      const next = !d;
      persist('hsk:dark', next);
      return next;
    });
  };

  // Track: khi vào reading = activity
  const trackReading = () => trackActivity('readingFinish', 1);
  // Track: khi vào writing = activity
  const trackWriting = () => trackActivity('writePractice', 1);

  const learnedCount = useMemo(() => {
    const learnedSet = new Set(learned);
    const r = {};
    [1,2,3,4,5,6].forEach(l => {
      const words = ALL_HSK[l] || [];
      r[l] = words.filter(w => learnedSet.has(w.id)).length;
    });
    return r;
  }, [learned]);
  const totalCount = useMemo(() => {
    const r = {};
    [1,2,3,4,5,6].forEach(l => { r[l] = (ALL_HSK[l] || []).length; });
    return r;
  }, []);

  // CSS variables based on theme
  const themeStyles = darkMode ? {
    '--bg': '#0c1729',
    '--bg-header': 'rgba(12, 23, 41, 0.85)',
    '--surface': '#1a2944',
    '--surface-soft': '#243756',
    '--ink': '#f0f6fc',
    '--muted': '#94aecc',
    '--border': '#2e4264',
    '--accent': '#7fb8e0',
    '--accent-soft': '#5da3dc',
    '--accent-2': '#a8d0ed',
    '--tone-1': '#93c5fd',
    '--tone-2': '#6ee7b7',
    '--tone-3': '#fcd34d',
    '--tone-4': '#fca5a5',
  } : {
    /* Pastel blue - refined for liveliness & contrast */
    '--bg': '#eaf3ff',                         /* nhẹ hơn, hơi lavender */
    '--bg-header': 'rgba(234, 243, 255, 0.85)',
    '--surface': '#ffffff',
    '--surface-soft': '#dbecfd',                /* xanh pastel rõ ràng hơn cũ */
    '--ink': '#0f2945',                         /* đậm hơn để dễ đọc */
    '--muted': '#5d80a8',                       /* hơi đậm hơn để contrast */
    '--border': '#cce0f3',                      /* nhẹ nhàng hơn */
    '--accent': '#3d8bd1',                      /* xanh chủ đạo đậm vibrant hơn */
    '--accent-soft': '#94c3ec',                 /* xanh pastel sáng */
    '--accent-2': '#5fa8de',                    /* xanh trung gian phân biệt rõ */
    '--tone-1': '#1e62d8',
    '--tone-2': '#0d9b6e',
    '--tone-3': '#e08e0a',
    '--tone-4': '#dc2f2f',
  };

  // Đưa biến màu theme lên :root để cửa sổ render qua portal (đăng nhập) cũng có màu
  useEffect(() => {
    const root = document.documentElement;
    Object.entries(themeStyles).forEach(([k, v]) => root.style.setProperty(k, v));
  }, [darkMode]);

  return (
    <div style={{
      ...themeStyles,
      fontFamily: 'var(--font-body)',
      background: 'transparent',
      color: 'var(--ink)',
      minHeight: '100vh',
    }}>
      <style>{`

        {view === 'vocab' && <VocabView selectedHSK={selectedHSK} setSelectedHSK={setSelectedHSK} learned={learned} toggleLearned={toggleLearned} starred={starred} toggleStar={toggleStar} srsData={srsData} updateSRS={updateSRS} />}
        {view === 'grammar' && <GrammarView />}
        {view === 'reading' && <ReadingView onActivity={trackReading} srsData={srsData} updateSRS={updateSRS} learned={learned} toggleLearned={toggleLearned} />}
        {view === 'flashcard' && <FlashcardView srsData={srsData} updateSRS={updateSRS} settings={fcSettings} setSettings={updateFcSettings} daily={fcDaily} bumpDaily={bumpDaily} fcStats={fcStats} bumpFcStat={bumpFcStat} />}
        {view === 'sentence' && <SentenceView />}
        {view === 'pet' && <PetView />}
        {view === 'quiz' && <QuizView toggleLearned={toggleLearned} learned={learned} addQuizScore={addQuizScore} srsData={srsData} />}
        {view === 'listening' && <ListeningView srsData={srsData} trackActivity={trackActivity} />}
        {view === 'writing' && <WritingView onActivity={trackWriting} />}
        {view === 'progress' && <ProgressView learned={learned} starred={starred} srsData={srsData} quizScores={quizScores} habit={habit} />}
      </main>

      <footer className="mt-20 py-8 px-6 text-center" style={{ borderTop:'1px solid var(--border)', color:'var(--muted)' }}>
        <div className="text-xs tracking-[0.3em] mb-2">加油 · CỐ LÊN</div>
        <div className="text-sm">Học một chút mỗi ngày — 学一点,每天进步</div>
      </footer>

      {/* Streak Calendar Modal */}
      {showStreakModal && (
        <StreakCalendarModal
          habit={habit}
          goalProgress={goalProgress}
          onClose={() => setShowStreakModal(false)}
          onUseFreeze={() => { useFreeze(); setShowStreakModal(false); }}
          onSetGoal={(min) => setGoal(min)}
        />
      )}

      {/* Milestone Toast */}
      {showMilestone && (
        <MilestoneToast
          milestone={showMilestone}
          onClose={() => {
            markMilestoneSeen(showMilestone.key);
            setShowMilestone(null);
          }}
        />
      )}
    </div>
  );
}

function __hideLoading(){
  const l=document.getElementById("loading");
  if(l){l.style.transition="opacity .5s";l.style.opacity="0";setTimeout(()=>l.style.display="none",500);}
}
function __showFatal(message){
  const l=document.getElementById("loading");
  if(l) l.style.display="none";
  let box=document.getElementById("__fatal");
  if(!box){
    box=document.createElement("div");
    box.id="__fatal";
    box.style.cssText="position:fixed;inset:0;z-index:99999;background:#fff;color:#b91c1c;font-family:system-ui,sans-serif;padding:24px;overflow:auto;line-height:1.6";
    document.body.appendChild(box);
  }
  box.innerHTML='<div style="max-width:760px;margin:40px auto">'
    +'<div style="font-size:20px;font-weight:700;margin-bottom:8px">⚠️ Không tải được ứng dụng</div>'
    +'<div style="color:#374151;margin-bottom:16px">Chi tiết lỗi (gửi đoạn này nếu cần hỗ trợ):</div>'
    +'<pre style="white-space:pre-wrap;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;font-size:13px">'
    +String(message).replace(/</g,"&lt;")+'</pre></div>';
}
// Bắt lỗi tải file (vd: data/hsk1.js bị 404) — dùng capture để bắt cả lỗi tải script
window.addEventListener("error", function(e){
  const t=e.target;
  if(t && (t.tagName==="SCRIPT"||t.tagName==="LINK") && (t.src||t.href)){
    __showFatal("Không tải được file:\n  "+(t.src||t.href)
      +"\n\n→ Kiểm tra file này có tồn tại đúng đường dẫn không (thường là thiếu file trong thư mục data/, hoặc sai tên/đường dẫn).");
  } else if(e.error){
    __showFatal(e.error.stack || e.error.message || String(e.error));
  }
}, true);

try{
  const root=ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App/>);
  setTimeout(__hideLoading,100);
}catch(err){
  __showFatal((err && (err.stack||err.message)) || String(err));
}
</script>
<!-- ===== Đăng ký Service Worker (chỉ chạy trên HTTPS/localhost, KHÔNG chạy file://) ===== -->
<script>
(function(){
  if(!("serviceWorker" in navigator)) return;
  var ok = location.protocol === "https:" ||
           location.hostname === "localhost" ||
           location.hostname === "127.0.0.1";
  if(!ok) return; // mở bằng file:// thì bỏ qua, app vẫn chạy bình thường
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(e){
      console.warn("SW register failed:", e);
    });
  });
})();
</script>
